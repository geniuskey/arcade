<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>City Race - Coin Collector</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&family=Space+Grotesk:wght@700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --neon-gold: #ffd700;
            --bg-dark: #0a0a12;
            --glass-panel: rgba(4, 8, 18, 0.72);
        }

        body {
            margin: 0;
            padding: 0;
            background:
                radial-gradient(circle at 50% 15%, rgba(0, 243, 255, 0.14), transparent 28%),
                radial-gradient(circle at 15% 85%, rgba(188, 19, 254, 0.12), transparent 30%),
                var(--bg-dark);
            overflow: hidden;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: white;
            touch-action: none;
        }

        canvas {
            display: block;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            pointer-events: none;
        }

        .stat-box {
            background: var(--glass-panel);
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid rgba(0, 243, 255, 0.22);
            backdrop-filter: blur(14px);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.06);
        }

        .stat-label {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--neon-blue);
            letter-spacing: 0.1em;
        }

        .stat-value {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 24px;
            font-weight: 700;
        }

        #minimap-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 200px;
            height: 200px;
            background: rgba(3, 8, 18, 0.78);
            border: 1px solid rgba(0, 243, 255, 0.55);
            border-radius: 8px;
            overflow: hidden;
            z-index: 10;
            box-shadow: 0 0 28px rgba(0, 243, 255, 0.16), inset 0 0 24px rgba(0, 243, 255, 0.07);
        }

        #minimap-canvas {
            width: 100%;
            height: 100%;
        }

        .btn {
            background: var(--neon-purple);
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 800;
            cursor: pointer;
            pointer-events: auto;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.3);
        }

        .btn:active {
            transform: scale(0.95);
        }

        #shop-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .shop-content {
            background: linear-gradient(160deg, rgba(15, 18, 34, 0.96), rgba(5, 7, 16, 0.96));
            border: 1px solid rgba(188, 19, 254, 0.64);
            border-radius: 8px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            text-align: center;
        }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 15px;
            margin: 30px 0;
        }

        .color-option {
            height: 60px;
            border-radius: 8px;
            cursor: pointer;
            border: 3px solid transparent;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            font-weight: bold;
        }

        .color-option.selected {
            border-color: white;
            box-shadow: 0 0 15px white;
        }

        #joystick-container {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: none;
            touch-action: none;
            z-index: 50;
        }

        #joystick-knob {
            position: absolute;
            width: 60px;
            height: 60px;
            background: var(--neon-blue);
            border-radius: 50%;
            top: 30px;
            left: 30px;
            pointer-events: none;
            box-shadow: 0 0 15px var(--neon-blue);
        }

        @media (pointer: coarse) {
            #joystick-container {
                display: block;
            }
        }

        @media (max-width: 600px) {
            #ui {
                top: 16px;
                left: 16px;
            }

            .stat-box {
                padding: 8px 12px;
                gap: 10px;
            }

            .stat-value {
                font-size: 22px;
            }

            .btn {
                padding: 10px 18px;
            }

            #minimap-container {
                width: 132px;
                height: 132px;
                bottom: 16px;
                right: 16px;
            }

            #joystick-container {
                width: 104px;
                height: 104px;
                bottom: 24px;
                left: 20px;
            }

            #joystick-knob {
                width: 52px;
                height: 52px;
                top: 26px;
                left: 26px;
            }

        }

        .back-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            text-decoration: none;
            color: white;
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 16px;
            border-radius: 8px;
            font-family: sans-serif;
            font-size: 14px;
            transition: background 0.3s;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .back-btn:hover {
            background: rgba(0, 0, 0, 0.8);
        }

        @media (max-width: 600px) {
            .back-btn {
                top: 20px;
                right: 20px;
                padding: 8px 12px;
            }
        }
    </style>
</head>

<body>
    <a href="../" class="back-btn">← Arcade</a>
    <div id="ui">
        <div class="stat-box">
            <div>
                <div class="stat-label">Coins</div>
                <div id="coin-val" class="stat-value">0</div>
            </div>
            <button class="btn" style="background: var(--neon-blue); color: black;" onclick="openShop()">SHOP</button>
        </div>
        <div style="font-size: 12px; color: #888; margin-top: 10px;">WASD or Arrows to drive</div>
    </div>

    <div id="minimap-container">
        <canvas id="minimap-canvas"></canvas>
    </div>

    <div id="joystick-container">
        <div id="joystick-knob"></div>
    </div>

    <div id="shop-modal">
        <div class="shop-content">
            <h2 style="font-size: 32px; margin-bottom: 10px;">GARAGE</h2>
            <p style="color: #888;">Select a new paint job for your vessel.</p>
            <div class="color-grid" id="color-list"></div>
            <button class="btn" onclick="closeShop()">CLOSE</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const mCanvas = document.getElementById('minimap-canvas');
        const mCtx = mCanvas.getContext('2d');
        const coinValEl = document.getElementById('coin-val');
        const shopModal = document.getElementById('shop-modal');
        const colorListEl = document.getElementById('color-list');

        // Constants
        const WORLD_SIZE = 4000;
        const BLOCK_SIZE = 500;
        const ROAD_WIDTH = 180;
        const COIN_RADIUS = 15;

        // Player State
        const car = {
            x: WORLD_SIZE / 2,
            y: WORLD_SIZE / 2,
            angle: 0,
            speed: 0,
            maxSpeed: 5.5,
            accel: 0.12,
            brake: 0.25,
            friction: 0.992, // Increased inertia
            steerAngle: 0,
            maxSteer: 0.45,
            steerSpeed: 0.08,
            width: 44,
            height: 24,
            wheelBase: 32,
            wheelWidth: 10,
            wheelHeight: 6,
            color: '#e74c3c',
            coins: parseInt(localStorage.getItem('city_coins') || '0')
        };

        const colors = [
            { name: 'Red', hex: '#e74c3c', cost: 0 },
            { name: 'Blue', hex: '#3498db', cost: 10 },
            { name: 'Green', hex: '#2ecc71', cost: 20 },
            { name: 'Gold', hex: '#f1c40f', cost: 50 },
            { name: 'Neon', hex: '#bc13fe', cost: 100 },
            { name: 'Ice', hex: '#00f3ff', cost: 150 }
        ];

        let coin = { x: 0, y: 0 };
        let buildings = [];
        let streetLights = [];
        let roadSpeckles = [];
        let distantGlows = [];
        let keys = {};
        let joystick = { x: 0, y: 0, active: false };
        let lastFrameTime = 0;
        const fpsInterval = 1000 / 60;
        let gameTime = 0;

        function init() {
            // Generate City Grid
            for (let x = 0; x < WORLD_SIZE; x += BLOCK_SIZE) {
                for (let y = 0; y < WORLD_SIZE; y += BLOCK_SIZE) {
                    const building = {
                        x: x + ROAD_WIDTH / 2 + 20,
                        y: y + ROAD_WIDTH / 2 + 20,
                        w: BLOCK_SIZE - ROAD_WIDTH - 40,
                        h: BLOCK_SIZE - ROAD_WIDTH - 40,
                        color: `hsl(${220 + Math.random() * 35}, ${18 + Math.random() * 16}%, ${9 + Math.random() * 8}%)`,
                        roofColor: `hsl(${215 + Math.random() * 45}, ${22 + Math.random() * 18}%, ${14 + Math.random() * 10}%)`,
                        accent: Math.random() > 0.55 ? '#00f3ff' : '#bc13fe',
                        height: 18 + Math.random() * 42,
                        windows: [],
                        roofDetails: []
                    };
                    building.windows = createBuildingWindows(building);
                    building.roofDetails = createRoofDetails(building);
                    buildings.push(building);
                }
            }

            for (let i = 0; i <= WORLD_SIZE; i += BLOCK_SIZE) {
                for (let p = 90; p < WORLD_SIZE; p += 420) {
                    streetLights.push({ x: p, y: i - ROAD_WIDTH / 2 + 16, side: 'h', phase: Math.random() * Math.PI * 2 });
                    streetLights.push({ x: p, y: i + ROAD_WIDTH / 2 - 16, side: 'h', phase: Math.random() * Math.PI * 2 });
                    streetLights.push({ x: i - ROAD_WIDTH / 2 + 16, y: p, side: 'v', phase: Math.random() * Math.PI * 2 });
                    streetLights.push({ x: i + ROAD_WIDTH / 2 - 16, y: p, side: 'v', phase: Math.random() * Math.PI * 2 });
                }
            }

            for (let i = 0; i < 260; i++) {
                const lane = Math.floor(Math.random() * (WORLD_SIZE / BLOCK_SIZE)) * BLOCK_SIZE;
                const horizontal = Math.random() > 0.5;
                roadSpeckles.push({
                    x: horizontal ? Math.random() * WORLD_SIZE : lane + (Math.random() - 0.5) * ROAD_WIDTH,
                    y: horizontal ? lane + (Math.random() - 0.5) * ROAD_WIDTH : Math.random() * WORLD_SIZE,
                    r: Math.random() * 1.2 + 0.4,
                    alpha: Math.random() * 0.06 + 0.02
                });
            }

            for (let i = 0; i < 12; i++) {
                distantGlows.push({
                    x: Math.random() * WORLD_SIZE,
                    y: Math.random() * WORLD_SIZE,
                    radius: 180 + Math.random() * 220,
                    color: Math.random() > 0.5 ? '0, 243, 255' : '188, 19, 254',
                    alpha: 0.01 + Math.random() * 0.016
                });
            }
            spawnCoin();
            updateUI();

            const savedColor = localStorage.getItem('city_color');
            if (savedColor) car.color = savedColor;
        }

        function createBuildingWindows(building) {
            const windows = [];
            const gap = 44;
            for (let wx = building.x + 24; wx < building.x + building.w - 24; wx += gap) {
                for (let wy = building.y + 24; wy < building.y + building.h - 24; wy += gap) {
                    if (Math.random() < 0.58) continue;
                    const warm = Math.random() > 0.56;
                    windows.push({
                        x: wx + Math.random() * 5,
                        y: wy + Math.random() * 5,
                        w: 10 + Math.random() * 7,
                        h: 8 + Math.random() * 8,
                        color: warm ? '255, 213, 125' : '90, 230, 255',
                        alpha: 0.14 + Math.random() * 0.22,
                        phase: Math.random() * Math.PI * 2
                    });
                }
            }
            return windows;
        }

        function createRoofDetails(building) {
            const details = [];
            const count = 1 + Math.floor(Math.random() * 3);
            for (let i = 0; i < count; i++) {
                details.push({
                    x: building.x + 34 + Math.random() * (building.w - 82),
                    y: building.y + 34 + Math.random() * (building.h - 82),
                    w: 18 + Math.random() * 35,
                    h: 10 + Math.random() * 24,
                    tone: 22 + Math.random() * 16
                });
            }
            return details;
        }

        function spawnCoin() {
            const isHorizontal = Math.random() > 0.5;
            if (isHorizontal) {
                const row = Math.floor(Math.random() * (WORLD_SIZE / BLOCK_SIZE));
                coin.x = Math.random() * WORLD_SIZE;
                coin.y = row * BLOCK_SIZE;
            } else {
                const col = Math.floor(Math.random() * (WORLD_SIZE / BLOCK_SIZE));
                coin.x = col * BLOCK_SIZE;
                coin.y = Math.random() * WORLD_SIZE;
            }
        }

        function updateUI() {
            coinValEl.innerText = car.coins;
            localStorage.setItem('city_coins', car.coins);
        }

        function openShop() {
            shopModal.style.display = 'flex';
            renderShop();
        }

        function closeShop() { shopModal.style.display = 'none'; }

        function renderShop() {
            colorListEl.innerHTML = '';
            colors.forEach(c => {
                const opt = document.createElement('div');
                opt.className = `color-option ${car.color === c.hex ? 'selected' : ''}`;
                opt.style.background = c.hex;

                const owned = localStorage.getItem(`city_owned_${c.name}`) || c.cost === 0;
                opt.innerHTML = `
                    <div style="color:black; background: white; padding: 2px 5px; border-radius: 4px;">
                        ${owned ? 'OWNED' : c.cost + '💰'}
                    </div>
                `;

                opt.onclick = () => {
                    if (owned) {
                        car.color = c.hex;
                        localStorage.setItem('city_color', c.hex);
                        renderShop();
                    } else if (car.coins >= c.cost) {
                        car.coins -= c.cost;
                        localStorage.setItem(`city_owned_${c.name}`, 'true');
                        car.color = c.hex;
                        localStorage.setItem('city_color', c.hex);
                        updateUI();
                        renderShop();
                    }
                };
                colorListEl.appendChild(opt);
            });
        }

        function update(dt) {
            const speedFactor = Math.abs(car.speed) / car.maxSpeed;
            const currentMaxSteer = car.maxSteer * (1.6 - speedFactor * 0.8);

            let targetSteer = 0;
            if (keys['KeyA'] || keys['ArrowLeft'] || joystick.x < -0.2) targetSteer = -currentMaxSteer;
            if (keys['KeyD'] || keys['ArrowRight'] || joystick.x > 0.2) targetSteer = currentMaxSteer;
            car.steerAngle += (targetSteer - car.steerAngle) * car.steerSpeed * dt;

            let forward = keys['KeyW'] || keys['ArrowUp'] || joystick.y < -0.2;
            let backward = keys['KeyS'] || keys['ArrowDown'] || joystick.y > 0.2;

            if (forward) car.speed += car.accel * dt;
            else if (backward) car.speed -= car.brake * dt;
            else {
                car.speed *= Math.pow(car.friction, dt);
                if (Math.abs(car.speed) < 0.05) car.speed = 0;
            }

            car.speed = Math.max(-car.maxSpeed / 2, Math.min(car.maxSpeed, car.speed));

            const moveStep = car.speed * dt;
            const frontWheel = {
                x: car.x + Math.cos(car.angle) * car.wheelBase / 2 + Math.cos(car.angle + car.steerAngle) * moveStep,
                y: car.y + Math.sin(car.angle) * car.wheelBase / 2 + Math.sin(car.angle + car.steerAngle) * moveStep
            };
            const backWheel = {
                x: car.x - Math.cos(car.angle) * car.wheelBase / 2 + Math.cos(car.angle) * moveStep,
                y: car.y - Math.sin(car.angle) * car.wheelBase / 2 + Math.sin(car.angle) * moveStep
            };

            const nextX = (frontWheel.x + backWheel.x) / 2;
            const nextY = (frontWheel.y + backWheel.y) / 2;

            let collided = false;
            for (const b of buildings) {
                if (nextX > b.x - 10 && nextX < b.x + b.w + 10 && nextY > b.y - 10 && nextY < b.y + b.h + 10) {
                    collided = true;
                    break;
                }
            }

            if (!collided) {
                car.x = nextX;
                car.y = nextY;
                car.angle = Math.atan2(frontWheel.y - backWheel.y, frontWheel.x - backWheel.x);
            } else {
                car.speed *= -0.6;
            }

            car.x = Math.max(0, Math.min(WORLD_SIZE, car.x));
            car.y = Math.max(0, Math.min(WORLD_SIZE, car.y));

            const distToCoin = Math.hypot(car.x - coin.x, car.y - coin.y);
            if (distToCoin < 40) {
                car.coins++;
                updateUI();
                spawnCoin();
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const speedFactor = Math.min(1, Math.abs(car.speed) / car.maxSpeed);
            const shake = speedFactor > 0.72 ? (speedFactor - 0.72) * 3 : 0;

            ctx.save();
            ctx.translate(
                canvas.width / 2 + Math.sin(gameTime * 38) * shake,
                canvas.height / 2 + Math.cos(gameTime * 43) * shake
            );
            ctx.translate(-car.x, -car.y);

            drawWorldBackdrop();
            drawDistantGlows();
            drawRoads();
            drawStreetLights();
            drawBuildings();
            drawCoin();
            drawCar();

            ctx.restore();

            drawPostEffects(speedFactor);
            drawMinimap();
        }

        function drawWorldBackdrop() {
            const bg = ctx.createRadialGradient(car.x, car.y, 120, car.x, car.y, 1800);
            bg.addColorStop(0, '#101426');
            bg.addColorStop(0.45, '#080a16');
            bg.addColorStop(1, '#02030a');
            ctx.fillStyle = bg;
            ctx.fillRect(-1000, -1000, WORLD_SIZE + 2000, WORLD_SIZE + 2000);

            ctx.strokeStyle = 'rgba(0, 243, 255, 0.014)';
            ctx.lineWidth = 1;
            for (let x = 0; x <= WORLD_SIZE; x += 250) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, WORLD_SIZE);
                ctx.stroke();
            }
            for (let y = 0; y <= WORLD_SIZE; y += 250) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(WORLD_SIZE, y);
                ctx.stroke();
            }
        }

        function drawDistantGlows() {
            distantGlows.forEach(glow => {
                if (!isVisible(glow.x - glow.radius, glow.y - glow.radius, glow.radius * 2, glow.radius * 2, 400)) return;
                const gradient = ctx.createRadialGradient(glow.x, glow.y, 0, glow.x, glow.y, glow.radius);
                gradient.addColorStop(0, `rgba(${glow.color}, ${glow.alpha})`);
                gradient.addColorStop(1, `rgba(${glow.color}, 0)`);
                ctx.fillStyle = gradient;
                ctx.fillRect(glow.x - glow.radius, glow.y - glow.radius, glow.radius * 2, glow.radius * 2);
            });
        }

        function drawRoads() {
            ctx.fillStyle = '#171b2b';
            for (let i = 0; i <= WORLD_SIZE; i += BLOCK_SIZE) {
                ctx.fillRect(0, i - ROAD_WIDTH / 2, WORLD_SIZE, ROAD_WIDTH);
                ctx.fillRect(i - ROAD_WIDTH / 2, 0, ROAD_WIDTH, WORLD_SIZE);
            }

            ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
            roadSpeckles.forEach(s => {
                if (!isVisible(s.x, s.y, s.r, s.r, 60)) return;
                ctx.globalAlpha = s.alpha;
                ctx.fillRect(s.x, s.y, s.r, s.r);
            });
            ctx.globalAlpha = 1;

            ctx.lineWidth = 3;
            for (let i = 0; i <= WORLD_SIZE; i += BLOCK_SIZE) {
            ctx.strokeStyle = 'rgba(0, 243, 255, 0.13)';
                ctx.setLineDash([]);
                ctx.beginPath();
                ctx.moveTo(0, i - ROAD_WIDTH / 2 + 6);
                ctx.lineTo(WORLD_SIZE, i - ROAD_WIDTH / 2 + 6);
                ctx.moveTo(0, i + ROAD_WIDTH / 2 - 6);
                ctx.lineTo(WORLD_SIZE, i + ROAD_WIDTH / 2 - 6);
                ctx.moveTo(i - ROAD_WIDTH / 2 + 6, 0);
                ctx.lineTo(i - ROAD_WIDTH / 2 + 6, WORLD_SIZE);
                ctx.moveTo(i + ROAD_WIDTH / 2 - 6, 0);
                ctx.lineTo(i + ROAD_WIDTH / 2 - 6, WORLD_SIZE);
                ctx.stroke();

                for (let x = 0; x < WORLD_SIZE; x += BLOCK_SIZE) {
                    const startX = x + ROAD_WIDTH / 2 + 60;
                    const endX = x + BLOCK_SIZE - ROAD_WIDTH / 2 - 60;
                    if (startX >= endX || !isVisible(startX, i - ROAD_WIDTH / 2, endX - startX, ROAD_WIDTH, 80)) continue;
                    drawRoadSegment(startX, i, endX, true);
                }

                for (let y = 0; y < WORLD_SIZE; y += BLOCK_SIZE) {
                    const startY = y + ROAD_WIDTH / 2 + 60;
                    const endY = y + BLOCK_SIZE - ROAD_WIDTH / 2 - 60;
                    if (startY >= endY || !isVisible(i - ROAD_WIDTH / 2, startY, ROAD_WIDTH, endY - startY, 80)) continue;
                    drawRoadSegment(startY, i, endY, false);
                }
            }

            ctx.setLineDash([]);
            for (let x = 0; x <= WORLD_SIZE; x += BLOCK_SIZE) {
                for (let y = 0; y <= WORLD_SIZE; y += BLOCK_SIZE) {
                    if (!isVisible(x - ROAD_WIDTH / 2 - 45, y - ROAD_WIDTH / 2 - 45, ROAD_WIDTH + 90, ROAD_WIDTH + 90, 80)) continue;
                    const intersection = ctx.createRadialGradient(x, y, 0, x, y, ROAD_WIDTH * 0.7);
                    intersection.addColorStop(0, '#222842');
                    intersection.addColorStop(1, '#161a2b');
                    ctx.fillStyle = intersection;
                    ctx.fillRect(x - ROAD_WIDTH / 2, y - ROAD_WIDTH / 2, ROAD_WIDTH, ROAD_WIDTH);
                    drawIntersectionGlow(x, y);
                    drawCrosswalk(x, y);
                }
            }
        }

        function drawRoadSegment(start, lane, end, horizontal) {
            ctx.lineWidth = 2;
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.72)';
            ctx.setLineDash([]);
            ctx.beginPath();
            if (horizontal) {
                ctx.moveTo(start, lane - ROAD_WIDTH / 2 + 12);
                ctx.lineTo(end, lane - ROAD_WIDTH / 2 + 12);
                ctx.moveTo(start, lane + ROAD_WIDTH / 2 - 12);
                ctx.lineTo(end, lane + ROAD_WIDTH / 2 - 12);
            } else {
                ctx.moveTo(lane - ROAD_WIDTH / 2 + 12, start);
                ctx.lineTo(lane - ROAD_WIDTH / 2 + 12, end);
                ctx.moveTo(lane + ROAD_WIDTH / 2 - 12, start);
                ctx.lineTo(lane + ROAD_WIDTH / 2 - 12, end);
            }
            ctx.stroke();

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.22)';
            ctx.lineWidth = 2;
            ctx.setLineDash([20, 30]);
            ctx.lineDashOffset = 0;
            ctx.beginPath();
            if (horizontal) {
                ctx.moveTo(start, lane - ROAD_WIDTH / 4);
                ctx.lineTo(end, lane - ROAD_WIDTH / 4);
                ctx.moveTo(start, lane + ROAD_WIDTH / 4);
                ctx.lineTo(end, lane + ROAD_WIDTH / 4);
            } else {
                ctx.moveTo(lane - ROAD_WIDTH / 4, start);
                ctx.lineTo(lane - ROAD_WIDTH / 4, end);
                ctx.moveTo(lane + ROAD_WIDTH / 4, start);
                ctx.lineTo(lane + ROAD_WIDTH / 4, end);
            }
            ctx.stroke();

            ctx.setLineDash([]);
            ctx.lineDashOffset = 0;
            ctx.strokeStyle = '#f4cf55';
            ctx.lineWidth = 2;
            ctx.beginPath();
            if (horizontal) {
                ctx.moveTo(start, lane - 3);
                ctx.lineTo(end, lane - 3);
                ctx.moveTo(start, lane + 3);
                ctx.lineTo(end, lane + 3);
            } else {
                ctx.moveTo(lane - 3, start);
                ctx.lineTo(lane - 3, end);
                ctx.moveTo(lane + 3, start);
                ctx.lineTo(lane + 3, end);
            }
            ctx.stroke();
        }

        function drawIntersectionGlow(x, y) {
            const size = ROAD_WIDTH + 32;
            ctx.strokeStyle = 'rgba(188, 19, 254, 0.10)';
            ctx.lineWidth = 2;
            drawRoundedRect(ctx, x - size / 2, y - size / 2, size, size, 10, false, true);

            const signalSize = 5;
            const signals = [
                [x - ROAD_WIDTH / 2 + 22, y - ROAD_WIDTH / 2 + 22],
                [x + ROAD_WIDTH / 2 - 22, y - ROAD_WIDTH / 2 + 22],
                [x - ROAD_WIDTH / 2 + 22, y + ROAD_WIDTH / 2 - 22],
                [x + ROAD_WIDTH / 2 - 22, y + ROAD_WIDTH / 2 - 22]
            ];
            signals.forEach((p, idx) => {
                const green = Math.sin(gameTime * 1.3 + idx) > 0;
                ctx.fillStyle = green ? 'rgba(46, 255, 138, 0.72)' : 'rgba(255, 65, 109, 0.72)';
                ctx.shadowBlur = 5;
                ctx.shadowColor = ctx.fillStyle;
                ctx.beginPath();
                ctx.arc(p[0], p[1], signalSize, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            });
        }

        function drawStreetLights() {
            streetLights.forEach(light => {
                if (!isVisible(light.x - 110, light.y - 110, 220, 220, 100)) return;
                const pulse = 0.78;
                const glow = ctx.createRadialGradient(light.x, light.y, 0, light.x, light.y, 95);
                glow.addColorStop(0, `rgba(0, 243, 255, ${0.07 * pulse})`);
                glow.addColorStop(1, 'rgba(0, 243, 255, 0)');
                ctx.fillStyle = glow;
                ctx.fillRect(light.x - 95, light.y - 95, 190, 190);

                ctx.fillStyle = 'rgba(210, 250, 255, 0.9)';
                ctx.shadowBlur = 5;
                ctx.shadowColor = '#00f3ff';
                ctx.beginPath();
                ctx.arc(light.x, light.y, 3.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            });
        }

        function drawBuildings() {
            buildings.forEach(b => {
                if (!isVisible(b.x - 80, b.y - 80, b.w + 160, b.h + 160, 160)) return;
                const depth = b.height * 0.32;

                ctx.fillStyle = 'rgba(0, 0, 0, 0.38)';
                drawRoundedRect(ctx, b.x + depth, b.y + depth, b.w, b.h, 8, true, false);

                ctx.fillStyle = 'rgba(5, 7, 15, 0.7)';
                drawRoundedRect(ctx, b.x + depth * 0.45, b.y + depth * 0.45, b.w, b.h, 8, true, false);

                const roof = ctx.createLinearGradient(b.x, b.y, b.x + b.w, b.y + b.h);
                roof.addColorStop(0, b.roofColor);
                roof.addColorStop(0.62, b.color);
                roof.addColorStop(1, '#060711');
                ctx.fillStyle = roof;
                drawRoundedRect(ctx, b.x, b.y, b.w, b.h, 8, true, false);

                ctx.strokeStyle = 'rgba(255, 255, 255, 0.08)';
                ctx.lineWidth = 1;
                drawRoundedRect(ctx, b.x + 0.5, b.y + 0.5, b.w - 1, b.h - 1, 8, false, true);

                ctx.strokeStyle = `${hexToRgba(b.accent, 0.24)}`;
                ctx.shadowBlur = 5;
                ctx.shadowColor = b.accent;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(b.x + 16, b.y + 18);
                ctx.lineTo(b.x + b.w - 16, b.y + 18);
                ctx.moveTo(b.x + 18, b.y + 16);
                ctx.lineTo(b.x + 18, b.y + b.h - 16);
                ctx.stroke();
                ctx.shadowBlur = 0;

                b.roofDetails.forEach(d => {
                    ctx.fillStyle = `hsl(220, 18%, ${d.tone}%)`;
                    drawRoundedRect(ctx, d.x, d.y, d.w, d.h, 4, true, false);
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
                    ctx.fillRect(d.x + 3, d.y + 3, Math.max(2, d.w - 6), 2);
                });

                b.windows.forEach(w => {
                    const flicker = 0.9;
                    ctx.fillStyle = `rgba(${w.color}, ${w.alpha * flicker})`;
                    drawRoundedRect(ctx, w.x, w.y, w.w, w.h, 3, true, false);
                });
            });
        }

        function drawCoin() {
            const pulse = 1 + Math.sin(gameTime * 5.5) * 0.12;
            const spin = Math.cos(gameTime * 5);

            ctx.save();
            ctx.translate(coin.x, coin.y);
            ctx.scale(pulse, pulse);
            ctx.rotate(gameTime * 1.4);

            const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, 56);
            glow.addColorStop(0, 'rgba(255, 215, 0, 0.36)');
            glow.addColorStop(1, 'rgba(255, 215, 0, 0)');
            ctx.fillStyle = glow;
            ctx.fillRect(-56, -56, 112, 112);

            ctx.shadowBlur = 26;
            ctx.shadowColor = varToHex('--neon-gold');
            ctx.fillStyle = '#ffd84a';
            ctx.beginPath();
            ctx.ellipse(0, 0, COIN_RADIUS * Math.max(0.35, Math.abs(spin)), COIN_RADIUS, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.shadowBlur = 0;
            ctx.strokeStyle = '#fff2a4';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.ellipse(0, 0, COIN_RADIUS * Math.max(0.35, Math.abs(spin)) * 0.72, COIN_RADIUS * 0.72, 0, 0, Math.PI * 2);
            ctx.stroke();

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.9)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(-4, -COIN_RADIUS - 12);
            ctx.lineTo(4, -COIN_RADIUS - 4);
            ctx.moveTo(4, -COIN_RADIUS - 12);
            ctx.lineTo(-4, -COIN_RADIUS - 4);
            ctx.stroke();
            ctx.restore();
        }

        function drawCar() {
            const speedFactor = Math.min(1, Math.abs(car.speed) / car.maxSpeed);

            ctx.save();
            ctx.translate(car.x, car.y);
            ctx.rotate(car.angle);

            const beam = ctx.createLinearGradient(car.width / 2, 0, car.width / 2 + 240, 0);
            beam.addColorStop(0, 'rgba(255, 255, 220, 0.12)');
            beam.addColorStop(1, 'rgba(255, 255, 220, 0)');
            ctx.fillStyle = beam;
            ctx.beginPath();
            ctx.moveTo(car.width / 2 - 2, -8);
            ctx.lineTo(car.width / 2 + 230, -62);
            ctx.lineTo(car.width / 2 + 230, 62);
            ctx.lineTo(car.width / 2 - 2, 8);
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = 'rgba(0, 0, 0, 0.42)';
            drawRoundedRect(ctx, -car.width / 2 - 2, -car.height / 2 + 4, car.width + 8, car.height + 8, 8, true, false);

            drawWheel(-car.wheelBase / 2, -car.height / 2 - 3, 0);
            drawWheel(-car.wheelBase / 2, car.height / 2 + 3, 0);
            drawWheel(car.wheelBase / 2, -car.height / 2 - 3, car.steerAngle);
            drawWheel(car.wheelBase / 2, car.height / 2 + 3, car.steerAngle);

            const body = ctx.createLinearGradient(-car.width / 2, -car.height / 2, car.width / 2, car.height / 2);
            body.addColorStop(0, lightenColor(car.color, 0.22));
            body.addColorStop(0.48, car.color);
            body.addColorStop(1, darkenColor(car.color, 0.36));
            ctx.fillStyle = body;
            ctx.shadowBlur = 10;
            ctx.shadowColor = car.color;
            drawCarBodyPath();
            ctx.fill();
            ctx.shadowBlur = 0;

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.lineWidth = 1.3;
            drawCarBodyPath();
            ctx.stroke();

            const canopy = ctx.createLinearGradient(-12, -car.height / 2 + 4, 16, car.height / 2 - 4);
            canopy.addColorStop(0, 'rgba(225, 255, 255, 0.86)');
            canopy.addColorStop(0.45, 'rgba(55, 92, 120, 0.88)');
            canopy.addColorStop(1, 'rgba(8, 16, 31, 0.94)');
            ctx.fillStyle = canopy;
            drawRoundedRect(ctx, -12, -car.height / 2 + 5, 27, car.height - 10, 6, true, false);

            ctx.fillStyle = 'rgba(0, 0, 0, 0.22)';
            ctx.fillRect(-car.width / 2 + 8, -car.height / 2 + 5, 14, car.height - 10);

            ctx.fillStyle = '#fff7c7';
            ctx.shadowBlur = 7;
            ctx.shadowColor = '#fff7c7';
            drawRoundedRect(ctx, car.width / 2 - 7, -car.height / 2 + 3, 6, 6, 2, true, false);
            drawRoundedRect(ctx, car.width / 2 - 7, car.height / 2 - 9, 6, 6, 2, true, false);
            ctx.shadowBlur = 0;

            ctx.fillStyle = '#ff315f';
            drawRoundedRect(ctx, -car.width / 2 + 1, -car.height / 2 + 4, 4, 6, 2, true, false);
            drawRoundedRect(ctx, -car.width / 2 + 1, car.height / 2 - 10, 4, 6, 2, true, false);

            ctx.restore();
        }

        function drawWheel(x, y, angle) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            ctx.fillStyle = '#050507';
            drawRoundedRect(ctx, -car.wheelWidth / 2, -car.wheelHeight / 2, car.wheelWidth, car.wheelHeight, 3, true, false);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.18)';
            ctx.fillRect(-car.wheelWidth / 2 + 2, -1, car.wheelWidth - 4, 2);
            ctx.restore();
        }

        function drawCarBodyPath() {
            const w = car.width;
            const h = car.height;
            ctx.beginPath();
            ctx.moveTo(-w / 2 + 9, -h / 2);
            ctx.lineTo(w / 2 - 8, -h / 2 + 2);
            ctx.quadraticCurveTo(w / 2 + 3, -h / 2 + 6, w / 2 + 2, 0);
            ctx.quadraticCurveTo(w / 2 + 3, h / 2 - 6, w / 2 - 8, h / 2 - 2);
            ctx.lineTo(-w / 2 + 9, h / 2);
            ctx.quadraticCurveTo(-w / 2 - 4, h / 2 - 4, -w / 2 - 5, 0);
            ctx.quadraticCurveTo(-w / 2 - 4, -h / 2 + 4, -w / 2 + 9, -h / 2);
            ctx.closePath();
        }

        function drawPostEffects(speedFactor) {
            const vignette = ctx.createRadialGradient(
                canvas.width / 2,
                canvas.height / 2,
                Math.min(canvas.width, canvas.height) * 0.2,
                canvas.width / 2,
                canvas.height / 2,
                Math.max(canvas.width, canvas.height) * 0.68
            );
            vignette.addColorStop(0, 'rgba(0, 0, 0, 0)');
            vignette.addColorStop(0.72, 'rgba(0, 0, 0, 0.16)');
            vignette.addColorStop(1, 'rgba(0, 0, 0, 0.54)');
            ctx.fillStyle = vignette;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawCrosswalk(x, y) {
            const cwW = 20; // Crosswalk band width
            const stripeW = 6; // Stripe width
            const stripeGap = 12;
            
            ctx.fillStyle = 'rgba(235, 245, 255, 0.48)';

            // Top
            for (let i = -ROAD_WIDTH / 2 + 10; i < ROAD_WIDTH / 2 - 10; i += stripeGap) {
                // Row 1
                ctx.fillRect(x + i, y - ROAD_WIDTH / 2 - cwW - 5, stripeW, cwW);
                // Row 2 (offset)
                ctx.fillRect(x + i + stripeW, y - ROAD_WIDTH / 2 - 2 * cwW - 5, stripeW, cwW);
            }
            // Bottom
            for (let i = -ROAD_WIDTH / 2 + 10; i < ROAD_WIDTH / 2 - 10; i += stripeGap) {
                // Row 1
                ctx.fillRect(x + i, y + ROAD_WIDTH / 2 + 5, stripeW, cwW);
                // Row 2 (offset)
                ctx.fillRect(x + i + stripeW, y + ROAD_WIDTH / 2 + cwW + 5, stripeW, cwW);
            }
            // Left
            for (let i = -ROAD_WIDTH / 2 + 10; i < ROAD_WIDTH / 2 - 10; i += stripeGap) {
                // Row 1
                ctx.fillRect(x - ROAD_WIDTH / 2 - cwW - 5, y + i, cwW, stripeW);
                // Row 2 (offset)
                ctx.fillRect(x - ROAD_WIDTH / 2 - 2 * cwW - 5, y + i + stripeW, cwW, stripeW);
            }
            // Right
            for (let i = -ROAD_WIDTH / 2 + 10; i < ROAD_WIDTH / 2 - 10; i += stripeGap) {
                // Row 1
                ctx.fillRect(x + ROAD_WIDTH / 2 + 5, y + i, cwW, stripeW);
                // Row 2 (offset)
                ctx.fillRect(x + ROAD_WIDTH / 2 + cwW + 5, y + i + stripeW, cwW, stripeW);
            }
            ctx.shadowBlur = 0;
        }

        function drawRoundedRect(targetCtx, x, y, w, h, r, fill, stroke) {
            const radius = Math.min(r, Math.abs(w) / 2, Math.abs(h) / 2);
            targetCtx.beginPath();
            targetCtx.moveTo(x + radius, y);
            targetCtx.lineTo(x + w - radius, y);
            targetCtx.quadraticCurveTo(x + w, y, x + w, y + radius);
            targetCtx.lineTo(x + w, y + h - radius);
            targetCtx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
            targetCtx.lineTo(x + radius, y + h);
            targetCtx.quadraticCurveTo(x, y + h, x, y + h - radius);
            targetCtx.lineTo(x, y + radius);
            targetCtx.quadraticCurveTo(x, y, x + radius, y);
            targetCtx.closePath();
            if (fill) targetCtx.fill();
            if (stroke) targetCtx.stroke();
        }

        function isVisible(x, y, w, h, margin = 0) {
            const left = car.x - canvas.width / 2 - margin;
            const right = car.x + canvas.width / 2 + margin;
            const top = car.y - canvas.height / 2 - margin;
            const bottom = car.y + canvas.height / 2 + margin;
            return x + w >= left && x <= right && y + h >= top && y <= bottom;
        }

        function hexToRgba(hex, alpha) {
            const value = hex.replace('#', '');
            const r = parseInt(value.slice(0, 2), 16);
            const g = parseInt(value.slice(2, 4), 16);
            const b = parseInt(value.slice(4, 6), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        function adjustColor(hex, amount) {
            const value = hex.replace('#', '');
            const r = Math.max(0, Math.min(255, parseInt(value.slice(0, 2), 16) + amount));
            const g = Math.max(0, Math.min(255, parseInt(value.slice(2, 4), 16) + amount));
            const b = Math.max(0, Math.min(255, parseInt(value.slice(4, 6), 16) + amount));
            return `rgb(${r}, ${g}, ${b})`;
        }

        function lightenColor(hex, factor) {
            return adjustColor(hex, Math.round(255 * factor));
        }

        function darkenColor(hex, factor) {
            return adjustColor(hex, -Math.round(255 * factor));
        }

        function drawMinimap() {
            mCtx.clearRect(0, 0, mCanvas.width, mCanvas.height);
            const scale = mCanvas.width / WORLD_SIZE;

            mCtx.fillStyle = '#07101d';
            mCtx.fillRect(0, 0, mCanvas.width, mCanvas.height);

            mCtx.strokeStyle = 'rgba(0, 243, 255, 0.18)';
            mCtx.lineWidth = 1;
            for (let i = 0; i <= WORLD_SIZE; i += BLOCK_SIZE) {
                mCtx.beginPath();
                mCtx.moveTo(0, i * scale);
                mCtx.lineTo(mCanvas.width, i * scale);
                mCtx.moveTo(i * scale, 0);
                mCtx.lineTo(i * scale, mCanvas.height);
                mCtx.stroke();
            }

            mCtx.fillStyle = 'rgba(255, 255, 255, 0.04)';
            for (let i = 0; i <= WORLD_SIZE; i += BLOCK_SIZE) {
                mCtx.fillRect(0, (i - ROAD_WIDTH / 2) * scale, mCanvas.width, ROAD_WIDTH * scale);
                mCtx.fillRect((i - ROAD_WIDTH / 2) * scale, 0, ROAD_WIDTH * scale, mCanvas.height);
            }

            mCtx.fillStyle = '#253047';
            buildings.forEach(b => {
                mCtx.fillRect(b.x * scale, b.y * scale, b.w * scale, b.h * scale);
            });

            mCtx.fillStyle = varToHex('--neon-gold');
            mCtx.shadowBlur = 8;
            mCtx.shadowColor = varToHex('--neon-gold');
            mCtx.beginPath();
            mCtx.arc(coin.x * scale, coin.y * scale, 4, 0, Math.PI * 2);
            mCtx.fill();
            mCtx.shadowBlur = 0;

            const viewW = canvas.width * scale;
            const viewH = canvas.height * scale;
            mCtx.strokeStyle = 'rgba(255, 255, 255, 0.45)';
            mCtx.lineWidth = 1;
            mCtx.strokeRect(car.x * scale - viewW / 2, car.y * scale - viewH / 2, viewW, viewH);

            mCtx.fillStyle = car.color;
            mCtx.shadowBlur = 8;
            mCtx.shadowColor = car.color;
            mCtx.beginPath();
            mCtx.arc(car.x * scale, car.y * scale, 5, 0, Math.PI * 2);
            mCtx.fill();
            mCtx.shadowBlur = 0;

            mCtx.strokeStyle = 'white';
            mCtx.lineWidth = 1.5;
            mCtx.beginPath();
            mCtx.moveTo(car.x * scale, car.y * scale);
            mCtx.lineTo((car.x + Math.cos(car.angle) * 300) * scale, (car.y + Math.sin(car.angle) * 300) * scale);
            mCtx.stroke();
        }

        function varToHex(varName) {
            return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
        }

        // Controls
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        // Joystick
        const jContainer = document.getElementById('joystick-container');
        const jKnob = document.getElementById('joystick-knob');
        jContainer.addEventListener('touchstart', e => { joystick.active = true; });
        window.addEventListener('touchmove', e => {
            if (!joystick.active) return;
            const rect = jContainer.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            const tx = e.touches[0].clientX - cx;
            const ty = e.touches[0].clientY - cy;
            const dist = Math.hypot(tx, ty);
            const max = rect.width / 2;
            const nx = tx / (dist || 1);
            const ny = ty / (dist || 1);
            const limitedDist = Math.min(dist, max);

            joystick.x = (nx * limitedDist) / max;
            joystick.y = (ny * limitedDist) / max;

            jKnob.style.transform = `translate(calc(-50% + ${nx * limitedDist}px), calc(-50% + ${ny * limitedDist}px))`;
        });
        window.addEventListener('touchend', () => {
            joystick.active = false;
            joystick.x = 0; joystick.y = 0;
            jKnob.style.transform = 'translate(-50%, -50%)';
        });

        function loop(timestamp) {
            requestAnimationFrame(loop);
            
            if (!lastFrameTime) lastFrameTime = timestamp;
            const elapsed = timestamp - lastFrameTime;
            lastFrameTime = timestamp;
            gameTime = timestamp / 1000;

            // Calculate delta time factor (1.0 = 60fps)
            // Limit delta to avoid huge jumps if window loses focus
            const dt = Math.min(elapsed / (1000 / 60), 3);

            if (shopModal.style.display !== 'flex') update(dt);
            draw();
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            mCanvas.width = 200;
            mCanvas.height = 200;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        init();
        requestAnimationFrame(loop);
    </script>
