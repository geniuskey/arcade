            drawParticleField();

            // Player tank
            drawPlayerTank();

            // Player HP bar (below tank)
            const playerHpPercent = player.hp / player.maxHp;
            drawHealthBar(player.x - 28, player.y + player.height / 2 + 7, 56, 8, playerHpPercent);

            // Player bullets
            bullets.forEach(b => {
                drawProjectile(b, true);
            });

            // Enemy bullets
            enemyBullets.forEach(b => {
                drawProjectile(b, false);
            });

            // Enemies
            enemies.forEach(enemy => {
                drawEnemy(enemy);

                // Health bar
                const hpPercent = enemy.hp / enemy.maxHp;
                drawHealthBar(enemy.x - 21, enemy.y - enemy.height / 2 - 12, 42, 5, hpPercent);
            });

            // Boss
            if (boss) {
                const shakeX = boss.gatlingShakeX || 0;
                drawBossTank(boss, shakeX);

                // Boss health bar
                const hpPercent = boss.hp / boss.maxHp;
                drawHealthBar(canvas.width / 2 - 155, 20, 310, 22, hpPercent, `BOSS - Stage ${stage}`);
            }

            // Stage transition text
            if (bossMode && !boss) {
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 24px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('GET READY!', canvas.width / 2, canvas.height / 2);
            }

            // Stage announcement
            if (stageAnnounce.active) {
                const progress = stageAnnounce.timer / stageAnnounce.duration;
                let alpha = 1;
                let scale = 1;

                // Fade in
                if (progress < 0.2) {
                    alpha = progress / 0.2;
                    scale = 0.5 + (progress / 0.2) * 0.5;
                }
                // Fade out
                else if (progress > 0.7) {
                    alpha = 1 - ((progress - 0.7) / 0.3);
                }

                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.translate(canvas.width / 2, canvas.height / 2);
                ctx.scale(scale, scale);

                // Glow effect
                ctx.shadowColor = '#60a5fa';
                ctx.shadowBlur = 30;

                // Stage text
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 72px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(`STAGE ${stageAnnounce.stage}`, 0, 0);

                // Decorative lines
                ctx.strokeStyle = '#60a5fa';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(-200, 50);
                ctx.lineTo(-50, 50);
                ctx.moveTo(50, 50);
                ctx.lineTo(200, 50);
                ctx.stroke();

                ctx.restore();
            }

            // Celebration effect
            if (celebration.active) {
                const progress = celebration.timer / celebration.duration;

                // Draw confetti
                celebration.confetti.forEach(c => {
                    ctx.save();
                    ctx.translate(c.x, c.y);
                    ctx.rotate(c.rotation);
                    ctx.fillStyle = c.color;
                    ctx.globalAlpha = Math.max(0, 1 - progress);
                    ctx.fillRect(-c.size / 2, -c.size / 2, c.size, c.size * 0.6);
                    ctx.restore();
                });

                // Draw celebration message
                if (progress < 0.8) {
                    const msgProgress = Math.min(1, progress / 0.3);
                    const scale = 0.5 + msgProgress * 0.5 + Math.sin(celebration.timer * 0.2) * 0.05;
                    const alpha = progress < 0.6 ? 1 : 1 - ((progress - 0.6) / 0.2);

                    ctx.save();
                    ctx.globalAlpha = alpha;
                    ctx.translate(canvas.width / 2, canvas.height / 2 - 50);
                    ctx.scale(scale, scale);

                    // Rainbow glow effect
                    const hue = (celebration.timer * 5) % 360;
                    ctx.shadowColor = `hsl(${hue}, 100%, 50%)`;
                    ctx.shadowBlur = 40;

                    // Message text
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 64px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(celebration.message, 0, 0);

                    // Bonus score text
                    ctx.font = 'bold 28px Arial';
                    ctx.fillStyle = '#fbbf24';
                    ctx.shadowColor = '#fbbf24';
                    ctx.fillText(`+${1000 * (stage - 1)} BONUS!`, 0, 50);

                    ctx.restore();
                }
            }
            ctx.restore();
        }

        function gameLoop() {
            if (!gameRunning) return;

            if (!gamePaused) update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Show start screen
        setOverlay('start', 'Tank Survival', '적 탱크, 헬리콥터, 로봇들로부터 살아남으세요!', '', 'START GAME');

        // Initial draw
        draw();
    </script>
</body>

</html>
