<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tank Survival</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background:
                radial-gradient(circle at 50% 0%, rgba(148, 163, 184, 0.18), transparent 32%),
                radial-gradient(circle at 8% 95%, rgba(245, 158, 11, 0.12), transparent 30%),
                linear-gradient(135deg, #07090d 0%, #111922 50%, #080b0f 100%);
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
        }

        /* Mobile: align to top to leave room for controls */
        @media (pointer: coarse) {
            body {
                align-items: flex-start;
                padding-top: 10px;
            }
        }

        #gameContainer {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            filter: drop-shadow(0 24px 55px rgba(0, 0, 0, 0.45));
        }

        #ui {
            display: flex;
            gap: 30px;
            padding: 12px 24px;
            background: rgba(8, 12, 18, 0.78);
            border: 1px solid rgba(148, 163, 184, 0.24);
            border-radius: 8px;
            margin-bottom: 10px;
            color: white;
            font-size: 18px;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 12px 30px rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(12px);
        }

        #ui div {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #soundBtn {
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(148, 163, 184, 0.45);
            border-radius: 6px;
            color: #fff;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        #soundBtn:hover {
            border-color: #fff;
        }

        #soundBtn.off {
            color: #666;
            border-color: #444;
        }

        #pauseBtn {
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(148, 163, 184, 0.45);
            border-radius: 6px;
            color: #fff;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        #pauseBtn:hover {
            border-color: #fff;
        }

        #pauseBtn.paused {
            color: #fbbf24;
            border-color: rgba(251, 191, 36, 0.8);
        }

        .label {
            color: #888;
        }

        .value {
            font-weight: bold;
            min-width: 40px;
        }

        #hp {
            color: #4ade80;
        }

        #stage {
            color: #60a5fa;
        }

        #score {
            color: #fbbf24;
        }

        #enemies {
            color: #f87171;
        }

        canvas {
            border: 1px solid rgba(203, 213, 225, 0.22);
            border-radius: 8px;
            background: #0f171d;
            box-shadow:
                inset 0 0 0 1px rgba(255, 255, 255, 0.04),
                inset 0 0 80px rgba(0, 0, 0, 0.55),
                0 0 0 1px rgba(0, 0, 0, 0.55),
                0 22px 60px rgba(0, 0, 0, 0.5);
        }

        #overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(5, 8, 12, 0.9);
            padding: 40px 60px;
            border: 1px solid rgba(203, 213, 225, 0.2);
            border-radius: 8px;
            text-align: center;
            color: white;
            display: none;
            z-index: 100;
            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(14px);
        }

        #overlay h1 {
            font-size: 36px;
            margin-bottom: 20px;
        }

        #overlay p {
            font-size: 18px;
            margin-bottom: 15px;
            color: #aaa;
        }

        #overlay .highlight {
            color: #fbbf24;
            font-size: 24px;
        }

        #overlay button {
            margin-top: 20px;
            padding: 15px 40px;
            font-size: 20px;
            background: linear-gradient(180deg, #86efac, #22c55e);
            border: none;
            border-radius: 7px;
            cursor: pointer;
            color: #1a1a2e;
            font-weight: bold;
            transition: transform 0.1s, filter 0.2s;
            box-shadow: 0 10px 24px rgba(34, 197, 94, 0.28);
        }

        #overlay button:hover {
            filter: brightness(1.08);
            transform: scale(1.05);
        }

        #arenaPicker {
            margin: 8px 0 4px;
        }

        .arena-title {
            color: #94a3b8;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.08em;
            margin-bottom: 10px;
        }

        #arenaOptions {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
            width: min(360px, 72vw);
            margin: 0 auto 2px;
        }

        #arenaOptions button {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0;
            padding: 9px 11px;
            min-height: 40px;
            font-size: 14px;
            line-height: 1.1;
            background: rgba(15, 23, 42, 0.78);
            border: 1px solid rgba(148, 163, 184, 0.36);
            border-radius: 7px;
            color: #e5e7eb;
            box-shadow: none;
            transform: none;
        }

        #arenaOptions button:hover {
            border-color: var(--arena-color);
            filter: none;
            transform: none;
        }

        #arenaOptions button.active {
            color: #ffffff;
            border-color: var(--arena-color);
            background: linear-gradient(180deg, rgba(30, 41, 59, 0.95), rgba(15, 23, 42, 0.92));
            box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--arena-color) 40%, transparent), 0 0 18px color-mix(in srgb, var(--arena-color) 24%, transparent);
        }

        .arena-swatch {
            width: 14px;
            height: 14px;
            flex: 0 0 auto;
            border-radius: 50%;
            background: var(--arena-color);
            box-shadow: 0 0 12px color-mix(in srgb, var(--arena-color) 70%, transparent);
        }

        @media (max-width: 520px) {
            #arenaOptions {
                width: min(320px, 78vw);
            }

            #arenaOptions button {
                font-size: 12px;
                padding: 8px 9px;
            }
        }
        #bossWarning {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            color: #ef4444;
            font-weight: bold;
            text-shadow: 0 0 20px #ef4444;
            display: none;
            animation: pulse 0.5s ease-in-out infinite;
            z-index: 50;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }

            50% {
                opacity: 0.7;
                transform: translate(-50%, -50%) scale(1.1);
            }
        }

        #controls {
            margin-top: 10px;
            color: #666;
            font-size: 14px;
        }

        /* Mobile Controls */
        #mobileControls {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 15px;
            padding-bottom: calc(15px + env(safe-area-inset-bottom, 0px));
            pointer-events: none;
            z-index: 200;
        }

        .joystick-container {
            position: absolute;
            bottom: calc(30px + env(safe-area-inset-bottom, 0px));
            width: 120px;
            height: 120px;
            pointer-events: auto;
        }

        #moveJoystick {
            left: 20px;
        }

        #aimJoystick {
            right: 20px;
        }

        .joystick-base {
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.55);
            border: 2px solid rgba(203, 213, 225, 0.4);
            border-radius: 50%;
            position: relative;
            box-shadow: inset 0 0 24px rgba(255, 255, 255, 0.08), 0 14px 32px rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(8px);
        }

        .joystick-stick {
            width: 50px;
            height: 50px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.82), rgba(148, 163, 184, 0.65));
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: none;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.35);
        }

        #fireBtn {
            display: none;
        }

        .joystick-label {
            position: absolute;
            bottom: -25px;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
        }

        /* Responsive */
        @media (max-width: 920px) {
            #ui {
                gap: 10px;
                padding: 8px 15px;
                font-size: 12px;
            }

            #ui .label {
                display: none;
            }

            #controls {
                display: none;
            }
        }

        @media (pointer: coarse) {
            #mobileControls {
                display: block;
            }

            #controls {
                display: none;
            }
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            text-decoration: none;
            color: white;
            background: rgba(0, 0, 0, 0.5);
            padding: 6px 12px;
            border-radius: 15px;
            font-family: sans-serif;
            font-size: 12px;
            transition: background 0.3s;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .back-btn:hover {
            background: rgba(0, 0, 0, 0.8);
        }
    </style>
</head>

<body>
    <a href="../" class="back-btn">← Arcade</a>
    <div id="gameContainer">
        <div id="ui">
            <div><span class="label">HP:</span><span id="hp" class="value">100</span></div>
            <div><span class="label">STAGE:</span><span id="stage" class="value">1</span></div>
            <div><span class="label">SCORE:</span><span id="score" class="value">0</span></div>
            <div><span class="label">ENEMIES:</span><span id="enemies" class="value">0</span></div>
            <button id="pauseBtn">PAUSE</button>
            <button id="soundBtn">SOUND ON</button>
        </div>
        <canvas id="game" width="800" height="800"></canvas>
        <div id="bossWarning">WARNING! BOSS INCOMING!</div>
        <div id="overlay">
            <h1 id="overlayTitle">Tank Survival</h1>
            <p id="overlayText">적 탱크, 헬리콥터, 로봇들로부터 살아남으세요!</p>
            <p class="highlight" id="overlayScore"></p>
            <div id="arenaPicker">
                <div class="arena-title">장소 선택</div>
                <div id="arenaOptions"></div>
            </div>
            <button id="startBtn">START GAME</button>
        </div>
        <div id="controls">WASD: Move Tank | Arrow Keys: Aim Turret | SPACE: Shoot</div>
    </div>

    <!-- Mobile Controls -->
    <div id="mobileControls">
        <div id="moveJoystick" class="joystick-container">
            <div class="joystick-base">
                <div class="joystick-stick" id="moveStick"></div>
            </div>
            <div class="joystick-label">MOVE</div>
        </div>
        <div id="aimJoystick" class="joystick-container">
            <div class="joystick-base">
                <div class="joystick-stick" id="aimStick"></div>
            </div>
            <div class="joystick-label">FIRE</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');
        const bossWarning = document.getElementById('bossWarning');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const arenaPicker = document.getElementById('arenaPicker');
        const arenaOptions = document.getElementById('arenaOptions');

        // Audio Context
        let audioCtx = null;
        let soundEnabled = true;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // Sound toggle button
        const soundBtn = document.getElementById('soundBtn');
        soundBtn.addEventListener('click', () => {
            soundEnabled = !soundEnabled;
            soundBtn.textContent = soundEnabled ? 'SOUND ON' : 'SOUND OFF';
            soundBtn.classList.toggle('off', !soundEnabled);
        });

        function playShoot() {
            if (!audioCtx || !soundEnabled) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.type = 'square';
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.1);

            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);

            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function playEnemyShoot() {
            if (!audioCtx || !soundEnabled) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            // Different sound from player - lower pitched "thump"
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(150 + Math.random() * 50, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(60, audioCtx.currentTime + 0.1);

            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);

            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function playExplosion(big = false) {
            if (!audioCtx || !soundEnabled) return;

            const duration = big ? 0.5 : 0.2;
            const volume = big ? 0.4 : 0.2;

            // Noise generator
            const bufferSize = audioCtx.sampleRate * duration;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);

            for (let i = 0; i < bufferSize; i++) {
                data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, big ? 1.5 : 2);
            }

            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;

            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(big ? 800 : 1000, audioCtx.currentTime);
            filter.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + duration);

            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(volume, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);

            noise.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);

            noise.start(audioCtx.currentTime);
        }

        function playHit() {
            if (!audioCtx || !soundEnabled) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.05);

            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);

            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.05);
        }

        function playPowerup() {
            if (!audioCtx || !soundEnabled) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1);
            osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.2);

            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);

            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.2);
        }

        function playCelebration() {
            if (!audioCtx || !soundEnabled) return;
            // Victory fanfare - ascending notes
            const notes = [523, 659, 784, 1047]; // C5, E5, G5, C6
            notes.forEach((freq, i) => {
                setTimeout(() => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                    osc.start(audioCtx.currentTime);
                    osc.stop(audioCtx.currentTime + 0.3);
                }, i * 100);
            });
        }

        // Game state
        let gameRunning = false;
        let gamePaused = false;
        let overlayMode = 'start';
        let score = 0;
        let stage = 1;
        let enemiesRemaining = 0;
        let bossMode = false;
        let boss = null;

        // Stage announcement
        let stageAnnounce = {
            active: false,
            timer: 0,
            duration: 120,
            stage: 1
        };

        // Boss defeat celebration
        let celebration = {
            active: false,
            timer: 0,
            duration: 110,
            messages: ['AWESOME!', 'INCREDIBLE!', 'AMAZING!', 'FANTASTIC!', 'UNSTOPPABLE!', 'LEGENDARY!'],
            message: '',
            bonus: 0,
            confetti: []
        };

        let bossExplosion = {
            active: false,
            timer: 0,
            duration: 230,
            x: 0,
            y: 0,
            angle: 0,
            bursts: [],
            debris: [],
            smoke: [],
            mushroom: [],
            shockwaves: []
        };

        // Input
        const keys = {};

        // Mobile controls state
        const mobileInput = {
            moveX: 0,
            moveY: 0,
            aimX: 0,
            aimY: 0,
            firing: false
        };
        let isMobile = false;

        // Canvas scaling
        let canvasScale = 1;
        const baseWidth = 800;
        const baseHeight = 800;
        const terrainDetails = createTerrainDetails(96);
        const palette = {
            steel: '#1f2933',
            steelDark: '#0b1117',
            panel: '#19232b',
            panelLine: '#31414d',
            player: '#36d474',
            playerDark: '#0f6b39',
            enemy: '#ef4444',
            enemyDark: '#7f1d1d',
            amber: '#fbbf24',
            smoke: 'rgba(15, 23, 42, 0.55)'
        };
        const battlefields = [
            {
                id: 'castle',
                name: '성 안',
                swatch: '#94a3b8',
                floor: ['#3f4651', '#232b35', '#111827'],
                diagonal: 'rgba(203, 213, 225, 0.1)',
                grid: 'rgba(203, 213, 225, 0.12)',
                major: 'rgba(148, 163, 184, 0.14)',
                craterDark: '#0f172a',
                craterMid: '#334155',
                plate: '#64748b',
                plateLine: '#cbd5e1',
                scrapeLight: '#e2e8f0',
                scrapeDark: '#020617',
                rivet: '#cbd5e1',
                vignette: 0.38
            },
            {
                id: 'palace',
                name: '궁 마당',
                swatch: '#fbbf24',
                floor: ['#61513b', '#3e3021', '#17110b'],
                diagonal: 'rgba(251, 191, 36, 0.08)',
                grid: 'rgba(254, 215, 170, 0.12)',
                major: 'rgba(251, 191, 36, 0.13)',
                craterDark: '#1c1208',
                craterMid: '#92400e',
                plate: '#b45309',
                plateLine: '#fde68a',
                scrapeLight: '#fef3c7',
                scrapeDark: '#451a03',
                rivet: '#fbbf24',
                vignette: 0.34
            },
            {
                id: 'ruins',
                name: '부서진 건물 안',
                swatch: '#ef4444',
                floor: ['#4b3430', '#251c1b', '#0f0b0b'],
                diagonal: 'rgba(248, 113, 113, 0.08)',
                grid: 'rgba(148, 163, 184, 0.09)',
                major: 'rgba(248, 113, 113, 0.1)',
                craterDark: '#020617',
                craterMid: '#7f1d1d',
                plate: '#57534e',
                plateLine: '#fb923c',
                scrapeLight: '#fed7aa',
                scrapeDark: '#020617',
                rivet: '#fca5a5',
                vignette: 0.45
            },
            {
                id: 'armory',
                name: '지하 무기고',
                swatch: '#22c55e',
                floor: ['#1f332b', '#13231d', '#07110d'],
                diagonal: 'rgba(74, 222, 128, 0.09)',
                grid: 'rgba(34, 197, 94, 0.11)',
                major: 'rgba(148, 163, 184, 0.11)',
                craterDark: '#020617',
                craterMid: '#14532d',
                plate: '#166534',
                plateLine: '#86efac',
                scrapeLight: '#bbf7d0',
                scrapeDark: '#020617',
                rivet: '#86efac',
                vignette: 0.42
            }
        ];
        let selectedBattlefieldId = battlefields[0].id;

        function getBattlefield() {
            return battlefields.find(field => field.id === selectedBattlefieldId) || battlefields[0];
        }

        function resizeCanvas() {
            const maxWidth = window.innerWidth - 20;
            // On mobile (touch devices), leave more room at bottom for controls
            const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
            const controlsHeight = isTouchDevice ? 200 : 100;
            const maxHeight = window.innerHeight - controlsHeight;

            let newWidth = baseWidth;
            let newHeight = baseHeight;

            if (maxWidth < baseWidth || maxHeight < baseHeight) {
                const scaleX = maxWidth / baseWidth;
                const scaleY = maxHeight / baseHeight;
                canvasScale = Math.min(scaleX, scaleY, 1);
                newWidth = Math.floor(baseWidth * canvasScale);
                newHeight = Math.floor(baseHeight * canvasScale);
            } else {
                canvasScale = 1;
            }

            canvas.style.width = newWidth + 'px';
            canvas.style.height = newHeight + 'px';
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Player
        const player = {
            x: 400,
            y: 700,
            width: 40,
            height: 40,
            speed: 1.6,
            hp: 100,
            maxHp: 100,
            bodyAngle: -Math.PI / 2,
            turretAngle: -Math.PI / 2,
            targetTurretAngle: -Math.PI / 2,
            turretSpeed: 0.06,
            shootCooldown: 0,
            invincible: 0,
            trackPhase: 0
        };

        // Arrays
        let bullets = [];
        let enemyBullets = [];
        let enemies = [];
        let particles = [];
        let enemyExplosions = [];
        let powerups = [];
        let screenShake = 0;
        let visualFrame = 0;
        const maxParticles = 180;
        const maxEnemyBullets = 160;
        const backgroundCache = document.createElement('canvas');
        backgroundCache.width = baseWidth;
        backgroundCache.height = baseHeight;

        // Mobile joystick controls
        function setupJoystick(containerId, stickId, onMove) {
            const container = document.getElementById(containerId);
            const stick = document.getElementById(stickId);
            if (!container || !stick) return;

            let active = false;
            let centerX, centerY;
            const maxDist = 35;

            function handleStart(e) {
                e.preventDefault();
                isMobile = true;
                active = true;
                const rect = container.getBoundingClientRect();
                centerX = rect.left + rect.width / 2;
                centerY = rect.top + rect.height / 2;
                handleMove(e);
            }

            function handleMove(e) {
                if (!active) return;
                e.preventDefault();

                const touch = e.touches ? e.touches[0] : e;
                let dx = touch.clientX - centerX;
                let dy = touch.clientY - centerY;

                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > maxDist) {
                    dx = (dx / dist) * maxDist;
                    dy = (dy / dist) * maxDist;
                }

                stick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                onMove(dx / maxDist, dy / maxDist);
            }

            function handleEnd(e) {
                e.preventDefault();
                active = false;
                stick.style.transform = 'translate(-50%, -50%)';
                onMove(0, 0);
            }

            container.addEventListener('touchstart', handleStart, { passive: false });
            container.addEventListener('touchmove', handleMove, { passive: false });
            container.addEventListener('touchend', handleEnd, { passive: false });
            container.addEventListener('touchcancel', handleEnd, { passive: false });
        }

        function update() {
            // Player tank movement (WASD + Mobile)
            let dx = 0, dy = 0;

            // Keyboard input
            if (keys['KeyW']) dy = -1;
            if (keys['KeyS']) dy = 1;
            if (keys['KeyA']) dx = -1;
            if (keys['KeyD']) dx = 1;

            // Mobile joystick input
            if (Math.abs(mobileInput.moveX) > 0.1 || Math.abs(mobileInput.moveY) > 0.1) {
                dx = mobileInput.moveX;
                dy = mobileInput.moveY;
            }

            if (dx !== 0 || dy !== 0) {
                const len = Math.sqrt(dx * dx + dy * dy);
                dx /= len;
                dy /= len;
                player.x += dx * player.speed;
                player.y += dy * player.speed;
                player.bodyAngle = Math.atan2(dy, dx);
                player.trackPhase += player.speed * 0.9;
            }

            // Turret aiming (Arrow Keys + Mobile)
            const turretKeyPressed = keys['ArrowUp'] || keys['ArrowDown'] || keys['ArrowLeft'] || keys['ArrowRight'];
            const mobileAiming = Math.abs(mobileInput.aimX) > 0.2 || Math.abs(mobileInput.aimY) > 0.2;

            if (mobileAiming) {
                // Mobile: set target angle based on joystick direction
                player.targetTurretAngle = Math.atan2(mobileInput.aimY, mobileInput.aimX);
            } else if (keys['ArrowUp']) {
                player.targetTurretAngle = -Math.PI / 2;      // Up
            } else if (keys['ArrowDown']) {
                player.targetTurretAngle = Math.PI / 2;     // Down
            } else if (keys['ArrowLeft']) {
                player.targetTurretAngle = Math.PI;         // Left
            } else if (keys['ArrowRight']) {
                player.targetTurretAngle = 0;              // Right
            } else {
                player.targetTurretAngle = player.turretAngle;  // Stop at current position
            }

            // Rotate turret towards target angle (shortest path)
            let angleDiff = player.targetTurretAngle - player.turretAngle;
            // Normalize to [-PI, PI]
            while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
            while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;

            if (Math.abs(angleDiff) > 0.01) {
                player.turretAngle += Math.sign(angleDiff) * Math.min(player.turretSpeed, Math.abs(angleDiff));
            }
            // Normalize turret angle
            while (player.turretAngle > Math.PI) player.turretAngle -= Math.PI * 2;
            while (player.turretAngle < -Math.PI) player.turretAngle += Math.PI * 2;

            // Keep player in bounds
            player.x = Math.max(player.width / 2, Math.min(canvas.width - player.width / 2, player.x));
            player.y = Math.max(player.height / 2, Math.min(canvas.height - player.height / 2, player.y));

            // Shooting (Keyboard + Mobile)
            const shooting = keys['Space'] || mobileInput.firing;
            if (shooting && player.shootCooldown <= 0) {
                const muzzleX = player.x + Math.cos(player.turretAngle) * 25;
                const muzzleY = player.y + Math.sin(player.turretAngle) * 25;
                bullets.push({
                    x: muzzleX,
                    y: muzzleY,
                    dx: Math.cos(player.turretAngle) * 4,
                    dy: Math.sin(player.turretAngle) * 4,
                    radius: 5,
                    color: '#fbbf24'
                });
                createParticles(muzzleX, muzzleY, '#fbbf24', 4);
                playShoot();
                player.shootCooldown = 15;
            }
            player.shootCooldown--;
            player.invincible--;

            // Update bullets
            bullets = bullets.filter(b => {
                b.x += b.dx;
                b.y += b.dy;
                return b.x > 0 && b.x < canvas.width && b.y > 0 && b.y < canvas.height;
            });

            // Update enemy bullets
            enemyBullets = enemyBullets.filter(b => {
                b.x += b.dx;
                b.y += b.dy;

                // Check collision with player
                if (player.invincible <= 0 && distance(b, player) < 20) {
                    player.hp -= b.damage || 10;
                    player.invincible = 30;
                    createParticles(player.x, player.y, '#4ade80', 5);

                    if (player.hp <= 0) {
                        gameOver();
                    }
                    return false;
                }

                return b.x > 0 && b.x < canvas.width && b.y > 0 && b.y < canvas.height;
            });
            if (enemyBullets.length > maxEnemyBullets) {
                enemyBullets.splice(0, enemyBullets.length - maxEnemyBullets);
            }

            // Update enemies
            enemies.forEach((enemy, i) => {
                // Move towards player
                const angle = Math.atan2(player.y - enemy.y, player.x - enemy.x);
                enemy.angle = enemy.type === 'tank'
                    ? rotateAngleTowards(enemy.angle, angle, 0.025)
                    : angle;
                enemy.turretAngle = rotateAngleTowards(enemy.turretAngle ?? enemy.angle, angle, enemy.turretSpeed || 0.06);
                enemy.x += Math.cos(angle) * enemy.speed;
                enemy.y += Math.sin(angle) * enemy.speed;
                enemy.trackPhase = (enemy.trackPhase || 0) + enemy.speed * 0.9;

                // Shooting
                enemy.shootCooldown--;
                const shootAngle = enemy.type === 'tank' ? enemy.turretAngle : angle;
                const aimError = Math.abs(normalizeAngle(angle - shootAngle));
                if (enemy.shootCooldown <= 0 && (enemy.type !== 'tank' || aimError < 0.28)) {
                    const muzzleDistance = enemy.type === 'tank' ? enemy.width * 0.72 : enemy.width * 0.3;
                    const muzzleX = enemy.x + Math.cos(shootAngle) * muzzleDistance;
                    const muzzleY = enemy.y + Math.sin(shootAngle) * muzzleDistance;
                    enemyBullets.push({
                        x: muzzleX,
                        y: muzzleY,
                        dx: Math.cos(shootAngle) * 1.25,
                        dy: Math.sin(shootAngle) * 1.25,
                        radius: 4,
                        color: enemy.color,
                        damage: 10
                    });
                    if (enemy.type === 'tank') createParticles(muzzleX, muzzleY, enemy.color, 3);
                    if (Math.random() < 0.6) playEnemyShoot();
                    enemy.shootCooldown = enemy.shootRate;
                }

                // Check collision with player
                if (player.invincible <= 0 && distance(enemy, player) < 30) {
                    player.hp -= 20;
                    player.invincible = 60;
                    createParticles(player.x, player.y, '#4ade80', 8);

                    if (player.hp <= 0) {
                        gameOver();
                    }
                }
            });

            // Bullet-enemy collision
            bullets.forEach((bullet, bi) => {
                enemies.forEach((enemy, ei) => {
                    if (distance(bullet, enemy) < enemy.width / 2 + bullet.radius) {
                        enemy.hp--;
                        createParticles(bullet.x, bullet.y, enemy.color, 3);
                        playHit();
                        bullets.splice(bi, 1);

                        if (enemy.hp <= 0) {
                            score += enemy.score;
                            triggerEnemyExplosion(enemy);
                            playExplosion();
                            enemies.splice(ei, 1);
                            enemiesRemaining--;

                            // Chance to drop powerup
                            if (Math.random() < 0.2) {
                                powerups.push({
                                    x: enemy.x,
                                    y: enemy.y,
                                    type: 'health',
                                    radius: 12
                                });
                            }

                            // Check for boss spawn
                            if (enemiesRemaining <= 0 && !bossMode && !boss) {
                                spawnBoss();
                            }
                        }
                    }
                });
            });

            // Update boss
            if (boss) {
                // Move boss
                if (boss.y < 100) {
                    boss.y += 1;
                } else {
                    // Mode switching timer
                    boss.modeTimer++;
                    if (boss.modeTimer >= boss.modeDuration) {
                        boss.modeTimer = 0;
                        boss.attackMode = boss.attackMode === 'cannon' ? 'gatling' : 'cannon';
                        boss.gatlingShakeX = 0;
                    }

                    if (boss.attackMode === 'cannon') {
                        // Normal movement patterns
                        boss.patternTimer++;

                        if (boss.patternTimer > 180) {
                            boss.pattern = (boss.pattern + 1) % 3;
                            boss.patternTimer = 0;
                        }

                        switch (boss.pattern) {
                            case 0: // Chase
                                const angle = Math.atan2(player.y - boss.y, player.x - boss.x);
                                boss.x += Math.cos(angle) * boss.speed;
                                boss.y += Math.sin(angle) * boss.speed * 0.5;
                                boss.angle = angle;
                                boss.trackPhase = (boss.trackPhase || 0) + boss.speed * 0.8;
                                break;
                            case 1: // Strafe
                                boss.x += Math.sin(boss.patternTimer * 0.025) * 1.5;
                                boss.angle = Math.PI / 2;
                                boss.trackPhase = (boss.trackPhase || 0) + 0.6;
                                break;
                            case 2: // Circle
                                boss.x = canvas.width / 2 + Math.cos(boss.patternTimer * 0.015) * 200;
                                boss.y = 150 + Math.sin(boss.patternTimer * 0.015) * 50;
                                boss.angle = Math.atan2(player.y - boss.y, player.x - boss.x);
                                boss.trackPhase = (boss.trackPhase || 0) + 0.7;
                                break;
                        }

                        // Boss main cannon shooting
                        boss.shootCooldown--;
                        if (boss.shootCooldown <= 0) {
                            const angleToPlayer = Math.atan2(player.y - boss.y, player.x - boss.x);
                            const muzzle = localToWorld(
                                boss.x,
                                boss.y,
                                boss.angle,
                                boss.width * 0.58,
                                0
                            );

                            // Spread shot from main cannon
                            for (let i = -2; i <= 2; i++) {
                                enemyBullets.push({
                                    x: muzzle.x,
                                    y: muzzle.y,
                                    dx: Math.cos(angleToPlayer + i * 0.2) * 1.5,
                                    dy: Math.sin(angleToPlayer + i * 0.2) * 1.5,
                                    radius: 6,
                                    color: '#fbbf24',
                                    damage: 15
                                });
                            }
                            createParticles(muzzle.x, muzzle.y, '#fbbf24', 5);
                            boss.shootCooldown = boss.shootRate;
                        }
                    } else {
                        // Gatling mode: stop and shake while firing
                        boss.angle = Math.PI / 2; // Face down
                        boss.gatlingShakeX = Math.sin(boss.modeTimer * 0.3) * 8;

                        // Gatling guns fire (slower, fewer bullets)
                        boss.gatlingCooldown--;
                        if (boss.gatlingCooldown <= 0) {
                            const angleToPlayer = Math.atan2(player.y - boss.y, player.x - boss.x);
                            const bulletSpeed = 1.2;
                            const gunX = Math.random() > 0.5 ? -52 : 52;
                            const gunMuzzle = localToWorld(
                                boss.x + (boss.gatlingShakeX || 0),
                                boss.y,
                                boss.angle,
                                gunX,
                                34
                            );

                            enemyBullets.push({
                                x: gunMuzzle.x,
                                y: gunMuzzle.y,
                                dx: Math.cos(angleToPlayer) * bulletSpeed + (Math.random() - 0.5) * 0.4,
                                dy: Math.sin(angleToPlayer) * bulletSpeed + (Math.random() - 0.5) * 0.4,
                                radius: 3,
                                color: '#f97316',
                                damage: 5
                            });
                            createParticles(gunMuzzle.x, gunMuzzle.y, '#f97316', 3);

                            boss.gatlingCooldown = boss.gatlingRate;
                        }
                    }
                }

                // Keep boss in bounds
                boss.x = Math.max(boss.width, Math.min(canvas.width - boss.width, boss.x));

                // Bullet-boss collision
                bullets.forEach((bullet, bi) => {
                    if (!boss) return;
                    if (distance(bullet, boss) < boss.width / 2 + bullet.radius) {
                        boss.hp--;
                        createParticles(bullet.x, bullet.y, '#fbbf24', 3);
                        playHit();
                        bullets.splice(bi, 1);

                        if (boss.hp <= 0) {
                            const defeatedBoss = {
                                x: boss.x,
                                y: boss.y,
                                width: boss.width,
                                height: boss.height,
                                angle: boss.angle
                            };
                            const bossBonus = 1000 * stage;
                            score += bossBonus;
                            enemyBullets = [];
                            bullets = [];
                            particles = particles.filter(p => p.life > 18).slice(-70);
                            triggerBossExplosion(defeatedBoss);
                            setTimeout(() => {
                                if (gameRunning) {
                                    playCelebration();
                                    triggerCelebration(bossBonus);
                                }
                            }, 700);
                            boss = null;
                            bossMode = false;
                            nextStage(3200);
                        }
                    }
                });

                // Boss-player collision
                if (boss && player.invincible <= 0 && distance(boss, player) < 50) {
                    player.hp -= 30;
                    player.invincible = 60;
                    createParticles(player.x, player.y, '#4ade80', 10);

                    if (player.hp <= 0) {
                        gameOver();
                    }
                }
            }

            // Update powerups
            powerups = powerups.filter((p, i) => {
                if (distance(p, player) < 25) {
                    if (p.type === 'health') {
                        player.hp = Math.min(player.maxHp, player.hp + 25);
                    }
                    createParticles(p.x, p.y, '#4ade80', 5);
                    playPowerup();
                    return false;
                }
                return true;
            });
            updateEnemyExplosions();
            updateBossExplosion();

            // Update particles
            particles = particles.filter(p => {
                p.x += p.dx;
                p.y += p.dy;
                p.life--;
                p.dx *= 0.95;
                p.dy *= 0.95;
                p.rotation += p.rotationSpeed || 0;
                return p.life > 0;
            });
            screenShake = Math.max(0, screenShake * 0.86 - 0.03);

            // Update UI
            document.getElementById('hp').textContent = Math.max(0, player.hp);
            document.getElementById('hp').style.color = player.hp < 30 ? '#ef4444' : '#4ade80';
            document.getElementById('stage').textContent = stage;
            document.getElementById('score').textContent = score;
            document.getElementById('enemies').textContent = bossMode ? 'BOSS!' : enemiesRemaining;

            // Update stage announcement
            if (stageAnnounce.active) {
                stageAnnounce.timer++;
                if (stageAnnounce.timer >= stageAnnounce.duration) {
                    stageAnnounce.active = false;
                }
            }

            // Update celebration
            if (celebration.active) {
                celebration.timer++;
                celebration.confetti.forEach(c => {
                    c.x += c.dx;
                    c.y += c.dy;
                    c.dy += 0.3; // gravity
                    c.rotation += c.rotationSpeed;
                    c.dx *= 0.99;
                });
                if (celebration.timer >= celebration.duration) {
                    celebration.active = false;
                    celebration.bonus = 0;
                    celebration.confetti = [];
                }
            }
        }

        function nextStage(delay = 1500) {
            setTimeout(() => {
                if (gameRunning && !gamePaused) {
                    stage++;
                    player.hp = Math.min(player.maxHp, player.hp + 30);
                    showStageAnnounce(stage);
                    spawnStageEnemies();
                }
            }, delay);
        }

        function gameOver() {
            gameRunning = false;
            gamePaused = false;
            pauseBtn.classList.remove('paused');
            pauseBtn.textContent = 'PAUSE';
            setOverlay('gameover', 'GAME OVER', `Stage ${stage}까지 도달했습니다!`, `Final Score: ${score}`, 'RETRY');
        }

        function distance(a, b) {
            return Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2);
        }

        function normalizeAngle(angle) {
            while (angle > Math.PI) angle -= Math.PI * 2;
            while (angle < -Math.PI) angle += Math.PI * 2;
            return angle;
        }

        function rotateAngleTowards(current, target, speed) {
            const diff = normalizeAngle(target - current);
            if (Math.abs(diff) <= speed) return target;
            return normalizeAngle(current + Math.sign(diff) * speed);
        }

        function localToWorld(originX, originY, angle, localX, localY) {
            return {
                x: originX + Math.cos(angle) * localX - Math.sin(angle) * localY,
                y: originY + Math.sin(angle) * localX + Math.cos(angle) * localY
            };
        }

        function resetBossExplosion() {
            bossExplosion.active = false;
            bossExplosion.timer = 0;
            bossExplosion.duration = 230;
            bossExplosion.x = 0;
            bossExplosion.y = 0;
            bossExplosion.angle = 0;
            bossExplosion.bursts = [];
            bossExplosion.debris = [];
            bossExplosion.smoke = [];
            bossExplosion.mushroom = [];
            bossExplosion.shockwaves = [];
        }

        function triggerBossExplosion(defeatedBoss) {
            const x = defeatedBoss.x;
            const y = defeatedBoss.y;
            const width = defeatedBoss.width || 80;
            const height = defeatedBoss.height || 80;
            const angle = defeatedBoss.angle || 0;
            const capY = clamp(y - 118, 95, canvas.height - 260);
            const debrisColors = ['#020617', '#111827', '#334155', '#7f1d1d', '#f97316', '#fbbf24'];
            const redArmorColors = ['#f87171', '#ef4444', '#dc2626', '#b91c1c', '#991b1b'];

            bossExplosion.active = true;
            bossExplosion.timer = 0;
            bossExplosion.duration = 230;
            bossExplosion.x = x;
            bossExplosion.y = y;
            bossExplosion.angle = angle;
            bossExplosion.bursts = [
                { delay: 0, x: 0, y: 0, radius: 185, color: '#fff7ed', played: true },
                { delay: 12, x: -46, y: -18, radius: 118, color: '#fde68a', played: false },
                { delay: 22, x: 52, y: 16, radius: 126, color: '#fb923c', played: false },
                { delay: 36, x: -18, y: 42, radius: 92, color: '#ef4444', played: false },
                { delay: 54, x: 26, y: -54, radius: 86, color: '#f97316', played: false }
            ];
            bossExplosion.shockwaves = [
                { delay: 0, radius: 70, maxRadius: 560, life: 96, width: 16 },
                { delay: 20, radius: 42, maxRadius: 430, life: 86, width: 10 },
                { delay: 44, radius: 28, maxRadius: 310, life: 70, width: 6 }
            ];
            bossExplosion.debris = [];
            bossExplosion.smoke = [];
            bossExplosion.mushroom = [];

            for (let i = 0; i < 64; i++) {
                const localX = (Math.random() - 0.5) * width * 1.08;
                const localY = (Math.random() - 0.5) * height * 1.08;
                const origin = localToWorld(x, y, angle, localX, localY);
                const blastAngle = Math.atan2(origin.y - y, origin.x - x) + (Math.random() - 0.5) * 1.15;
                const speed = 3.6 + Math.random() * 8.6;
                const life = 82 + Math.random() * 76;
                bossExplosion.debris.push({
                    x: origin.x,
                    y: origin.y,
                    dx: Math.cos(blastAngle) * speed,
                    dy: Math.sin(blastAngle) * speed - Math.random() * 2.2,
                    gravity: 0.06 + Math.random() * 0.055,
                    size: 3 + Math.random() * 9,
                    stretch: 1.4 + Math.random() * 2.8,
                    color: debrisColors[Math.floor(Math.random() * debrisColors.length)],
                    life,
                    maxLife: life,
                    rotation: Math.random() * Math.PI * 2,
                    rotationSpeed: (Math.random() - 0.5) * 0.5
                });
            }

            for (let i = 0; i < 32; i++) {
                const edgeAngle = Math.random() * Math.PI * 2;
                const localX = Math.cos(edgeAngle) * width * (0.28 + Math.random() * 0.34);
                const localY = Math.sin(edgeAngle) * height * (0.28 + Math.random() * 0.34);
                const origin = localToWorld(x, y, angle, localX, localY);
                const blastAngle = Math.atan2(origin.y - y, origin.x - x) + (Math.random() - 0.5) * 0.62;
                const speed = 6.2 + Math.random() * 9.4;
                const life = 96 + Math.random() * 70;
                bossExplosion.debris.push({
                    x: origin.x,
                    y: origin.y,
                    dx: Math.cos(blastAngle) * speed,
                    dy: Math.sin(blastAngle) * speed - Math.random() * 2.8,
                    gravity: 0.058 + Math.random() * 0.048,
                    size: 6 + Math.random() * 11,
                    stretch: 1.7 + Math.random() * 2.9,
                    color: redArmorColors[Math.floor(Math.random() * redArmorColors.length)],
                    glow: true,
                    shape: 'armor',
                    life,
                    maxLife: life,
                    rotation: Math.random() * Math.PI * 2,
                    rotationSpeed: (Math.random() - 0.5) * 0.62
                });
            }

            for (let i = 0; i < 42; i++) {
                const smokeAngle = Math.random() * Math.PI * 2;
                const dist = Math.random() * 80;
                const life = 116 + Math.random() * 86;
                bossExplosion.smoke.push({
                    x: x + Math.cos(smokeAngle) * dist,
                    y: y + Math.sin(smokeAngle) * dist * 0.58,
                    dx: Math.cos(smokeAngle) * (0.34 + Math.random() * 0.78),
                    dy: -0.18 - Math.random() * 0.46,
                    radius: 24 + Math.random() * 40,
                    grow: 0.34 + Math.random() * 0.4,
                    delay: Math.floor(Math.random() * 34),
                    life,
                    maxLife: life
                });
            }

            for (let i = 0; i < 72; i++) {
                const isCap = i < 42;
                const spread = isCap ? 210 : 54;
                const offsetX = (Math.random() - 0.5) * spread;
                const stemProgress = Math.random();
                const cloudY = isCap
                    ? capY + (Math.random() - 0.5) * 72
                    : y - stemProgress * Math.max(50, y - capY) + (Math.random() - 0.5) * 22;
                const life = 138 + Math.random() * 96;
                bossExplosion.mushroom.push({
                    x: x + offsetX,
                    y: cloudY,
                    dx: isCap ? offsetX * 0.004 : (Math.random() - 0.5) * 0.24,
                    dy: isCap ? -0.04 - Math.random() * 0.18 : -0.34 - Math.random() * 0.34,
                    radius: (isCap ? 28 : 18) + Math.random() * (isCap ? 42 : 24),
                    grow: (isCap ? 0.22 : 0.16) + Math.random() * 0.22,
                    delay: isCap ? 34 + Math.floor(Math.random() * 32) : 16 + Math.floor(Math.random() * 42),
                    life,
                    maxLife: life,
                    tone: 48 + Math.floor(Math.random() * 58)
                });
            }

            createParticles(x, y, '#fff7ed', 42);
            createParticles(x, y, '#fbbf24', 36);
            createParticles(x, y, '#ef4444', 26);
            screenShake = Math.max(screenShake, 26);
            playExplosion(true);
        }

        function updateBossExplosion() {
            if (!bossExplosion.active) return;

            bossExplosion.timer++;
            const t = bossExplosion.timer;

            bossExplosion.bursts.forEach(burst => {
                if (!burst.played && t >= burst.delay) {
                    burst.played = true;
                    createParticles(bossExplosion.x + burst.x, bossExplosion.y + burst.y, burst.color, 24);
                    screenShake = Math.max(screenShake, Math.max(7, 18 - burst.delay * 0.16));
                    playExplosion(burst.radius > 90);
                }
            });

            bossExplosion.debris = bossExplosion.debris.filter(piece => {
                piece.x += piece.dx;
                piece.y += piece.dy;
                piece.dy += piece.gravity;
                piece.dx *= 0.986;
                piece.dy *= 0.992;
                piece.rotation += piece.rotationSpeed;
                piece.life--;
                return piece.life > 0;
            });

            bossExplosion.smoke = bossExplosion.smoke.filter(cloud => {
                if (t < cloud.delay) return true;
                cloud.x += cloud.dx;
                cloud.y += cloud.dy;
                cloud.dx *= 0.984;
                cloud.dy *= 0.992;
                cloud.radius += cloud.grow;
                cloud.life--;
                return cloud.life > 0;
            });

            bossExplosion.mushroom = bossExplosion.mushroom.filter(cloud => {
                if (t < cloud.delay) return true;
                cloud.x += cloud.dx;
                cloud.y += cloud.dy;
                cloud.dx *= 0.992;
                cloud.dy *= 0.995;
                cloud.radius += cloud.grow;
                cloud.life--;
                return cloud.life > 0;
            });

            bossExplosion.shockwaves = bossExplosion.shockwaves.filter(wave => t - wave.delay <= wave.life);

            if (t < 120) {
                screenShake = Math.max(screenShake, 4.5 * (1 - t / 140));
            }

            if (t >= bossExplosion.duration && bossExplosion.debris.length === 0 && bossExplosion.smoke.length === 0 && bossExplosion.mushroom.length === 0) {
                resetBossExplosion();
            }
        }

        function drawBossExplosion() {
            if (!bossExplosion.active) return;

            const t = bossExplosion.timer;
            const progress = clamp(t / bossExplosion.duration, 0, 1);

            if (t < 42) {
                const flashAlpha = t < 8 ? 0.94 : Math.max(0, 0.94 * (1 - (t - 8) / 34));
                ctx.save();
                ctx.globalCompositeOperation = 'lighter';
                ctx.fillStyle = `rgba(255, 255, 255, ${flashAlpha})`;
                ctx.fillRect(-40, -40, canvas.width + 80, canvas.height + 80);
                ctx.restore();
            }

            ctx.save();
            ctx.translate(bossExplosion.x, bossExplosion.y);
            ctx.rotate(bossExplosion.angle);
            ctx.globalAlpha = 0.86 * (1 - progress * 0.38);
            const scorch = ctx.createRadialGradient(0, 0, 8, 0, 0, 190);
            scorch.addColorStop(0, 'rgba(2, 6, 23, 0.92)');
            scorch.addColorStop(0.34, 'rgba(69, 10, 10, 0.6)');
            scorch.addColorStop(0.72, 'rgba(120, 53, 15, 0.24)');
            scorch.addColorStop(1, 'rgba(2, 6, 23, 0)');
            ctx.fillStyle = scorch;
            ctx.beginPath();
            ctx.ellipse(0, 0, 190, 94, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            ctx.save();
            ctx.globalCompositeOperation = 'lighter';
            bossExplosion.shockwaves.forEach(wave => {
                const age = t - wave.delay;
                if (age < 0 || age > wave.life) return;
                const waveProgress = age / wave.life;
                const radius = wave.radius + (wave.maxRadius - wave.radius) * waveProgress;
                ctx.globalAlpha = (1 - waveProgress) * 0.85;
                ctx.strokeStyle = waveProgress < 0.42 ? '#ffffff' : '#fde68a';
                ctx.lineWidth = Math.max(1, wave.width * (1 - waveProgress));
                ctx.beginPath();
                ctx.arc(bossExplosion.x, bossExplosion.y, radius, 0, Math.PI * 2);
                ctx.stroke();

                ctx.globalAlpha = (1 - waveProgress) * 0.28;
                ctx.fillStyle = '#fde68a';
                ctx.beginPath();
                ctx.arc(bossExplosion.x, bossExplosion.y, radius * 0.18, 0, Math.PI * 2);
                ctx.fill();
            });

            bossExplosion.bursts.forEach(burst => {
                const age = t - burst.delay;
                if (age < 0 || age > 76) return;
                const burstProgress = age / 76;
                const eased = Math.sin(Math.min(1, burstProgress) * Math.PI * 0.5);
                const radius = burst.radius * (0.22 + eased * 1.05);
                const alpha = Math.max(0, 1 - burstProgress);
                const gradient = ctx.createRadialGradient(
                    bossExplosion.x + burst.x,
                    bossExplosion.y + burst.y,
                    0,
                    bossExplosion.x + burst.x,
                    bossExplosion.y + burst.y,
                    radius
                );
                gradient.addColorStop(0, colorWithAlpha('#ffffff', alpha));
                gradient.addColorStop(0.18, colorWithAlpha('#fff7ed', alpha * 0.98));
                gradient.addColorStop(0.45, colorWithAlpha(burst.color, alpha * 0.8));
                gradient.addColorStop(0.74, colorWithAlpha('#f97316', alpha * 0.36));
                gradient.addColorStop(1, colorWithAlpha('#7f1d1d', 0));
                ctx.globalAlpha = 1;
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(bossExplosion.x + burst.x, bossExplosion.y + burst.y, radius, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.restore();

            ctx.save();
            ctx.globalCompositeOperation = 'source-over';
            bossExplosion.smoke.forEach(cloud => {
                if (t < cloud.delay) return;
                const alpha = clamp(cloud.life / cloud.maxLife, 0, 1) * 0.54;
                const smoke = ctx.createRadialGradient(cloud.x, cloud.y, 0, cloud.x, cloud.y, cloud.radius);
                smoke.addColorStop(0, `rgba(100, 116, 139, ${alpha})`);
                smoke.addColorStop(0.45, `rgba(51, 65, 85, ${alpha * 0.88})`);
                smoke.addColorStop(1, 'rgba(15, 23, 42, 0)');
                ctx.fillStyle = smoke;
                ctx.beginPath();
                ctx.arc(cloud.x, cloud.y, cloud.radius, 0, Math.PI * 2);
                ctx.fill();
            });

            bossExplosion.mushroom.forEach(cloud => {
                if (t < cloud.delay) return;
                const ageProgress = clamp(1 - cloud.life / cloud.maxLife, 0, 1);
                const alpha = clamp(cloud.life / cloud.maxLife, 0, 1) * 0.72;
                const core = `rgba(${cloud.tone + 38}, ${cloud.tone + 30}, ${cloud.tone + 20}, ${alpha})`;
                const rim = `rgba(15, 23, 42, ${alpha * 0.82})`;
                const cloudGradient = ctx.createRadialGradient(cloud.x, cloud.y, cloud.radius * 0.08, cloud.x, cloud.y, cloud.radius);
                cloudGradient.addColorStop(0, core);
                cloudGradient.addColorStop(0.52, `rgba(71, 85, 105, ${alpha * (0.76 + ageProgress * 0.12)})`);
                cloudGradient.addColorStop(1, 'rgba(15, 23, 42, 0)');
                ctx.fillStyle = cloudGradient;
                ctx.beginPath();
                ctx.arc(cloud.x, cloud.y, cloud.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = rim;
                ctx.lineWidth = Math.max(1, cloud.radius * 0.025);
                ctx.stroke();
            });
            ctx.restore();

            ctx.save();
            bossExplosion.debris.forEach(piece => {
                const alpha = clamp(piece.life / piece.maxLife, 0, 1);
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.translate(piece.x, piece.y);
                ctx.rotate(piece.rotation);
                ctx.fillStyle = piece.color;
                if (piece.shape === 'armor') {
                    ctx.beginPath();
                    ctx.moveTo(-piece.size * piece.stretch * 0.52, -piece.size * 0.34);
                    ctx.lineTo(piece.size * piece.stretch * 0.38, -piece.size * 0.5);
                    ctx.lineTo(piece.size * piece.stretch * 0.58, piece.size * 0.18);
                    ctx.lineTo(-piece.size * piece.stretch * 0.22, piece.size * 0.54);
                    ctx.closePath();
                    ctx.fill();
                    ctx.strokeStyle = colorWithAlpha('#fecaca', alpha * 0.75);
                    ctx.lineWidth = 1.2;
                    ctx.stroke();
                } else {
                    ctx.fillRect(-piece.size * piece.stretch * 0.5, -piece.size * 0.5, piece.size * piece.stretch, piece.size);
                }
                if (alpha > 0.28 && (piece.glow || piece.color === '#f97316' || piece.color === '#fbbf24' || piece.color === '#7f1d1d')) {
                    ctx.globalCompositeOperation = 'lighter';
                    ctx.fillStyle = colorWithAlpha(piece.glow ? '#ef4444' : '#fde68a', alpha * (piece.glow ? 0.72 : 0.58));
                    ctx.fillRect(-piece.size * 0.8, -piece.size * 0.45, piece.size * 1.6, piece.size * 0.9);
                }
                ctx.restore();
            });
            ctx.restore();
        }
        function createTerrainDetails(count) {
            const details = [];
            for (let i = 0; i < count; i++) {
                const roll = Math.random();
                details.push({
                    type: roll > 0.86 ? 'crater' : roll > 0.62 ? 'plate' : roll > 0.32 ? 'scrape' : 'rivet',
                    x: Math.random() * baseWidth,
                    y: Math.random() * baseHeight,
                    w: 24 + Math.random() * 95,
                    h: 12 + Math.random() * 65,
                    r: 8 + Math.random() * 26,
                    rot: Math.random() * Math.PI,
                    alpha: 0.05 + Math.random() * 0.12,
                    seed: Math.random() * 1000
                });
            }
            return details;
        }

        function makeCircleSprite(color, radius, glowAlpha) {
            const size = radius * 6;
            const sprite = document.createElement('canvas');
            sprite.width = size;
            sprite.height = size;
            const sctx = sprite.getContext('2d');
            const cx = size / 2;
            const cy = size / 2;
            sctx.save();
            sctx.translate(cx, cy);
            sctx.globalCompositeOperation = 'lighter';
            const glow = sctx.createRadialGradient(0, 0, 0, 0, 0, radius * 2.4);
            glow.addColorStop(0, colorWithAlpha(color, glowAlpha));
            glow.addColorStop(1, colorWithAlpha(color, 0));
            sctx.fillStyle = glow;
            sctx.beginPath();
            sctx.arc(0, 0, radius * 2.4, 0, Math.PI * 2);
            sctx.fill();
            sctx.fillStyle = color;
            sctx.beginPath();
            sctx.arc(0, 0, radius, 0, Math.PI * 2);
            sctx.fill();
            sctx.fillStyle = '#fff7ed';
            sctx.beginPath();
            sctx.arc(-radius * 0.18, -radius * 0.18, radius * 0.32, 0, Math.PI * 2);
            sctx.fill();
            sctx.restore();
            return sprite;
        }

        function makePowerupSprite() {
            const size = 48;
            const sprite = document.createElement('canvas');
            sprite.width = size;
            sprite.height = size;
            const sctx = sprite.getContext('2d');
            sctx.translate(size / 2, size / 2);
            sctx.globalCompositeOperation = 'lighter';
            const glow = sctx.createRadialGradient(0, 0, 0, 0, 0, 22);
            glow.addColorStop(0, 'rgba(187, 247, 208, 0.8)');
            glow.addColorStop(1, 'rgba(34, 197, 94, 0)');
            sctx.fillStyle = glow;
            sctx.beginPath();
            sctx.arc(0, 0, 22, 0, Math.PI * 2);
            sctx.fill();
            sctx.globalCompositeOperation = 'source-over';
            sctx.fillStyle = '#16a34a';
            sctx.fillRect(-10, -10, 20, 20);
            sctx.strokeStyle = '#bbf7d0';
            sctx.lineWidth = 2;
            sctx.strokeRect(-10, -10, 20, 20);
            sctx.fillStyle = '#ecfdf5';
            sctx.fillRect(-3, -7, 6, 14);
            sctx.fillRect(-7, -3, 14, 6);
            return sprite;
        }

        function buildBackgroundCache() {
            const ctx = backgroundCtx;
            const field = getBattlefield();
            ctx.clearRect(0, 0, backgroundCache.width, backgroundCache.height);

            const floor = ctx.createLinearGradient(0, 0, 0, backgroundCache.height);
            floor.addColorStop(0, field.floor[0]);
            floor.addColorStop(0.45, field.floor[1]);
            floor.addColorStop(1, field.floor[2]);
            ctx.fillStyle = floor;
            ctx.fillRect(0, 0, backgroundCache.width, backgroundCache.height);

            ctx.save();
            ctx.fillStyle = field.diagonal;
            for (let x = -backgroundCache.height; x < backgroundCache.width; x += 96) {
                ctx.save();
                ctx.translate(x, 0);
                ctx.rotate(-Math.PI / 8);
                ctx.fillRect(0, -80, 2, backgroundCache.height + 220);
                ctx.restore();
            }
            ctx.restore();

            terrainDetails.forEach(detail => {
                ctx.save();
                ctx.translate(detail.x, detail.y);
                ctx.rotate(detail.rot);
                if (detail.type === 'crater') {
                    const crater = ctx.createRadialGradient(0, 0, 2, 0, 0, detail.r);
                    crater.addColorStop(0, colorWithAlpha(field.craterDark, detail.alpha + 0.14));
                    crater.addColorStop(0.58, colorWithAlpha(field.craterMid, detail.alpha));
                    crater.addColorStop(1, colorWithAlpha(field.plate, 0));
                    ctx.fillStyle = crater;
                    ctx.beginPath();
                    ctx.ellipse(0, 0, detail.r * 1.45, detail.r * 0.72, 0, 0, Math.PI * 2);
                    ctx.fill();
                } else if (detail.type === 'plate') {
                    fillRoundedRectOn(ctx, -detail.w / 2, -detail.h / 2, detail.w, detail.h, 5, colorWithAlpha(field.plate, detail.alpha * 0.42));
                    strokeRoundedRectOn(ctx, -detail.w / 2, -detail.h / 2, detail.w, detail.h, 5, colorWithAlpha(field.plateLine, detail.alpha));
                } else if (detail.type === 'scrape') {
                    ctx.strokeStyle = colorWithAlpha(field.scrapeLight, detail.alpha);
                    ctx.lineWidth = 1 + detail.alpha * 10;
                    ctx.beginPath();
                    ctx.moveTo(-detail.w / 2, 0);
                    ctx.lineTo(detail.w / 2, Math.sin(detail.seed) * 8);
                    ctx.stroke();
                    ctx.strokeStyle = colorWithAlpha(field.scrapeDark, detail.alpha);
                    ctx.beginPath();
                    ctx.moveTo(-detail.w / 2, 4);
                    ctx.lineTo(detail.w / 2, 4 + Math.cos(detail.seed) * 6);
                    ctx.stroke();
                } else {
                    ctx.fillStyle = colorWithAlpha(field.rivet, detail.alpha);
                    ctx.beginPath();
                    ctx.arc(0, 0, 1.5 + detail.alpha * 10, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
            });

            drawBattlefieldAccentCache(ctx, field);

            ctx.save();
            ctx.strokeStyle = field.grid;
            ctx.lineWidth = 1;
            for (let x = 0; x <= backgroundCache.width; x += 50) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, backgroundCache.height);
                ctx.stroke();
            }
            for (let y = 0; y <= backgroundCache.height; y += 50) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(backgroundCache.width, y);
                ctx.stroke();
            }

            ctx.strokeStyle = field.major;
            ctx.lineWidth = 2;
            for (let x = 0; x <= backgroundCache.width; x += 200) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, backgroundCache.height);
                ctx.stroke();
            }

        function clamp(value, min, max) {

        function colorWithAlpha(color, alpha) {
            if (color && color[0] === '#') {
                let hex = color.slice(1);
                if (hex.length === 3) {
                    hex = hex.split('').map(c => c + c).join('');
                }
                const value = parseInt(hex, 16);
                const r = (value >> 16) & 255;
                const g = (value >> 8) & 255;
                const b = value & 255;
                return `rgba(${r}, ${g}, ${b}, ${alpha})`;
            }
            return color || `rgba(255, 255, 255, ${alpha})`;
        }


        function roundedRectPathOn(targetCtx, x, y, w, h, r) {
            const radius = Math.min(r, Math.abs(w) / 2, Math.abs(h) / 2);
            targetCtx.beginPath();
            targetCtx.moveTo(x + radius, y);
            targetCtx.lineTo(x + w - radius, y);
            targetCtx.quadraticCurveTo(x + w, y, x + w, y + radius);
            targetCtx.lineTo(x + w, y + h - radius);
            targetCtx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
            targetCtx.lineTo(x + radius, y + h);
            targetCtx.quadraticCurveTo(x, y + h, x, y + h - radius);
            targetCtx.lineTo(x, y + radius);
            targetCtx.quadraticCurveTo(x, y, x + radius, y);
        }

        function fillRoundedRectOn(targetCtx, x, y, w, h, r, fillStyle) {
            if (w <= 0 || h <= 0) return;
            targetCtx.fillStyle = fillStyle;
            roundedRectPathOn(targetCtx, x, y, w, h, r);
            targetCtx.fill();
        }

        function strokeRoundedRectOn(targetCtx, x, y, w, h, r, strokeStyle, lineWidth = 1) {
            if (w <= 0 || h <= 0) return;
            targetCtx.strokeStyle = strokeStyle;
            targetCtx.lineWidth = lineWidth;
            roundedRectPathOn(targetCtx, x, y, w, h, r);
            targetCtx.stroke();
        }
        function roundedRectPath(x, y, w, h, r) {
            const radius = Math.min(r, Math.abs(w) / 2, Math.abs(h) / 2);
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + w - radius, y);

            ctx.lineTo(x + w, y + h - radius);

            ctx.lineTo(x + radius, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
        }

            if (w <= 0 || h <= 0) return;

            const dark = options.dark || palette.enemyDark;
