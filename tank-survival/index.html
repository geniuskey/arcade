<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tank Survival</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background:
                radial-gradient(circle at 50% 0%, rgba(148, 163, 184, 0.18), transparent 32%),
                radial-gradient(circle at 8% 95%, rgba(245, 158, 11, 0.12), transparent 30%),
                linear-gradient(135deg, #07090d 0%, #111922 50%, #080b0f 100%);
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
        }

        /* Mobile: align to top to leave room for controls */
        @media (pointer: coarse) {
            body {
                align-items: flex-start;
                padding-top: 10px;
            }
        }

        #gameContainer {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            filter: drop-shadow(0 24px 55px rgba(0, 0, 0, 0.45));
        }

        #ui {
            display: flex;
            gap: 30px;
            padding: 12px 24px;
            background: rgba(8, 12, 18, 0.78);
            border: 1px solid rgba(148, 163, 184, 0.24);
            border-radius: 8px;
            margin-bottom: 10px;
            color: white;
            font-size: 18px;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 12px 30px rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(12px);
        }

        #ui div {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #soundBtn {
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(148, 163, 184, 0.45);
            border-radius: 6px;
            color: #fff;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        #soundBtn:hover {
            border-color: #fff;
        }

        #soundBtn.off {
            color: #666;
            border-color: #444;
        }

        #pauseBtn {
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(148, 163, 184, 0.45);
            border-radius: 6px;
            color: #fff;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        #pauseBtn:hover {
            border-color: #fff;
        }

        #pauseBtn.paused {
            color: #fbbf24;
            border-color: rgba(251, 191, 36, 0.8);
        }

        .label {
            color: #888;
        }

        .value {
            font-weight: bold;
            min-width: 40px;
        }

        #hp {
            color: #4ade80;
        }

        #stage {
            color: #60a5fa;
        }

        #score {
            color: #fbbf24;
        }

        #enemies {
            color: #f87171;
        }

        canvas {
            border: 1px solid rgba(203, 213, 225, 0.22);
            border-radius: 8px;
            background: #0f171d;
            box-shadow:
                inset 0 0 0 1px rgba(255, 255, 255, 0.04),
                inset 0 0 80px rgba(0, 0, 0, 0.55),
                0 0 0 1px rgba(0, 0, 0, 0.55),
                0 22px 60px rgba(0, 0, 0, 0.5);
        }

        #overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(5, 8, 12, 0.9);
            padding: 40px 60px;
            border: 1px solid rgba(203, 213, 225, 0.2);
            border-radius: 8px;
            text-align: center;
            color: white;
            display: none;
            z-index: 100;
            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(14px);
        }

        #overlay h1 {
            font-size: 36px;
            margin-bottom: 20px;
        }

        #overlay p {
            font-size: 18px;
            margin-bottom: 15px;
            color: #aaa;
        }

        #overlay .highlight {
            color: #fbbf24;
            font-size: 24px;
        }

        #overlay button {
            margin-top: 20px;
            padding: 15px 40px;
            font-size: 20px;
            background: linear-gradient(180deg, #86efac, #22c55e);
            border: none;
            border-radius: 7px;
            cursor: pointer;
            color: #1a1a2e;
            font-weight: bold;
            transition: transform 0.1s, filter 0.2s;
            box-shadow: 0 10px 24px rgba(34, 197, 94, 0.28);
        }

        #overlay button:hover {
            filter: brightness(1.08);
            transform: scale(1.05);
        }

        #bossWarning {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            color: #ef4444;
            font-weight: bold;
            text-shadow: 0 0 20px #ef4444;
            display: none;
            animation: pulse 0.5s ease-in-out infinite;
            z-index: 50;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }

            50% {
                opacity: 0.7;
                transform: translate(-50%, -50%) scale(1.1);
            }
        }

        #controls {
            margin-top: 10px;
            color: #666;
            font-size: 14px;
        }

        /* Mobile Controls */
        #mobileControls {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 15px;
            padding-bottom: calc(15px + env(safe-area-inset-bottom, 0px));
            pointer-events: none;
            z-index: 200;
        }

        .joystick-container {
            position: absolute;
            bottom: calc(30px + env(safe-area-inset-bottom, 0px));
            width: 120px;
            height: 120px;
            pointer-events: auto;
        }

        #moveJoystick {
            left: 20px;
        }

        #aimJoystick {
            right: 20px;
        }

        .joystick-base {
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.55);
            border: 2px solid rgba(203, 213, 225, 0.4);
            border-radius: 50%;
            position: relative;
            box-shadow: inset 0 0 24px rgba(255, 255, 255, 0.08), 0 14px 32px rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(8px);
        }

        .joystick-stick {
            width: 50px;
            height: 50px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.82), rgba(148, 163, 184, 0.65));
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: none;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.35);
        }

        #fireBtn {
            display: none;
        }

        .joystick-label {
            position: absolute;
            bottom: -25px;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
        }

        /* Responsive */
        @media (max-width: 920px) {
            #ui {
                gap: 10px;
                padding: 8px 15px;
                font-size: 12px;
            }

            #ui .label {
                display: none;
            }

            #controls {
                display: none;
            }
        }

        @media (pointer: coarse) {
            #mobileControls {
                display: block;
            }

            #controls {
                display: none;
            }
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            text-decoration: none;
            color: white;
            background: rgba(0, 0, 0, 0.5);
            padding: 6px 12px;
            border-radius: 15px;
            font-family: sans-serif;
            font-size: 12px;
            transition: background 0.3s;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .back-btn:hover {
            background: rgba(0, 0, 0, 0.8);
        }
    </style>
</head>

<body>
    <a href="../" class="back-btn">← Arcade</a>
    <div id="gameContainer">
        <div id="ui">
            <div><span class="label">HP:</span><span id="hp" class="value">100</span></div>
            <div><span class="label">STAGE:</span><span id="stage" class="value">1</span></div>
            <div><span class="label">SCORE:</span><span id="score" class="value">0</span></div>
            <div><span class="label">ENEMIES:</span><span id="enemies" class="value">0</span></div>
            <button id="pauseBtn">PAUSE</button>
            <button id="soundBtn">SOUND ON</button>
        </div>
        <canvas id="game" width="800" height="800"></canvas>
        <div id="bossWarning">WARNING! BOSS INCOMING!</div>
        <div id="overlay">
            <h1 id="overlayTitle">Tank Survival</h1>
            <p id="overlayText">적 탱크, 헬리콥터, 로봇들로부터 살아남으세요!</p>
            <p class="highlight" id="overlayScore"></p>
            <button id="startBtn">START GAME</button>
        </div>
        <div id="controls">WASD: Move Tank | Arrow Keys: Aim Turret | SPACE: Shoot</div>
    </div>

    <!-- Mobile Controls -->
    <div id="mobileControls">
        <div id="moveJoystick" class="joystick-container">
            <div class="joystick-base">
                <div class="joystick-stick" id="moveStick"></div>
            </div>
            <div class="joystick-label">MOVE</div>
        </div>
        <div id="aimJoystick" class="joystick-container">
            <div class="joystick-base">
                <div class="joystick-stick" id="aimStick"></div>
            </div>
            <div class="joystick-label">FIRE</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');
        const bossWarning = document.getElementById('bossWarning');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');

        // Audio Context
        let audioCtx = null;
        let soundEnabled = true;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // Sound toggle button
        const soundBtn = document.getElementById('soundBtn');
        soundBtn.addEventListener('click', () => {
            soundEnabled = !soundEnabled;
            soundBtn.textContent = soundEnabled ? 'SOUND ON' : 'SOUND OFF';
            soundBtn.classList.toggle('off', !soundEnabled);
        });

        function playShoot() {
            if (!audioCtx || !soundEnabled) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.type = 'square';
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.1);

            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);

            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function playEnemyShoot() {
            if (!audioCtx || !soundEnabled) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            // Different sound from player - lower pitched "thump"
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(150 + Math.random() * 50, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(60, audioCtx.currentTime + 0.1);

            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);

            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function playExplosion(big = false) {
            if (!audioCtx || !soundEnabled) return;

            const duration = big ? 0.5 : 0.2;
            const volume = big ? 0.4 : 0.2;

            // Noise generator
            const bufferSize = audioCtx.sampleRate * duration;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);

            for (let i = 0; i < bufferSize; i++) {
                data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, big ? 1.5 : 2);
            }

            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;

            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(big ? 800 : 1000, audioCtx.currentTime);
            filter.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + duration);

            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(volume, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);

            noise.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);

            noise.start(audioCtx.currentTime);
        }

        function playHit() {
            if (!audioCtx || !soundEnabled) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.05);

            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);

            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.05);
        }

        function playPowerup() {
            if (!audioCtx || !soundEnabled) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1);
            osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.2);

            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);

            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.2);
        }

        function playCelebration() {
            if (!audioCtx || !soundEnabled) return;
            // Victory fanfare - ascending notes
            const notes = [523, 659, 784, 1047]; // C5, E5, G5, C6
            notes.forEach((freq, i) => {
                setTimeout(() => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                    osc.start(audioCtx.currentTime);
                    osc.stop(audioCtx.currentTime + 0.3);
                }, i * 100);
            });
        }

        // Game state
        let gameRunning = false;
        let gamePaused = false;
        let overlayMode = 'start';
        let score = 0;
        let stage = 1;
        let enemiesRemaining = 0;
        let bossMode = false;
        let boss = null;

        // Stage announcement
        let stageAnnounce = {
            active: false,
            timer: 0,
            duration: 120,
            stage: 1
        };

        // Boss defeat celebration
        let celebration = {
            active: false,
            timer: 0,
            duration: 110,
            messages: ['AWESOME!', 'INCREDIBLE!', 'AMAZING!', 'FANTASTIC!', 'UNSTOPPABLE!', 'LEGENDARY!'],
            message: '',
            confetti: []
        };

        // Input
        const keys = {};

        // Mobile controls state
        const mobileInput = {
            moveX: 0,
            moveY: 0,
            aimX: 0,
            aimY: 0,
            firing: false
        };
        let isMobile = false;

        // Canvas scaling
        let canvasScale = 1;
        const baseWidth = 800;
        const baseHeight = 800;
        const terrainDetails = createTerrainDetails(96);
        const palette = {
            steel: '#1f2933',
            steelDark: '#0b1117',
            panel: '#19232b',
            panelLine: '#31414d',
            player: '#36d474',
            playerDark: '#0f6b39',
            enemy: '#ef4444',
            enemyDark: '#7f1d1d',
            amber: '#fbbf24',
            smoke: 'rgba(15, 23, 42, 0.55)'
        };

        function resizeCanvas() {
            const maxWidth = window.innerWidth - 20;
            // On mobile (touch devices), leave more room at bottom for controls
            const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
            const controlsHeight = isTouchDevice ? 200 : 100;
            const maxHeight = window.innerHeight - controlsHeight;

            let newWidth = baseWidth;
            let newHeight = baseHeight;

            if (maxWidth < baseWidth || maxHeight < baseHeight) {
                const scaleX = maxWidth / baseWidth;
                const scaleY = maxHeight / baseHeight;
                canvasScale = Math.min(scaleX, scaleY, 1);
                newWidth = Math.floor(baseWidth * canvasScale);
                newHeight = Math.floor(baseHeight * canvasScale);
            } else {
                canvasScale = 1;
            }

            canvas.style.width = newWidth + 'px';
            canvas.style.height = newHeight + 'px';
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Player
        const player = {
            x: 400,
            y: 700,
            width: 40,
            height: 40,
            speed: 1.6,
            hp: 100,
            maxHp: 100,
            bodyAngle: -Math.PI / 2,
            turretAngle: -Math.PI / 2,
            targetTurretAngle: -Math.PI / 2,
            turretSpeed: 0.06,
            shootCooldown: 0,
            invincible: 0,
            trackPhase: 0
        };

        // Arrays
        let bullets = [];
        let enemyBullets = [];
        let enemies = [];
        let particles = [];
        let powerups = [];
        let screenShake = 0;
        let visualFrame = 0;
        const maxParticles = 180;
        const maxEnemyBullets = 160;
        const backgroundCache = document.createElement('canvas');
        backgroundCache.width = baseWidth;
        backgroundCache.height = baseHeight;
        const backgroundCtx = backgroundCache.getContext('2d');
        const bulletSprite = makeCircleSprite('#fbbf24', 6, 0.95);
        const enemyBulletSprite = makeCircleSprite('#ef4444', 5, 0.9);
        const powerupSprite = makePowerupSprite();
        buildBackgroundCache();

        // Enemy types (speeds at 80%)
        const enemyTypes = {
            tank: {
                width: 35,
                height: 35,
                speed: 0.6,
                hp: 3,
                color: '#ef4444',
                shootRate: 120,
                score: 100
            },
            helicopter: {
                width: 30,
                height: 30,
                speed: 1.2,
                hp: 1,
                color: '#8b5cf6',
                shootRate: 90,
                score: 150
            },
            robot: {
                width: 32,
                height: 32,
                speed: 0.8,
                hp: 2,
                color: '#f97316',
                shootRate: 100,
                score: 120
            }
        };

        // Event listeners
        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'KeyP' || e.key === 'p' || e.key === 'P' || e.code === 'Escape') {
                e.preventDefault();
                togglePause();
                return;
            }
            if (e.code === 'Space') e.preventDefault();
        });
        document.addEventListener('keyup', (e) => keys[e.code] = false);
        startBtn.addEventListener('click', () => {
            if (overlayMode === 'pause') {
                resumeGame();
            } else {
                startGame();
            }
        });
        pauseBtn.addEventListener('click', togglePause);

        // Mobile joystick controls
        function setupJoystick(containerId, stickId, onMove) {
            const container = document.getElementById(containerId);
            const stick = document.getElementById(stickId);
            if (!container || !stick) return;

            let active = false;
            let centerX, centerY;
            const maxDist = 35;

            function handleStart(e) {
                e.preventDefault();
                isMobile = true;
                active = true;
                const rect = container.getBoundingClientRect();
                centerX = rect.left + rect.width / 2;
                centerY = rect.top + rect.height / 2;
                handleMove(e);
            }

            function handleMove(e) {
                if (!active) return;
                e.preventDefault();

                const touch = e.touches ? e.touches[0] : e;
                let dx = touch.clientX - centerX;
                let dy = touch.clientY - centerY;

                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > maxDist) {
                    dx = (dx / dist) * maxDist;
                    dy = (dy / dist) * maxDist;
                }

                stick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                onMove(dx / maxDist, dy / maxDist);
            }

            function handleEnd(e) {
                e.preventDefault();
                active = false;
                stick.style.transform = 'translate(-50%, -50%)';
                onMove(0, 0);
            }

            container.addEventListener('touchstart', handleStart, { passive: false });
            container.addEventListener('touchmove', handleMove, { passive: false });
            container.addEventListener('touchend', handleEnd, { passive: false });
            container.addEventListener('touchcancel', handleEnd, { passive: false });
        }

        // Setup move joystick
        setupJoystick('moveJoystick', 'moveStick', (x, y) => {
            mobileInput.moveX = x;
            mobileInput.moveY = y;
        });

        // Setup aim joystick (auto-fires when aiming)
        setupJoystick('aimJoystick', 'aimStick', (x, y) => {
            mobileInput.aimX = x;
            mobileInput.aimY = y;
            // Auto-fire when aim joystick is active
            mobileInput.firing = (Math.abs(x) > 0.2 || Math.abs(y) > 0.2);
        });

        // Fire button
        const fireBtn = document.getElementById('fireBtn');
        if (fireBtn) {
            fireBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                isMobile = true;
                mobileInput.firing = true;
            }, { passive: false });
            fireBtn.addEventListener('touchend', (e) => {
                e.preventDefault();
                mobileInput.firing = false;
            }, { passive: false });
            fireBtn.addEventListener('touchcancel', (e) => {
                mobileInput.firing = false;
            });
        }

        // Prevent scrolling on mobile
        document.addEventListener('touchmove', (e) => {
            if (gameRunning) e.preventDefault();
        }, { passive: false });

        function setOverlay(mode, title, text, scoreText, buttonText) {
            overlayMode = mode;
            document.getElementById('overlayTitle').textContent = title;
            document.getElementById('overlayText').textContent = text;
            document.getElementById('overlayScore').textContent = scoreText || '';
            startBtn.textContent = buttonText;
            overlay.style.display = 'block';
        }

        function hideOverlay() {
            overlay.style.display = 'none';
        }

        function startGame() {
            initAudio();
            gameRunning = true;
            gamePaused = false;
            score = 0;
            stage = 1;
            bossMode = false;
            boss = null;
            player.x = 400;
            player.y = 700;
            player.hp = 100;
            player.bodyAngle = -Math.PI / 2;
            player.turretAngle = -Math.PI / 2;
            player.targetTurretAngle = -Math.PI / 2;
            player.invincible = 0;
            bullets = [];
            enemyBullets = [];
            enemies = [];
            particles = [];
            powerups = [];
            screenShake = 0;
            visualFrame = 0;
            celebration.active = false;
            celebration.confetti = [];
            pauseBtn.classList.remove('paused');
            pauseBtn.textContent = 'PAUSE';
            hideOverlay();
            showStageAnnounce(1);
            spawnStageEnemies();
            gameLoop();
        }

        function pauseGame() {
            if (!gameRunning || gamePaused) return;
            gamePaused = true;
            pauseBtn.classList.add('paused');
            pauseBtn.textContent = 'RESUME';
            setOverlay('pause', 'PAUSED', '게임이 일시정지되었습니다.', '', 'RESUME');
        }

        function resumeGame() {
            if (!gameRunning || !gamePaused) return;
            gamePaused = false;
            pauseBtn.classList.remove('paused');
            pauseBtn.textContent = 'PAUSE';
            hideOverlay();
        }

        function togglePause() {
            if (!gameRunning) return;
            if (gamePaused) resumeGame();
            else pauseGame();
        }

        function showStageAnnounce(stageNum) {
            stageAnnounce.active = true;
            stageAnnounce.timer = 0;
            stageAnnounce.stage = stageNum;
        }

        function triggerCelebration() {
            celebration.active = true;
            celebration.timer = 0;
            celebration.message = celebration.messages[Math.floor(Math.random() * celebration.messages.length)];
            celebration.confetti = [];

            // Create confetti particles
            for (let i = 0; i < 70; i++) {
                celebration.confetti.push({
                    x: canvas.width / 2 + (Math.random() - 0.5) * 200,
                    y: canvas.height / 2,
                    dx: (Math.random() - 0.5) * 15,
                    dy: -Math.random() * 10 - 5,
                    color: ['#fbbf24', '#ef4444', '#22c55e', '#3b82f6', '#a855f7', '#ec4899'][Math.floor(Math.random() * 6)],
                    size: 4 + Math.random() * 6,
                    rotation: Math.random() * Math.PI * 2,
                    rotationSpeed: (Math.random() - 0.5) * 0.3
                });
            }
        }

        function spawnStageEnemies() {
            const baseCount = 5 + stage * 2;
            enemiesRemaining = baseCount;

            for (let i = 0; i < baseCount; i++) {
                setTimeout(() => {
                    if (gameRunning && !gamePaused && !bossMode) spawnEnemy();
                }, i * 1000);
            }
        }

        function spawnEnemy() {
            const types = ['tank', 'helicopter', 'robot'];
            const type = types[Math.floor(Math.random() * types.length)];
            const template = enemyTypes[type];

            const side = Math.floor(Math.random() * 4);
            let x, y;

            switch (side) {
                case 0: x = Math.random() * canvas.width; y = -50; break;
                case 1: x = canvas.width + 50; y = Math.random() * canvas.height; break;
                case 2: x = Math.random() * canvas.width; y = canvas.height + 50; break;
                case 3: x = -50; y = Math.random() * canvas.height; break;
            }

            const initialAim = Math.atan2(player.y - y, player.x - x);

            enemies.push({
                x, y,
                width: template.width,
                height: template.height,
                speed: template.speed + stage * 0.1,
                hp: template.hp + Math.floor(stage / 3),
                maxHp: template.hp + Math.floor(stage / 3),
                color: template.color,
                type,
                shootCooldown: Math.random() * template.shootRate,
                shootRate: template.shootRate - stage * 5,
                score: template.score,
                angle: initialAim,
                turretAngle: initialAim,
                turretSpeed: type === 'tank' ? 0.035 : 0.08,
                trackPhase: Math.random() * Math.PI * 2
            });
        }

        function spawnBoss() {
            bossMode = true;
            bossWarning.style.display = 'block';

            setTimeout(() => {
                if (!gameRunning) return;
                if (gamePaused) {
                    spawnBoss();
                    return;
                }
                bossWarning.style.display = 'none';
                boss = {
                    x: canvas.width / 2,
                    y: -100,
                    width: 80,
                    height: 80,
                    speed: 0.4 + stage * 0.12,
                    hp: 20 + stage * 10,
                    maxHp: 20 + stage * 10,
                    color: '#dc2626',
                    shootCooldown: 0,
                    shootRate: 50,
                    pattern: 0,
                    patternTimer: 0,
                    angle: Math.PI / 2,
                    gatlingCooldown: 0,
                    gatlingRate: 15,
                    attackMode: 'cannon',
                    modeTimer: 0,
                    modeDuration: 180,
                    gatlingShakeX: 0,
                    trackPhase: 0
                };
            }, 2000);
        }

        function update() {
            // Player tank movement (WASD + Mobile)
            let dx = 0, dy = 0;

            // Keyboard input
            if (keys['KeyW']) dy = -1;
            if (keys['KeyS']) dy = 1;
            if (keys['KeyA']) dx = -1;
            if (keys['KeyD']) dx = 1;

            // Mobile joystick input
            if (Math.abs(mobileInput.moveX) > 0.1 || Math.abs(mobileInput.moveY) > 0.1) {
                dx = mobileInput.moveX;
                dy = mobileInput.moveY;
            }

            if (dx !== 0 || dy !== 0) {
                const len = Math.sqrt(dx * dx + dy * dy);
                dx /= len;
                dy /= len;
                player.x += dx * player.speed;
                player.y += dy * player.speed;
                player.bodyAngle = Math.atan2(dy, dx);
                player.trackPhase += player.speed * 0.9;
            }

            // Turret aiming (Arrow Keys + Mobile)
            const turretKeyPressed = keys['ArrowUp'] || keys['ArrowDown'] || keys['ArrowLeft'] || keys['ArrowRight'];
            const mobileAiming = Math.abs(mobileInput.aimX) > 0.2 || Math.abs(mobileInput.aimY) > 0.2;

            if (mobileAiming) {
                // Mobile: set target angle based on joystick direction
                player.targetTurretAngle = Math.atan2(mobileInput.aimY, mobileInput.aimX);
            } else if (keys['ArrowUp']) {
                player.targetTurretAngle = -Math.PI / 2;      // Up
            } else if (keys['ArrowDown']) {
                player.targetTurretAngle = Math.PI / 2;     // Down
            } else if (keys['ArrowLeft']) {
                player.targetTurretAngle = Math.PI;         // Left
            } else if (keys['ArrowRight']) {
                player.targetTurretAngle = 0;              // Right
            } else {
                player.targetTurretAngle = player.turretAngle;  // Stop at current position
            }

            // Rotate turret towards target angle (shortest path)
            let angleDiff = player.targetTurretAngle - player.turretAngle;
            // Normalize to [-PI, PI]
            while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
            while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;

            if (Math.abs(angleDiff) > 0.01) {
                player.turretAngle += Math.sign(angleDiff) * Math.min(player.turretSpeed, Math.abs(angleDiff));
            }
            // Normalize turret angle
            while (player.turretAngle > Math.PI) player.turretAngle -= Math.PI * 2;
            while (player.turretAngle < -Math.PI) player.turretAngle += Math.PI * 2;

            // Keep player in bounds
            player.x = Math.max(player.width / 2, Math.min(canvas.width - player.width / 2, player.x));
            player.y = Math.max(player.height / 2, Math.min(canvas.height - player.height / 2, player.y));

            // Shooting (Keyboard + Mobile)
            const shooting = keys['Space'] || mobileInput.firing;
            if (shooting && player.shootCooldown <= 0) {
                const muzzleX = player.x + Math.cos(player.turretAngle) * 25;
                const muzzleY = player.y + Math.sin(player.turretAngle) * 25;
                bullets.push({
                    x: muzzleX,
                    y: muzzleY,
                    dx: Math.cos(player.turretAngle) * 4,
                    dy: Math.sin(player.turretAngle) * 4,
                    radius: 5,
                    color: '#fbbf24'
                });
                createParticles(muzzleX, muzzleY, '#fbbf24', 4);
                playShoot();
                player.shootCooldown = 15;
            }
            player.shootCooldown--;
            player.invincible--;

            // Update bullets
            bullets = bullets.filter(b => {
                b.x += b.dx;
                b.y += b.dy;
                return b.x > 0 && b.x < canvas.width && b.y > 0 && b.y < canvas.height;
            });

            // Update enemy bullets
            enemyBullets = enemyBullets.filter(b => {
                b.x += b.dx;
                b.y += b.dy;

                // Check collision with player
                if (player.invincible <= 0 && distance(b, player) < 20) {
                    player.hp -= b.damage || 10;
                    player.invincible = 30;
                    createParticles(player.x, player.y, '#4ade80', 5);

                    if (player.hp <= 0) {
                        gameOver();
                    }
                    return false;
                }

                return b.x > 0 && b.x < canvas.width && b.y > 0 && b.y < canvas.height;
            });
            if (enemyBullets.length > maxEnemyBullets) {
                enemyBullets.splice(0, enemyBullets.length - maxEnemyBullets);
            }

            // Update enemies
            enemies.forEach((enemy, i) => {
                // Move towards player
                const angle = Math.atan2(player.y - enemy.y, player.x - enemy.x);
                enemy.angle = enemy.type === 'tank'
                    ? rotateAngleTowards(enemy.angle, angle, 0.025)
                    : angle;
                enemy.turretAngle = rotateAngleTowards(enemy.turretAngle ?? enemy.angle, angle, enemy.turretSpeed || 0.06);
                enemy.x += Math.cos(angle) * enemy.speed;
                enemy.y += Math.sin(angle) * enemy.speed;
                enemy.trackPhase = (enemy.trackPhase || 0) + enemy.speed * 0.9;

                // Shooting
                enemy.shootCooldown--;
                const shootAngle = enemy.type === 'tank' ? enemy.turretAngle : angle;
                const aimError = Math.abs(normalizeAngle(angle - shootAngle));
                if (enemy.shootCooldown <= 0 && (enemy.type !== 'tank' || aimError < 0.28)) {
                    const muzzleDistance = enemy.type === 'tank' ? enemy.width * 0.72 : enemy.width * 0.3;
                    const muzzleX = enemy.x + Math.cos(shootAngle) * muzzleDistance;
                    const muzzleY = enemy.y + Math.sin(shootAngle) * muzzleDistance;
                    enemyBullets.push({
                        x: muzzleX,
                        y: muzzleY,
                        dx: Math.cos(shootAngle) * 1.25,
                        dy: Math.sin(shootAngle) * 1.25,
                        radius: 4,
                        color: enemy.color,
                        damage: 10
                    });
                    if (enemy.type === 'tank') createParticles(muzzleX, muzzleY, enemy.color, 3);
                    if (Math.random() < 0.6) playEnemyShoot();
                    enemy.shootCooldown = enemy.shootRate;
                }

                // Check collision with player
                if (player.invincible <= 0 && distance(enemy, player) < 30) {
                    player.hp -= 20;
                    player.invincible = 60;
                    createParticles(player.x, player.y, '#4ade80', 8);

                    if (player.hp <= 0) {
                        gameOver();
                    }
                }
            });

            // Bullet-enemy collision
            bullets.forEach((bullet, bi) => {
                enemies.forEach((enemy, ei) => {
                    if (distance(bullet, enemy) < enemy.width / 2 + bullet.radius) {
                        enemy.hp--;
                        createParticles(bullet.x, bullet.y, enemy.color, 3);
                        playHit();
                        bullets.splice(bi, 1);

                        if (enemy.hp <= 0) {
                            score += enemy.score;
                            createParticles(enemy.x, enemy.y, enemy.color, 10);
                            playExplosion();
                            enemies.splice(ei, 1);
                            enemiesRemaining--;

                            // Chance to drop powerup
                            if (Math.random() < 0.2) {
                                powerups.push({
                                    x: enemy.x,
                                    y: enemy.y,
                                    type: 'health',
                                    radius: 12
                                });
                            }

                            // Check for boss spawn
                            if (enemiesRemaining <= 0 && !bossMode && !boss) {
                                spawnBoss();
                            }
                        }
                    }
                });
            });

            // Update boss
            if (boss) {
                // Move boss
                if (boss.y < 100) {
                    boss.y += 1;
                } else {
                    // Mode switching timer
                    boss.modeTimer++;
                    if (boss.modeTimer >= boss.modeDuration) {
                        boss.modeTimer = 0;
                        boss.attackMode = boss.attackMode === 'cannon' ? 'gatling' : 'cannon';
                        boss.gatlingShakeX = 0;
                    }

                    if (boss.attackMode === 'cannon') {
                        // Normal movement patterns
                        boss.patternTimer++;

                        if (boss.patternTimer > 180) {
                            boss.pattern = (boss.pattern + 1) % 3;
                            boss.patternTimer = 0;
                        }

                        switch (boss.pattern) {
                            case 0: // Chase
                                const angle = Math.atan2(player.y - boss.y, player.x - boss.x);
                                boss.x += Math.cos(angle) * boss.speed;
                                boss.y += Math.sin(angle) * boss.speed * 0.5;
                                boss.angle = angle;
                                boss.trackPhase = (boss.trackPhase || 0) + boss.speed * 0.8;
                                break;
                            case 1: // Strafe
                                boss.x += Math.sin(boss.patternTimer * 0.025) * 1.5;
                                boss.angle = Math.PI / 2;
                                boss.trackPhase = (boss.trackPhase || 0) + 0.6;
                                break;
                            case 2: // Circle
                                boss.x = canvas.width / 2 + Math.cos(boss.patternTimer * 0.015) * 200;
                                boss.y = 150 + Math.sin(boss.patternTimer * 0.015) * 50;
                                boss.angle = Math.atan2(player.y - boss.y, player.x - boss.x);
                                boss.trackPhase = (boss.trackPhase || 0) + 0.7;
                                break;
                        }

                        // Boss main cannon shooting
                        boss.shootCooldown--;
                        if (boss.shootCooldown <= 0) {
                            const angleToPlayer = Math.atan2(player.y - boss.y, player.x - boss.x);
                            const muzzle = localToWorld(
                                boss.x,
                                boss.y,
                                boss.angle,
                                boss.width * 0.58,
                                0
                            );

                            // Spread shot from main cannon
                            for (let i = -2; i <= 2; i++) {
                                enemyBullets.push({
                                    x: muzzle.x,
                                    y: muzzle.y,
                                    dx: Math.cos(angleToPlayer + i * 0.2) * 1.5,
                                    dy: Math.sin(angleToPlayer + i * 0.2) * 1.5,
                                    radius: 6,
                                    color: '#fbbf24',
                                    damage: 15
                                });
                            }
                            createParticles(muzzle.x, muzzle.y, '#fbbf24', 5);
                            boss.shootCooldown = boss.shootRate;
                        }
                    } else {
                        // Gatling mode: stop and shake while firing
                        boss.angle = Math.PI / 2; // Face down
                        boss.gatlingShakeX = Math.sin(boss.modeTimer * 0.3) * 8;

                        // Gatling guns fire (slower, fewer bullets)
                        boss.gatlingCooldown--;
                        if (boss.gatlingCooldown <= 0) {
                            const angleToPlayer = Math.atan2(player.y - boss.y, player.x - boss.x);
                            const bulletSpeed = 1.2;
                            const gunX = Math.random() > 0.5 ? -52 : 52;
                            const gunMuzzle = localToWorld(
                                boss.x + (boss.gatlingShakeX || 0),
                                boss.y,
                                boss.angle,
                                gunX,
                                34
                            );

                            enemyBullets.push({
                                x: gunMuzzle.x,
                                y: gunMuzzle.y,
                                dx: Math.cos(angleToPlayer) * bulletSpeed + (Math.random() - 0.5) * 0.4,
                                dy: Math.sin(angleToPlayer) * bulletSpeed + (Math.random() - 0.5) * 0.4,
                                radius: 3,
                                color: '#f97316',
                                damage: 5
                            });
                            createParticles(gunMuzzle.x, gunMuzzle.y, '#f97316', 3);

                            boss.gatlingCooldown = boss.gatlingRate;
                        }
                    }
                }

                // Keep boss in bounds
                boss.x = Math.max(boss.width, Math.min(canvas.width - boss.width, boss.x));

                // Bullet-boss collision
                bullets.forEach((bullet, bi) => {
                    if (!boss) return;
                    if (distance(bullet, boss) < boss.width / 2 + bullet.radius) {
                        boss.hp--;
                        createParticles(bullet.x, bullet.y, '#fbbf24', 3);
                        playHit();
                        bullets.splice(bi, 1);

                        if (boss.hp <= 0) {
                            const defeatedBoss = { x: boss.x, y: boss.y };
                            score += 1000 * stage;
                            // Big explosion effect
                            playExplosion(true);
                            playCelebration();
                            enemyBullets = [];
                            bullets = [];
                            particles = particles.filter(p => p.life > 18).slice(-70);
                            screenShake = Math.max(screenShake, 7);
                            for (let j = 0; j < 4; j++) {
                                setTimeout(() => {
                                    createParticles(
                                        defeatedBoss.x + (Math.random() - 0.5) * 90,
                                        defeatedBoss.y + (Math.random() - 0.5) * 90,
                                        ['#fbbf24', '#ef4444', '#f97316'][Math.floor(Math.random() * 3)],
                                        14
                                    );
                                    if (j < 3) playExplosion();
                                }, j * 100);
                            }
                            triggerCelebration();
                            boss = null;
                            bossMode = false;
                            nextStage();
                        }
                    }
                });

                // Boss-player collision
                if (boss && player.invincible <= 0 && distance(boss, player) < 50) {
                    player.hp -= 30;
                    player.invincible = 60;
                    createParticles(player.x, player.y, '#4ade80', 10);

                    if (player.hp <= 0) {
                        gameOver();
                    }
                }
            }

            // Update powerups
            powerups = powerups.filter((p, i) => {
                if (distance(p, player) < 25) {
                    if (p.type === 'health') {
                        player.hp = Math.min(player.maxHp, player.hp + 25);
                    }
                    createParticles(p.x, p.y, '#4ade80', 5);
                    playPowerup();
                    return false;
                }
                return true;
            });

            // Update particles
            particles = particles.filter(p => {
                p.x += p.dx;
                p.y += p.dy;
                p.life--;
                p.dx *= 0.95;
                p.dy *= 0.95;
                p.rotation += p.rotationSpeed || 0;
                return p.life > 0;
            });
            screenShake = Math.max(0, screenShake * 0.86 - 0.03);

            // Update UI
            document.getElementById('hp').textContent = Math.max(0, player.hp);
            document.getElementById('hp').style.color = player.hp < 30 ? '#ef4444' : '#4ade80';
            document.getElementById('stage').textContent = stage;
            document.getElementById('score').textContent = score;
            document.getElementById('enemies').textContent = bossMode ? 'BOSS!' : enemiesRemaining;

            // Update stage announcement
            if (stageAnnounce.active) {
                stageAnnounce.timer++;
                if (stageAnnounce.timer >= stageAnnounce.duration) {
                    stageAnnounce.active = false;
                }
            }

            // Update celebration
            if (celebration.active) {
                celebration.timer++;
                celebration.confetti.forEach(c => {
                    c.x += c.dx;
                    c.y += c.dy;
                    c.dy += 0.3; // gravity
                    c.rotation += c.rotationSpeed;
                    c.dx *= 0.99;
                });
                if (celebration.timer >= celebration.duration) {
                    celebration.active = false;
                    celebration.confetti = [];
                }
            }
        }

        function nextStage() {
            stage++;
            player.hp = Math.min(player.maxHp, player.hp + 30);

            // Show next stage announcement after celebration
            setTimeout(() => {
                if (gameRunning && !gamePaused) {
                    showStageAnnounce(stage);
                    spawnStageEnemies();
                }
            }, 1500);
        }

        function gameOver() {
            gameRunning = false;
            gamePaused = false;
            pauseBtn.classList.remove('paused');
            pauseBtn.textContent = 'PAUSE';
            setOverlay('gameover', 'GAME OVER', `Stage ${stage}까지 도달했습니다!`, `Final Score: ${score}`, 'RETRY');
        }

        function distance(a, b) {
            return Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2);
        }

        function normalizeAngle(angle) {
            while (angle > Math.PI) angle -= Math.PI * 2;
            while (angle < -Math.PI) angle += Math.PI * 2;
            return angle;
        }

        function rotateAngleTowards(current, target, speed) {
            const diff = normalizeAngle(target - current);
            if (Math.abs(diff) <= speed) return target;
            return normalizeAngle(current + Math.sign(diff) * speed);
        }

        function localToWorld(originX, originY, angle, localX, localY) {
            return {
                x: originX + Math.cos(angle) * localX - Math.sin(angle) * localY,
                y: originY + Math.sin(angle) * localX + Math.cos(angle) * localY
            };
        }

        function createTerrainDetails(count) {
            const details = [];
            for (let i = 0; i < count; i++) {
                const roll = Math.random();
                details.push({
                    type: roll > 0.86 ? 'crater' : roll > 0.62 ? 'plate' : roll > 0.32 ? 'scrape' : 'rivet',
                    x: Math.random() * baseWidth,
                    y: Math.random() * baseHeight,
                    w: 24 + Math.random() * 95,
                    h: 12 + Math.random() * 65,
                    r: 8 + Math.random() * 26,
                    rot: Math.random() * Math.PI,
                    alpha: 0.05 + Math.random() * 0.12,
                    seed: Math.random() * 1000
                });
            }
            return details;
        }

        function makeCircleSprite(color, radius, glowAlpha) {
            const size = radius * 6;
            const sprite = document.createElement('canvas');
            sprite.width = size;
            sprite.height = size;
            const sctx = sprite.getContext('2d');
            const cx = size / 2;
            const cy = size / 2;
            sctx.save();
            sctx.translate(cx, cy);
            sctx.globalCompositeOperation = 'lighter';
            const glow = sctx.createRadialGradient(0, 0, 0, 0, 0, radius * 2.4);
            glow.addColorStop(0, colorWithAlpha(color, glowAlpha));
            glow.addColorStop(1, colorWithAlpha(color, 0));
            sctx.fillStyle = glow;
            sctx.beginPath();
            sctx.arc(0, 0, radius * 2.4, 0, Math.PI * 2);
            sctx.fill();
            sctx.fillStyle = color;
            sctx.beginPath();
            sctx.arc(0, 0, radius, 0, Math.PI * 2);
            sctx.fill();
            sctx.fillStyle = '#fff7ed';
            sctx.beginPath();
            sctx.arc(-radius * 0.18, -radius * 0.18, radius * 0.32, 0, Math.PI * 2);
            sctx.fill();
            sctx.restore();
            return sprite;
        }

        function makePowerupSprite() {
            const size = 48;
            const sprite = document.createElement('canvas');
            sprite.width = size;
            sprite.height = size;
            const sctx = sprite.getContext('2d');
            sctx.translate(size / 2, size / 2);
            sctx.globalCompositeOperation = 'lighter';
            const glow = sctx.createRadialGradient(0, 0, 0, 0, 0, 22);
            glow.addColorStop(0, 'rgba(187, 247, 208, 0.8)');
            glow.addColorStop(1, 'rgba(34, 197, 94, 0)');
            sctx.fillStyle = glow;
            sctx.beginPath();
            sctx.arc(0, 0, 22, 0, Math.PI * 2);
            sctx.fill();
            sctx.globalCompositeOperation = 'source-over';
            sctx.fillStyle = '#16a34a';
            sctx.fillRect(-10, -10, 20, 20);
            sctx.strokeStyle = '#bbf7d0';
            sctx.lineWidth = 2;
            sctx.strokeRect(-10, -10, 20, 20);
            sctx.fillStyle = '#ecfdf5';
            sctx.fillRect(-3, -7, 6, 14);
            sctx.fillRect(-7, -3, 14, 6);
            return sprite;
        }

        function buildBackgroundCache() {
            const ctx = backgroundCtx;
            ctx.clearRect(0, 0, backgroundCache.width, backgroundCache.height);

            const floor = ctx.createLinearGradient(0, 0, 0, backgroundCache.height);
            floor.addColorStop(0, '#182129');
            floor.addColorStop(0.45, '#111920');
            floor.addColorStop(1, '#0b1015');
            ctx.fillStyle = floor;
            ctx.fillRect(0, 0, backgroundCache.width, backgroundCache.height);

            ctx.save();
            ctx.globalAlpha = 0.16;
            ctx.fillStyle = '#d1d5db';
            for (let x = -backgroundCache.height; x < backgroundCache.width; x += 96) {
                ctx.save();
                ctx.translate(x, 0);
                ctx.rotate(-Math.PI / 8);
                ctx.fillRect(0, -80, 2, backgroundCache.height + 220);
                ctx.restore();
            }
            ctx.restore();

            terrainDetails.forEach(detail => {
                ctx.save();
                ctx.translate(detail.x, detail.y);
                ctx.rotate(detail.rot);
                if (detail.type === 'crater') {
                    const crater = ctx.createRadialGradient(0, 0, 2, 0, 0, detail.r);
                    crater.addColorStop(0, `rgba(0, 0, 0, ${detail.alpha + 0.14})`);
                    crater.addColorStop(0.58, `rgba(30, 41, 59, ${detail.alpha})`);
                    crater.addColorStop(1, 'rgba(148, 163, 184, 0)');
                    ctx.fillStyle = crater;
                    ctx.beginPath();
                    ctx.ellipse(0, 0, detail.r * 1.45, detail.r * 0.72, 0, 0, Math.PI * 2);
                    ctx.fill();
                } else if (detail.type === 'plate') {
                    fillRoundedRect(-detail.w / 2, -detail.h / 2, detail.w, detail.h, 5, `rgba(148, 163, 184, ${detail.alpha * 0.45})`);
                    strokeRoundedRect(-detail.w / 2, -detail.h / 2, detail.w, detail.h, 5, `rgba(203, 213, 225, ${detail.alpha})`);
                } else if (detail.type === 'scrape') {
                    ctx.strokeStyle = `rgba(226, 232, 240, ${detail.alpha})`;
                    ctx.lineWidth = 1 + detail.alpha * 10;
                    ctx.beginPath();
                    ctx.moveTo(-detail.w / 2, 0);
                    ctx.lineTo(detail.w / 2, Math.sin(detail.seed) * 8);
                    ctx.stroke();
                    ctx.strokeStyle = `rgba(0, 0, 0, ${detail.alpha})`;
                    ctx.beginPath();
                    ctx.moveTo(-detail.w / 2, 4);
                    ctx.lineTo(detail.w / 2, 4 + Math.cos(detail.seed) * 6);
                    ctx.stroke();
                } else {
                    ctx.fillStyle = `rgba(203, 213, 225, ${detail.alpha})`;
                    ctx.beginPath();
                    ctx.arc(0, 0, 1.5 + detail.alpha * 10, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
            });

            ctx.save();
            ctx.strokeStyle = 'rgba(148, 163, 184, 0.12)';
            ctx.lineWidth = 1;
            for (let x = 0; x <= backgroundCache.width; x += 50) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, backgroundCache.height);
                ctx.stroke();
            }
            for (let y = 0; y <= backgroundCache.height; y += 50) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(backgroundCache.width, y);
                ctx.stroke();
            }

            ctx.strokeStyle = 'rgba(251, 191, 36, 0.08)';
            ctx.lineWidth = 2;
            for (let x = 0; x <= backgroundCache.width; x += 200) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, backgroundCache.height);
                ctx.stroke();
            }
            for (let y = 0; y <= backgroundCache.height; y += 200) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(backgroundCache.width, y);
                ctx.stroke();
            }
            ctx.restore();

            const vignette = ctx.createRadialGradient(backgroundCache.width / 2, backgroundCache.height / 2, 100, backgroundCache.width / 2, backgroundCache.height / 2, backgroundCache.width * 0.72);
            vignette.addColorStop(0, 'rgba(0, 0, 0, 0)');
            vignette.addColorStop(1, 'rgba(0, 0, 0, 0.34)');
            ctx.fillStyle = vignette;
            ctx.fillRect(0, 0, backgroundCache.width, backgroundCache.height);
        }

        function clamp(value, min, max) {
            return Math.max(min, Math.min(max, value));
        }

        function colorWithAlpha(color, alpha) {
            if (color && color[0] === '#') {
                let hex = color.slice(1);
                if (hex.length === 3) {
                    hex = hex.split('').map(c => c + c).join('');
                }
                const value = parseInt(hex, 16);
                const r = (value >> 16) & 255;
                const g = (value >> 8) & 255;
                const b = value & 255;
                return `rgba(${r}, ${g}, ${b}, ${alpha})`;
            }
            return color || `rgba(255, 255, 255, ${alpha})`;
        }

        function roundedRectPath(x, y, w, h, r) {
            const radius = Math.min(r, Math.abs(w) / 2, Math.abs(h) / 2);
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + w - radius, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
            ctx.lineTo(x + w, y + h - radius);
            ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
            ctx.lineTo(x + radius, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
        }

        function fillRoundedRect(x, y, w, h, r, fillStyle) {
            if (w <= 0 || h <= 0) return;
            ctx.fillStyle = fillStyle;
            roundedRectPath(x, y, w, h, r);
            ctx.fill();
        }

        function strokeRoundedRect(x, y, w, h, r, strokeStyle, lineWidth = 1) {
            if (w <= 0 || h <= 0) return;
            ctx.strokeStyle = strokeStyle;
            ctx.lineWidth = lineWidth;
            roundedRectPath(x, y, w, h, r);
            ctx.stroke();
        }

        function drawBattlefield() {
            ctx.drawImage(backgroundCache, 0, 0, canvas.width, canvas.height);
        }

        function drawVehicleShadow(x, y, width, height, angle, alpha = 0.34) {
            ctx.save();
            ctx.translate(x + 5, y + 7);
            ctx.rotate(angle);
            ctx.fillStyle = `rgba(0, 0, 0, ${alpha})`;
            ctx.beginPath();
            ctx.ellipse(0, 0, width * 0.68, height * 0.46, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        function drawTrackedTank(unit, options) {
            const bodyAngle = options.bodyAngle ?? unit.angle ?? 0;
            const turretAngle = options.turretAngle ?? bodyAngle;
            const primary = options.primary || unit.color || palette.enemy;
            const dark = options.dark || palette.enemyDark;
            const accent = options.accent || '#fed7aa';
            const w = unit.width;
            const h = unit.height;
            const trackPhase = options.trackPhase ?? unit.trackPhase ?? 0;
            const trackOffset = trackPhase % 8;

            drawVehicleShadow(unit.x, unit.y, w, h, bodyAngle, options.shadowAlpha || 0.34);

            ctx.save();
            ctx.translate(unit.x, unit.y);
            ctx.rotate(bodyAngle);

            fillRoundedRect(-w / 2 + 1, -h / 2 - 5, w - 2, 10, 4, palette.steelDark);
            fillRoundedRect(-w / 2 + 1, h / 2 - 5, w - 2, 10, 4, palette.steelDark);
            ctx.fillStyle = '#3a4650';
            for (let i = -w / 2 + 5; i < w / 2 - 2; i += 8) {
                const px = i + trackOffset;
                ctx.fillRect(px, -h / 2 - 3, 3, 6);
                ctx.fillRect(px, h / 2 - 3, 3, 6);
            }
            for (let i = -w / 2 + 4; i < w / 2 - 3; i += 12) {
                const px = i + trackOffset * 0.5;
                ctx.fillStyle = colorWithAlpha('#cbd5e1', 0.14);
                ctx.beginPath();
                ctx.arc(px, -h / 2 - 1, 1.6, 0, Math.PI * 2);
                ctx.arc(px, h / 2 + 1, 1.6, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.fillStyle = '#3a4650';

            const bodyGradient = ctx.createLinearGradient(-w / 2, -h / 2, w / 2, h / 2);
            bodyGradient.addColorStop(0, accent);
            bodyGradient.addColorStop(0.18, primary);
            bodyGradient.addColorStop(1, dark);
            fillRoundedRect(-w * 0.36, -h * 0.5, w * 0.72, h, 7, bodyGradient);
            strokeRoundedRect(-w * 0.36, -h * 0.5, w * 0.72, h, 7, colorWithAlpha('#ffffff', 0.18), 1);

            fillRoundedRect(-w * 0.22, -h * 0.31, w * 0.44, h * 0.62, 4, colorWithAlpha(dark, 0.48));
            ctx.fillStyle = colorWithAlpha('#ffffff', 0.2);
            ctx.fillRect(-w * 0.18, -h * 0.43, w * 0.36, 2);
            ctx.fillStyle = colorWithAlpha('#020617', 0.35);
            ctx.fillRect(-w * 0.2, h * 0.36, w * 0.4, 3);

            ctx.fillStyle = colorWithAlpha('#f8fafc', 0.38);
            [-0.23, 0.23].forEach(x => {
                [-0.34, 0.34].forEach(y => {
                    ctx.beginPath();
                    ctx.arc(w * x, h * y, 1.8, 0, Math.PI * 2);
                    ctx.fill();
                });
            });
            ctx.restore();

            ctx.save();
            ctx.translate(unit.x, unit.y);
            ctx.rotate(turretAngle);

            const barrelGradient = ctx.createLinearGradient(0, -h * 0.1, w * 0.72, h * 0.1);
            barrelGradient.addColorStop(0, '#27313a');
            barrelGradient.addColorStop(0.42, primary);
            barrelGradient.addColorStop(1, '#111827');
            fillRoundedRect(0, -h * 0.11, w * 0.72, h * 0.22, 3, barrelGradient);
            fillRoundedRect(w * 0.56, -h * 0.15, w * 0.16, h * 0.3, 2, '#0f172a');

            const turretGradient = ctx.createRadialGradient(-3, -4, 2, 0, 0, h * 0.44);
            turretGradient.addColorStop(0, accent);
            turretGradient.addColorStop(0.35, primary);
            turretGradient.addColorStop(1, dark);
            ctx.fillStyle = turretGradient;
            ctx.beginPath();
            ctx.arc(0, 0, h * 0.36, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = colorWithAlpha('#ffffff', 0.2);
            ctx.lineWidth = 1;
            ctx.stroke();

            ctx.fillStyle = colorWithAlpha('#020617', 0.34);
            ctx.beginPath();
            ctx.arc(0, 0, h * 0.18, 0, Math.PI * 2);
            ctx.fill();

            if (options.flash > 0) {
                ctx.save();
                ctx.globalCompositeOperation = 'lighter';
                ctx.globalAlpha = clamp(options.flash, 0, 1);
                const flash = ctx.createRadialGradient(w * 0.8, 0, 0, w * 0.8, 0, 22);
                flash.addColorStop(0, '#ffffff');
                flash.addColorStop(0.25, '#fde68a');
                flash.addColorStop(1, 'rgba(251, 191, 36, 0)');
                ctx.fillStyle = flash;
                ctx.beginPath();
                ctx.arc(w * 0.8, 0, 22, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
            ctx.restore();
        }

        function drawPlayerTank() {
            ctx.save();
            if (player.invincible > 0 && Math.floor(player.invincible / 5) % 2) {
                ctx.globalAlpha = 0.52;
            }
            drawTrackedTank(player, {
                bodyAngle: player.bodyAngle,
                turretAngle: player.turretAngle,
                primary: palette.player,
                dark: palette.playerDark,
                accent: '#bbf7d0',
                flash: player.shootCooldown > 10 ? (player.shootCooldown - 10) / 5 : 0,
                shadowAlpha: 0.38
            });
            ctx.restore();
        }

        function drawEnemy(enemy) {
            if (enemy.type === 'tank') {
                drawTrackedTank(enemy, {
                    bodyAngle: enemy.angle,
                    turretAngle: enemy.turretAngle ?? enemy.angle,
                    primary: enemy.color,
                    dark: '#7f1d1d',
                    accent: '#fecaca',
                    shadowAlpha: 0.32,
                    flash: enemy.shootCooldown > enemy.shootRate - 8 ? 0.65 : 0
                });
                return;
            }

            if (enemy.type === 'helicopter') {
                drawVehicleShadow(enemy.x, enemy.y, enemy.width * 1.5, enemy.height, enemy.angle, 0.24);
                ctx.save();
                ctx.translate(enemy.x, enemy.y);
                ctx.rotate(enemy.angle);

                fillRoundedRect(-enemy.width * 0.85, -3, enemy.width * 0.78, 6, 3, '#4c1d95');
                fillRoundedRect(-enemy.width * 1.02, -6, enemy.width * 0.18, 12, 3, '#6d28d9');
                ctx.strokeStyle = colorWithAlpha('#ddd6fe', 0.85);
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(-enemy.width * 1.02, 0);
                ctx.lineTo(-enemy.width * 1.18, -8);
                ctx.moveTo(-enemy.width * 1.02, 0);
                ctx.lineTo(-enemy.width * 1.18, 8);
                ctx.stroke();

                const body = ctx.createLinearGradient(-enemy.width / 2, -enemy.height / 2, enemy.width / 2, enemy.height / 2);
                body.addColorStop(0, '#ddd6fe');
                body.addColorStop(0.28, enemy.color);
                body.addColorStop(1, '#4c1d95');
                ctx.fillStyle = body;
                ctx.beginPath();
                ctx.ellipse(0, 0, enemy.width * 0.58, enemy.height * 0.34, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = colorWithAlpha('#ffffff', 0.18);
                ctx.stroke();

                fillRoundedRect(enemy.width * 0.16, -enemy.height * 0.16, enemy.width * 0.22, enemy.height * 0.32, 3, colorWithAlpha('#020617', 0.32));

                ctx.save();
                ctx.rotate(visualFrame * 0.45);
                ctx.strokeStyle = colorWithAlpha('#f5f3ff', 0.82);
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(-enemy.width * 0.9, 0);
                ctx.lineTo(enemy.width * 0.9, 0);
                ctx.moveTo(0, -enemy.width * 0.9);
                ctx.lineTo(0, enemy.width * 0.9);
                ctx.stroke();
                ctx.restore();

                ctx.restore();
                return;
            }

            drawVehicleShadow(enemy.x, enemy.y, enemy.width * 1.18, enemy.height * 0.92, enemy.angle, 0.3);
            ctx.save();
            ctx.translate(enemy.x, enemy.y);
            ctx.rotate(enemy.angle);

            fillRoundedRect(-enemy.width * 0.5, -enemy.height * 0.46, enemy.width, enemy.height * 0.24, 4, '#111827');
            fillRoundedRect(-enemy.width * 0.5, enemy.height * 0.22, enemy.width, enemy.height * 0.24, 4, '#111827');
            ctx.fillStyle = '#4b5563';
            for (let i = -enemy.width * 0.42; i < enemy.width * 0.42; i += 7) {
                ctx.fillRect(i, -enemy.height * 0.43, 3, enemy.height * 0.18);
                ctx.fillRect(i, enemy.height * 0.25, 3, enemy.height * 0.18);
            }

            const crawlerBody = ctx.createLinearGradient(-enemy.width * 0.42, -enemy.height * 0.32, enemy.width * 0.42, enemy.height * 0.32);
            crawlerBody.addColorStop(0, '#fed7aa');
            crawlerBody.addColorStop(0.28, '#f97316');
            crawlerBody.addColorStop(1, '#7c2d12');
            ctx.fillStyle = crawlerBody;
            ctx.beginPath();
            ctx.moveTo(-enemy.width * 0.42, -enemy.height * 0.24);
            ctx.lineTo(enemy.width * 0.24, -enemy.height * 0.32);
            ctx.lineTo(enemy.width * 0.46, -enemy.height * 0.08);
            ctx.lineTo(enemy.width * 0.4, enemy.height * 0.24);
            ctx.lineTo(-enemy.width * 0.36, enemy.height * 0.3);
            ctx.lineTo(-enemy.width * 0.48, enemy.height * 0.06);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = colorWithAlpha('#ffffff', 0.22);
            ctx.lineWidth = 1;
            ctx.stroke();

            fillRoundedRect(-enemy.width * 0.16, -enemy.height * 0.19, enemy.width * 0.32, enemy.height * 0.38, 4, '#431407');
            fillRoundedRect(0, -enemy.height * 0.08, enemy.width * 0.52, enemy.height * 0.16, 3, '#1f2937');
            fillRoundedRect(enemy.width * 0.38, -enemy.height * 0.12, enemy.width * 0.14, enemy.height * 0.24, 2, '#020617');

            ctx.fillStyle = colorWithAlpha('#fff7ed', 0.35);
            ctx.fillRect(-enemy.width * 0.28, -enemy.height * 0.18, enemy.width * 0.17, 2);
            ctx.fillRect(-enemy.width * 0.28, enemy.height * 0.1, enemy.width * 0.17, 2);
            ctx.fillStyle = '#fde68a';
            ctx.fillRect(enemy.width * 0.08, -enemy.height * 0.12, 3, enemy.height * 0.24);
            ctx.restore();
        }

        function drawBossTank(bossUnit, shakeX) {
            const x = bossUnit.x + shakeX;
            const trackPhase = (bossUnit.trackPhase || 0) % 8;
            drawVehicleShadow(x, bossUnit.y, bossUnit.width + 26, bossUnit.height + 10, bossUnit.angle, 0.44);

            if (bossUnit.attackMode === 'gatling') {
                ctx.save();
                ctx.translate(x, bossUnit.y);
                [-52, 52].forEach((offset, index) => {
                    fillRoundedRect(offset - 13, -14, 26, 28, 5, '#242b33');
                    fillRoundedRect(offset - 9, -9, 18, 18, 4, '#475569');
                    ctx.fillStyle = '#0f172a';
                    for (let i = -1; i <= 1; i++) {
                        fillRoundedRect(offset + i * 6 - 2, 12, 4, 20, 2, '#111827');
                    }
                    if ((visualFrame + index * 7) % 12 < 5) {
                        ctx.save();
                        ctx.globalCompositeOperation = 'lighter';
                        const flash = ctx.createRadialGradient(offset, 34, 0, offset, 34, 18);
                        flash.addColorStop(0, '#fff7ed');
                        flash.addColorStop(0.35, '#fb923c');
                        flash.addColorStop(1, 'rgba(249, 115, 22, 0)');
                        ctx.fillStyle = flash;
                        ctx.beginPath();
                        ctx.arc(offset, 34, 18, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.restore();
                    }
                });
                ctx.restore();
            }

            ctx.save();
            ctx.translate(x, bossUnit.y);
            ctx.rotate(bossUnit.angle);

            fillRoundedRect(-bossUnit.width / 2, -bossUnit.height / 2 - 8, bossUnit.width, 16, 6, '#111827');
            fillRoundedRect(-bossUnit.width / 2, bossUnit.height / 2 - 8, bossUnit.width, 16, 6, '#111827');
            ctx.fillStyle = '#4b5563';
            for (let i = -bossUnit.width / 2 + 8; i < bossUnit.width / 2 - 4; i += 11) {
                const px = i + trackPhase;
                ctx.fillRect(px, -bossUnit.height / 2 - 5, 4, 10);
                ctx.fillRect(px, bossUnit.height / 2 - 5, 4, 10);
            }
            for (let i = -bossUnit.width / 2 + 6; i < bossUnit.width / 2 - 4; i += 16) {
                const px = i + trackPhase * 0.5;
                ctx.fillStyle = colorWithAlpha('#cbd5e1', 0.14);
                ctx.beginPath();
                ctx.arc(px, -bossUnit.height / 2, 2.1, 0, Math.PI * 2);
                ctx.arc(px, bossUnit.height / 2, 2.1, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.fillStyle = '#4b5563';

            const body = ctx.createLinearGradient(-bossUnit.width / 2, -bossUnit.height / 2, bossUnit.width / 2, bossUnit.height / 2);
            body.addColorStop(0, '#fecaca');
            body.addColorStop(0.18, bossUnit.color);
            body.addColorStop(1, '#450a0a');
            fillRoundedRect(-bossUnit.width * 0.38, -bossUnit.height * 0.5, bossUnit.width * 0.76, bossUnit.height, 9, body);
            strokeRoundedRect(-bossUnit.width * 0.38, -bossUnit.height * 0.5, bossUnit.width * 0.76, bossUnit.height, 9, colorWithAlpha('#ffffff', 0.2), 2);

            fillRoundedRect(0, -bossUnit.height * 0.11, bossUnit.width * 0.65, bossUnit.height * 0.22, 4, '#1f2937');
            fillRoundedRect(bossUnit.width * 0.48, -bossUnit.height * 0.15, bossUnit.width * 0.17, bossUnit.height * 0.3, 3, '#020617');

            const turret = ctx.createRadialGradient(-4, -6, 2, 0, 0, 28);
            turret.addColorStop(0, '#fecaca');
            turret.addColorStop(0.4, '#991b1b');
            turret.addColorStop(1, '#450a0a');
            ctx.fillStyle = turret;
            ctx.beginPath();
            ctx.arc(0, 0, 23, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = colorWithAlpha('#ffffff', 0.22);
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.fillStyle = '#fde68a';
            ctx.beginPath();
            ctx.arc(-7, -5, 4, 0, Math.PI * 2);
            ctx.arc(7, -5, 4, 0, Math.PI * 2);
            ctx.fill();
            fillRoundedRect(-7, 3, 14, 6, 2, '#fbbf24');
            ctx.restore();
        }

        function drawHealthBar(x, y, w, h, percent, label) {
            const pct = clamp(percent, 0, 1);
            fillRoundedRect(x, y, w, h, h / 2, 'rgba(2, 6, 23, 0.68)');
            if (pct > 0) {
                const fill = ctx.createLinearGradient(x, y, x + w, y);
                fill.addColorStop(0, pct > 0.25 ? '#22c55e' : '#ef4444');
                fill.addColorStop(0.6, pct > 0.5 ? '#86efac' : '#fbbf24');
                fill.addColorStop(1, pct > 0.5 ? '#d9f99d' : '#fb7185');
                fillRoundedRect(x, y, w * pct, h, h / 2, fill);
            }
            strokeRoundedRect(x, y, w, h, h / 2, 'rgba(255, 255, 255, 0.4)', 1);
            if (label) {
                ctx.fillStyle = '#f8fafc';
                ctx.font = 'bold 12px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(label, x + w / 2, y + h / 2 + 0.5);
            }
        }

        function drawPowerup(p) {
            const pulse = 1 + Math.sin(visualFrame * 0.08 + p.x * 0.05) * 0.13;
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.scale(pulse, pulse);
            ctx.globalCompositeOperation = 'lighter';
            ctx.drawImage(powerupSprite, -24, -24, 48, 48);
            ctx.restore();
        }

        function drawParticleField() {
            ctx.save();
            ctx.globalCompositeOperation = 'lighter';
            particles.forEach(p => {
                const alpha = clamp(p.life / (p.maxLife || 50), 0, 1);
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rotation || 0);
                if (p.shape === 'shard') {
                    ctx.fillStyle = p.color;
                    ctx.fillRect(-p.radius * 0.7, -p.radius * 0.12, p.radius * 1.5, p.radius * 0.24);
                } else {
                    ctx.drawImage(bulletSprite, -12, -12, 24, 24);
                }
                ctx.restore();
            });
            ctx.restore();
        }

        function drawProjectile(b, isPlayer) {
            ctx.save();
            ctx.translate(b.x, b.y);
            ctx.rotate(Math.atan2(b.dy, b.dx));
            ctx.globalCompositeOperation = 'lighter';
            ctx.drawImage(isPlayer ? bulletSprite : enemyBulletSprite, -18, -18, 36, 36);
            ctx.restore();
        }

        function createParticles(x, y, color, count) {
            if (count >= 8) {
                screenShake = Math.max(screenShake, Math.min(9, count * 0.16));
            }
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 2 + Math.random() * 4;
                const life = 30 + Math.random() * 24;
                particles.push({
                    x, y,
                    dx: Math.cos(angle) * speed,
                    dy: Math.sin(angle) * speed,
                    color,
                    life,
                    maxLife: life,
                    radius: 2 + Math.random() * 3,
                    rotation: Math.random() * Math.PI * 2,
                    rotationSpeed: (Math.random() - 0.5) * 0.35,
                    shape: Math.random() > 0.48 ? 'shard' : 'spark'
                });
            }
            if (particles.length > maxParticles) {
                particles.splice(0, particles.length - maxParticles);
            }
        }

        function draw() {
            if (!gamePaused) visualFrame++;
            ctx.save();
            if (screenShake > 0) {
                ctx.translate((Math.random() - 0.5) * screenShake, (Math.random() - 0.5) * screenShake);
            }

            drawBattlefield();

            // Powerups and effects
            powerups.forEach(drawPowerup);
