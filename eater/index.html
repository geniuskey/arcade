<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Black Hole Eater - Arcade</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&family=Space+Grotesk:wght@700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --bg-dark: #010108;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            touch-action: none;
        }

        #top-bar {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.5);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            z-index: 15;
            position: fixed;
            top: 0;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--neon-blue);
        }

        .stat-value {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 18px;
            font-weight: 700;
        }

        /* Leaderboard & Log Styles */
        #leaderboard {
            position: fixed;
            top: 70px;
            left: 20px;
            background: rgba(0, 0, 0, 0.4);
            padding: 15px;
            border-radius: 12px;
            border-left: 3px solid var(--neon-blue);
            backdrop-filter: blur(10px);
            z-index: 10;
            min-width: 150px;
        }

        .leaderboard-title {
            font-size: 10px;
            color: var(--neon-blue);
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 4px;
            color: rgba(255, 255, 255, 0.8);
        }

        .leaderboard-item.is-player {
            color: var(--neon-blue);
            font-weight: bold;
        }

        #game-log {
            position: fixed;
            top: 70px;
            right: 20px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
            pointer-events: none;
            z-index: 10;
        }

        .log-entry {
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 12px;
            border-right: 3px solid var(--neon-purple);
            animation: slideIn 0.3s ease-out, fadeOut 0.5s ease-in 2.5s forwards;
            color: white;
            white-space: nowrap;
        }

        @keyframes slideIn {
            from { transform: translateX(50px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        #announcement {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 100;
            pointer-events: none;
            display: none;
        }

        .announce-title {
            font-size: 60px;
            font-weight: 800;
            color: var(--neon-blue);
            text-shadow: 0 0 20px var(--neon-blue);
            margin-bottom: 10px;
            animation: bounceIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .announce-subtitle {
            font-size: 30px;
            color: var(--neon-purple);
            text-shadow: 0 0 10px var(--neon-purple);
            animation: slideUp 0.5s ease-out 0.5s both;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.1); opacity: 1; }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            cursor: default;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #screens {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
            pointer-events: none;
        }

        .screen {
            background: rgba(1, 1, 8, 0.95);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            border: 1px solid var(--neon-purple);
            box-shadow: 0 0 50px rgba(188, 19, 254, 0.2);
            display: none;
            flex-direction: column;
            gap: 20px;
            max-width: 90%;
            pointer-events: auto;
        }

        .screen.active {
            display: flex;
        }

        h2 {
            font-size: 42px;
            background: linear-gradient(to right, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .difficulty-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 10px 0;
        }

        .diff-btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .diff-btn.active {
            background: var(--neon-purple);
            border-color: var(--neon-purple);
            box-shadow: 0 0 15px var(--neon-purple);
        }

        .btn {
            padding: 18px 50px;
            background: var(--neon-blue);
            color: var(--bg-dark);
            border: none;
            border-radius: 15px;
            font-size: 20px;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.2s;
        }

        #mobile-hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.3);
            font-size: 12px;
            text-align: center;
            pointer-events: none;
        }

        #joystick-container {
            position: fixed;
            bottom: 40px;
            left: 40px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: none;
            touch-action: none;
            z-index: 30;
        }

        #joystick-knob {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 50px;
            height: 50px;
            background: var(--neon-blue);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px var(--neon-blue);
            pointer-events: none;
        }

        @media (max-width: 768px) {
            #joystick-container {
                display: none;
            }
            #joystick-container.active { display: block; }
        }

        .back-btn {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 1000;
            text-decoration: none;
            color: white;
            background: rgba(0, 0, 0, 0.5);
            padding: 6px 12px;
            border-radius: 15px;
            font-family: sans-serif;
            font-size: 12px;
            transition: background 0.3s;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .back-btn:hover {
            background: rgba(0, 0, 0, 0.8);
        }

        /* 2026 visual pass — preserve the simulation, elevate the cosmic read. */
        body { background: radial-gradient(circle at 50% 42%, #32133f 0, #101128 46%, #02030a 100%); }
        #top-bar { top: 18px; width: min(760px, calc(100% - 180px)); border: 1px solid rgba(255,255,255,.13); border-radius: 16px; background: rgba(6,7,20,.74); box-shadow: 0 16px 40px rgba(0,0,0,.3); }
        #leaderboard { top: 92px; border: 1px solid rgba(255,255,255,.1); border-left: 3px solid var(--neon-blue); background: rgba(5,7,18,.72); box-shadow: 0 18px 45px rgba(0,0,0,.28); }
        .screen { width: min(570px, calc(100% - 32px)); padding: 36px; border: 1px solid rgba(255,255,255,.14); border-radius: 25px; background: linear-gradient(145deg, rgba(18,10,34,.96), rgba(5,7,19,.95)); box-shadow: 0 34px 100px rgba(0,0,0,.65), inset 0 1px rgba(255,255,255,.06); }
        h2 { font-size: 46px; letter-spacing: -.055em; background: none; -webkit-text-fill-color: white; }
        .difficulty-selector { padding: 4px; border: 1px solid rgba(255,255,255,.09); border-radius: 14px; background: rgba(0,0,0,.18); }
        .diff-btn { flex: 1; border: 0; font: 900 10px ui-monospace, monospace; letter-spacing: .08em; }
        .diff-btn.active { color: #07151a; background: linear-gradient(90deg, #49ffb0, #43eaff); box-shadow: 0 7px 22px rgba(67,234,255,.2); }
        .btn { width: 100%; color: #071217; background: linear-gradient(90deg, #43eaff, #c9ff4c); font: 950 12px ui-monospace, monospace; letter-spacing: .1em; box-shadow: 0 14px 32px rgba(67,234,255,.17); }
        .back-btn { top: 18px; left: 18px; padding: 12px 16px; border-radius: 13px; background: rgba(5,7,18,.72); }
        #mobile-hint { padding: 7px 12px; border: 1px solid rgba(255,255,255,.09); border-radius: 10px; background: rgba(5,7,18,.68); }
        @media (max-width: 768px) { #top-bar { top: 6px; width: calc(100% - 80px); padding: 5px 8px; border-radius: 8px; } .stat-label { font-size: 5px; } .stat-value { font-size: 9px; } #leaderboard { top: 46px; left: 7px; padding: 7px; min-width: 95px; transform: scale(.72); transform-origin: top left; } .back-btn { top: 6px; left: 6px; padding: 7px 8px; font-size: 7px; } .screen { padding: 20px; gap: 10px; } h2 { font-size: 26px; } .screen p { font-size: 8px; } .diff-btn { padding: 7px 5px; font-size: 6px; } .btn { padding: 10px; font-size: 7px; } }
    </style>
</head>

<body>
    <a href="../" class="back-btn">← Arcade</a>
    <div id="top-bar">
        <div class="stat-item">
            <span class="stat-label">Mass</span>
            <span id="score" class="stat-value">100</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Stage</span>
            <span id="stage-display" class="stat-value">1</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Difficulty</span>
            <span id="current-diff-display" class="stat-value"
                style="font-size: 12px; color: var(--neon-purple);">NORMAL</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Best Mass</span>
            <span id="best-score" class="stat-value">0</span>
        </div>
    </div>

    <div id="leaderboard">
        <div class="leaderboard-title">Top Celestials</div>
        <div id="leaderboard-list"></div>
    </div>

    <div id="game-log"></div>

    <div id="announcement">
        <div id="announce-title" class="announce-title">MISSION CLEAR</div>
        <div id="announce-subtitle" class="announce-subtitle">STAGE 2 START!</div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>

        <div id="screens">
            <div id="start-screen" class="screen active">
                <h2>BLACK HOLE EATER</h2>
                <div class="difficulty-selector">
                    <button class="diff-btn" onclick="setDifficulty('easy')">EASY</button>
                    <button class="diff-btn active" onclick="setDifficulty('normal')">NORMAL</button>
                    <button class="diff-btn" onclick="setDifficulty('hard')">HARD</button>
                </div>
                <p style="opacity: 0.7;">Absorb smaller objects to grow. Avoid larger ones.</p>
                <button class="btn" onclick="startGame()">SINGULARITY</button>
            </div>

            <div id="game-over-screen" class="screen">
                <h2>COLLAPSED</h2>
                <p>You were absorbed by a larger celestial body.</p>
                <div style="margin: 10px 0;">
                    <div class="stat-label">Final Mass</div>
                    <div id="final-score" class="stat-value">0</div>
                </div>
                <button class="btn" onclick="startGame()">REGENERATE</button>
            </div>
        </div>
    </div>

    <div id="joystick-container">
        <div id="joystick-knob"></div>
    </div>

    <div id="mobile-hint">Use WASD, Arrows, or Joystick to navigate</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const bestScoreEl = document.getElementById('best-score');
        const finalScoreEl = document.getElementById('final-score');
        const joystickContainer = document.getElementById('joystick-container');
        const joystickKnob = document.getElementById('joystick-knob');

        // Game Constants
        const INITIAL_RADIUS = 10;
        const FOOD_COUNT = 150;
        const ENEMY_COUNT = 15;
        const WORLD_SIZE = 3000;
        const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
        const CELESTIAL_NAMES = [
            'Sirius', 'Canopus', 'Arcturus', 'Vega', 'Capella', 'Rigel', 'Procyon', 'Achernar', 
            'Betelgeuse', 'Hadar', 'Altair', 'Aldebaran', 'Antares', 'Spica', 'Pollux', 'Fomalhaut',
            'Deneb', 'Mimosa', 'Regulus', 'Adhara', 'Castor', 'Gacrux', 'Shaula'
        ];

        const DIFFICULTIES = {
            easy: { enemySpeed: 1.5, foodValue: 2, label: 'EASY' },
            normal: { enemySpeed: 2.5, foodValue: 1.5, label: 'NORMAL' },
            hard: { enemySpeed: 4.0, foodValue: 1.0, label: 'HARD' }
        };

        // Game State
        let currentDifficulty = 'normal';
        let gameActive = false;
        let lastTime = performance.now();
        let currentStage = 1;
        let isTransitioning = false;

        let player = {
            name: 'Singularity',
            x: WORLD_SIZE / 2,
            y: WORLD_SIZE / 2,
            radius: INITIAL_RADIUS,
            vx: 0,
            vy: 0
        };

        let food = [];
        let enemies = [];
        let camera = { x: 0, y: 0 };
        let keys = {};
        let joystick = { active: false, x: 0, y: 0 };
        let effects = [];
        let screenShake = 0;
        const spaceDust = Array.from({ length: 260 }, (_, i) => ({
            x: (i * 977 + 113) % WORLD_SIZE,
            y: (i * 619 + 347) % WORLD_SIZE,
            size: .5 + (i % 5) * .38,
            hue: (i * 47) % 360,
            phase: i * .73
        }));

        function addLog(msg) {
            const logContainer = document.getElementById('game-log');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerText = msg;
            logContainer.prepend(entry);
            setTimeout(() => entry.remove(), 3000);
        }

        function consumeFx(x, y, color, count = 12, power = 7) {
            for (let i = 0; i < count; i++) {
                const a = Math.random() * Math.PI * 2;
                const speed = 1 + Math.random() * power;
                effects.push({ x, y, vx: Math.cos(a) * speed, vy: Math.sin(a) * speed, life: .7 + Math.random() * .5, size: 1 + Math.random() * 3, color });
            }
        }

        function setDifficulty(diff) {
            currentDifficulty = diff;
            document.querySelectorAll('.diff-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.toLowerCase() === diff);
            });
            document.getElementById('current-diff-display').innerText = DIFFICULTIES[diff].label;
            updateBestScoreDisplay();
        }

        function updateBestScoreDisplay() {
            const best = localStorage.getItem(`eater_best_${currentDifficulty}`) || 0;
            bestScoreEl.innerText = best;
        }

        function spawnFood() {
            while (food.length < FOOD_COUNT) {
                food.push({
                    x: Math.random() * WORLD_SIZE,
                    y: Math.random() * WORLD_SIZE,
                    radius: Math.random() * 4 + 2,
                    color: `hsl(${Math.random() * 360}, 70%, 70%)`
                });
            }
        }

        function spawnEnemy(isInitial = false) {
            const minMass = 100;
            const maxMass = 2000 * Math.pow(2, currentStage - 1);
            const randomMass = minMass + Math.random() * (maxMass - minMass);
            const radius = Math.sqrt(randomMass);
            let x, y;

            // Spawn far from player
            do {
                x = Math.random() * WORLD_SIZE;
                y = Math.random() * WORLD_SIZE;
            } while (Math.hypot(x - player.x, y - player.y) < 800);

            const name = CELESTIAL_NAMES[Math.floor(Math.random() * CELESTIAL_NAMES.length)];
            const enemy = {
                name,
                x, y,
                radius,
                color: '#ff3e3e',
                hue: Math.floor(Math.random() * 360),
                vx: (Math.random() - 0.5),
                vy: (Math.random() - 0.5)
            };

            if (isInitial) enemies.push(enemy);
            else return enemy;
        }

        function initGame() {
            currentStage = 1;
            document.getElementById('stage-display').innerText = currentStage;
            player.radius = INITIAL_RADIUS;
            player.x = WORLD_SIZE / 2;
            player.y = WORLD_SIZE / 2;
            player.vx = 0;
            player.vy = 0;

            food = [];
            spawnFood();

            enemies = [];
            effects = [];
            screenShake = 0;
            for (let i = 0; i < ENEMY_COUNT; i++) {
                spawnEnemy(true);
            }

            scoreEl.innerText = Math.floor(player.radius * player.radius);
            updateBestScoreDisplay();
            lastTime = performance.now();
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if (!gameActive) {
                camera.x = player.x - canvas.width / 2;
                camera.y = player.y - canvas.height / 2;
            }
        }

        window.addEventListener('resize', resize);
        resize();

        function startGame() {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            initGame();
            gameActive = true;
            joystickContainer.classList.add('active');
            document.getElementById('mobile-hint').style.display = '';
        }

        function gameOver() {
            gameActive = false;
            joystick.active = false;
            joystickContainer.classList.remove('active');
            joystickKnob.style.transform = 'translate(-50%, -50%)';
            document.getElementById('mobile-hint').style.display = 'none';
            const finalMass = Math.floor(player.radius * player.radius);
            finalScoreEl.innerText = finalMass;
            const bestKey = `eater_best_${currentDifficulty}`;
            const best = parseInt(localStorage.getItem(bestKey) || 0);
            if (finalMass > best) {
                localStorage.setItem(bestKey, finalMass);
                bestScoreEl.innerText = finalMass;
            }
            document.getElementById('game-over-screen').classList.add('active');
        }

        function update(timestamp) {
            const deltaTime = timestamp - lastTime;
            lastTime = timestamp;
            const f = Math.min(deltaTime / (1000 / 60), 3);

            if (gameActive) {
                const config = DIFFICULTIES[currentDifficulty];

                // Handle Input (Keyboard and Joystick)
                let inputX = 0;
                let inputY = 0;

                if (joystick.active) {
                    inputX = joystick.x;
                    inputY = joystick.y;
                } else {
                    if (keys['ArrowUp'] || keys['w'] || keys['W']) inputY -= 1;
                    if (keys['ArrowDown'] || keys['s'] || keys['S']) inputY += 1;
                    if (keys['ArrowLeft'] || keys['a'] || keys['A']) inputX -= 1;
                    if (keys['ArrowRight'] || keys['d'] || keys['D']) inputX += 1;
                    
                    // Normalize keyboard diagonal
                    const mag = Math.hypot(inputX, inputY);
                    if (mag > 1) {
                        inputX /= mag;
                        inputY /= mag;
                    }
                }

                const maxSpeed = 20 / Math.sqrt(player.radius);
                if (inputX !== 0 || inputY !== 0) {
                    const targetVx = inputX * maxSpeed;
                    const targetVy = inputY * maxSpeed;
                    
                    // Acceleration
                    player.vx += (targetVx - player.vx) * 0.15 * f;
                    player.vy += (targetVy - player.vy) * 0.15 * f;
                } else {
                    // Friction/Deceleration
                    player.vx *= Math.pow(0.92, f);
                    player.vy *= Math.pow(0.92, f);
                    if (Math.abs(player.vx) < 0.01) player.vx = 0;
                    if (Math.abs(player.vy) < 0.01) player.vy = 0;
                }

                player.x += player.vx * f;
                player.y += player.vy * f;

                // Keep in world bounds
                player.x = Math.max(player.radius, Math.min(WORLD_SIZE - player.radius, player.x));
                player.y = Math.max(player.radius, Math.min(WORLD_SIZE - player.radius, player.y));
                
                // If hit world bound, stop velocity
                if (player.x === player.radius || player.x === WORLD_SIZE - player.radius) player.vx = 0;
                if (player.y === player.radius || player.y === WORLD_SIZE - player.radius) player.vy = 0;

                // Update Leaderboard
                if (Math.floor(timestamp / 500) !== Math.floor((timestamp - deltaTime) / 500)) {
                    updateLeaderboard();
                }

                // Camera follow player
                camera.x = player.x - canvas.width / 2;
                camera.y = player.y - canvas.height / 2;

                // Food collision
                food = food.filter(f => {
                    const d = Math.hypot(player.x - f.x, player.y - f.y);
                    if (d < player.radius) {
                        consumeFx(f.x, f.y, f.color, 5, 4);
                        player.radius = Math.sqrt(player.radius * player.radius + f.radius * f.radius * config.foodValue);
                        scoreEl.innerText = Math.floor(player.radius * player.radius);
                        return false;
                    }
                    return true;
                });
                spawnFood();

                // Enemy updates
                for (let i = 0; i < enemies.length; i++) {
                    const en = enemies[i];
                    
                    // Move enemy based on their mass (speed = 20 / sqrt(radius))
                    const enemyMaxSpeed = (20 / Math.sqrt(en.radius)) * (config.enemySpeed / 2.5);
                    en.x += en.vx * (enemyMaxSpeed + currentStage * 0.2) * f;
                    en.y += en.vy * (enemyMaxSpeed + currentStage * 0.2) * f;

                    // Bounce off walls
                    if (en.x < en.radius || en.x > WORLD_SIZE - en.radius) en.vx *= -1;
                    if (en.y < en.radius || en.y > WORLD_SIZE - en.radius) en.vy *= -1;

                    // Interaction with player
                    const d = Math.hypot(player.x - en.x, player.y - en.y);
                    if (d < Math.max(player.radius, en.radius)) {
                        if (player.radius > en.radius) {
                            // Player eats enemy
                            addLog(`You consumed ${en.name}`);
                            consumeFx(en.x, en.y, `hsl(${en.hue}, 90%, 65%)`, 42, 13);
                            screenShake = Math.min(20, 6 + en.radius * .12);
                            player.radius = Math.sqrt(player.radius * player.radius + en.radius * en.radius);
                            scoreEl.innerText = Math.floor(player.radius * player.radius);
                            enemies.splice(i, 1);
                            i--;
                            continue;
                        } else if (en.radius > player.radius) {
                            // Enemy eats player
                            addLog(`${en.name} absorbed you`);
                            consumeFx(player.x, player.y, '#43eaff', 55, 16);
                            screenShake = 22;
                            gameOver();
                            return;
                        }
                    }

                    // Interaction with other enemies
                    for (let j = i + 1; j < enemies.length; j++) {
                        const en2 = enemies[j];
                        const d2 = Math.hypot(en.x - en2.x, en.y - en2.y);
                        if (d2 < Math.max(en.radius, en2.radius)) {
                            if (en.radius > en2.radius) {
                                addLog(`${en.name} consumed ${en2.name}`);
                                en.radius = Math.sqrt(en.radius * en.radius + en2.radius * en2.radius);
                                enemies.splice(j, 1);
                                j--;
                            } else if (en2.radius > en.radius) {
                                addLog(`${en2.name} consumed ${en.name}`);
                                en2.radius = Math.sqrt(en2.radius * en2.radius + en.radius * en.radius);
                                enemies.splice(i, 1);
                                i--;
                                break;
                            }
                        }
                    }
                }

                // Stage Clear Logic
                if (enemies.length === 0 && gameActive) {
                    nextStage();
                }
            }

            effects.forEach(p => {
                p.x += p.vx * f;
                p.y += p.vy * f;
                p.vx *= Math.pow(.91, f);
                p.vy *= Math.pow(.91, f);
                p.life -= deltaTime / 900;
            });
            effects = effects.filter(p => p.life > 0);
            screenShake *= Math.pow(.82, f);

            draw();
            requestAnimationFrame(update);
        }

        function nextStage() {
            if (isTransitioning) return;
            isTransitioning = true;
            
            // Show Announcement
            const announce = document.getElementById('announcement');
            const title = document.getElementById('announce-title');
            const subtitle = document.getElementById('announce-subtitle');
            
            title.innerText = "MISSION CLEAR";
            subtitle.innerText = `STAGE ${currentStage + 1} START!`;
            announce.style.display = 'block';

            addLog(`Rank 1 Achieved! Stage ${currentStage} Clear!`);

            setTimeout(() => {
                currentStage++;
                document.getElementById('stage-display').innerText = currentStage;
                
                // Spawn new set of enemies for next stage
                enemies = [];
                const count = ENEMY_COUNT + (currentStage - 1) * 2;
                for (let i = 0; i < count; i++) {
                    enemies.push(spawnEnemy());
                }
                
                spawnFood();
                announce.style.display = 'none';
                isTransitioning = false;
            }, 3000);
        }

        function updateLeaderboard() {
            const list = [...enemies, player]
                .sort((a, b) => b.radius - a.radius);
            
            // Check for Rank 1 Stage Clear
            if (gameActive && !isTransitioning && list[0] === player && enemies.length > 0) {
                nextStage();
            }

            const container = document.getElementById('leaderboard-list');
            container.innerHTML = list.slice(0, 5).map((item, idx) => `
                <div class="leaderboard-item ${item === player ? 'is-player' : ''}">
                    <span>${idx + 1}. ${item.name}</span>
                    <span>${Math.floor(item.radius * item.radius)}</span>
                </div>
            `).join('');
        }

        function draw() {
            const time = performance.now();
            const cw = canvas.width, ch = canvas.height;
            const backdrop = ctx.createRadialGradient(cw * .55, ch * .46, 20, cw * .5, ch * .5, Math.max(cw, ch) * .72);
            backdrop.addColorStop(0, '#2f1244');
            backdrop.addColorStop(.38, '#11152f');
            backdrop.addColorStop(.76, '#070916');
            backdrop.addColorStop(1, '#010207');
            ctx.fillStyle = backdrop;
            ctx.fillRect(0, 0, cw, ch);

            // Far parallax dust makes movement readable even before nearby objects enter view.
            spaceDust.forEach(s => {
                const x = ((s.x - camera.x * .12) % cw + cw) % cw;
                const y = ((s.y - camera.y * .12) % ch + ch) % ch;
                ctx.globalAlpha = .22 + Math.sin(time * .0016 + s.phase) * .18;
                ctx.fillStyle = `hsl(${s.hue}, 80%, 76%)`;
                ctx.fillRect(x, y, s.size, s.size);
            });
            ctx.globalAlpha = 1;

            const jitterX = (Math.random() - .5) * screenShake;
            const jitterY = (Math.random() - .5) * screenShake;
            ctx.save();
            ctx.translate(-camera.x + jitterX, -camera.y + jitterY);

            // Fixed nebulae anchor the 3000×3000 world and give the arena a sense of place.
            [[520, 470, '#4e1a67'], [2470, 650, '#174b6a'], [2250, 2440, '#682334'], [580, 2380, '#1f5b51']].forEach(([x, y, color]) => {
                const ng = ctx.createRadialGradient(x, y, 20, x, y, 520);
                ng.addColorStop(0, color + '99');
                ng.addColorStop(.48, color + '35');
                ng.addColorStop(1, 'transparent');
                ctx.fillStyle = ng;
                ctx.fillRect(x - 540, y - 540, 1080, 1080);
            });

            ctx.strokeStyle = 'rgba(67, 234, 255, .32)';
            ctx.shadowColor = '#43eaff';
            ctx.shadowBlur = 12;
            ctx.lineWidth = 8;
            ctx.strokeRect(0, 0, WORLD_SIZE, WORLD_SIZE);
            ctx.shadowBlur = 0;
            ctx.strokeStyle = 'rgba(106, 139, 192, .075)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= WORLD_SIZE; i += 100) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, WORLD_SIZE); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(WORLD_SIZE, i); ctx.stroke();
            }

            // Edible stardust is rendered as luminous crystal fragments instead of dots.
            food.forEach((f, index) => {
                if (f.x < camera.x - 30 || f.x > camera.x + cw + 30 || f.y < camera.y - 30 || f.y > camera.y + ch + 30) return;
                ctx.save();
                ctx.translate(f.x, f.y);
                ctx.rotate(time * .001 + index * .73);
                ctx.fillStyle = f.color;
                ctx.shadowColor = f.color;
                ctx.shadowBlur = 10;
                const s = f.radius * 1.45;
                ctx.beginPath();
                ctx.moveTo(0, -s); ctx.lineTo(s * .7, 0); ctx.lineTo(0, s); ctx.lineTo(-s * .7, 0); ctx.closePath();
                ctx.fill();
                ctx.fillStyle = 'rgba(255,255,255,.72)';
                ctx.beginPath(); ctx.moveTo(-1, -s * .65); ctx.lineTo(s * .25, 0); ctx.lineTo(-1, s * .2); ctx.closePath(); ctx.fill();
                ctx.restore();
            });

            enemies.forEach((en, index) => {
                const prey = player.radius > en.radius;
                const relation = prey ? '#54ffad' : '#ff526d';
                const hue = en.hue ?? (index * 53 % 360);
                ctx.save();
                ctx.translate(en.x, en.y);
                ctx.shadowColor = relation;
                ctx.shadowBlur = prey ? 9 : 17;
                const planet = ctx.createRadialGradient(-en.radius * .35, -en.radius * .38, en.radius * .08, 0, 0, en.radius);
                planet.addColorStop(0, `hsl(${hue}, 90%, 76%)`);
                planet.addColorStop(.38, `hsl(${hue}, 64%, 43%)`);
                planet.addColorStop(1, `hsl(${(hue + 35) % 360}, 72%, 12%)`);
                ctx.fillStyle = planet;
                ctx.beginPath(); ctx.arc(0, 0, en.radius, 0, Math.PI * 2); ctx.fill();
                ctx.shadowBlur = 0;
                ctx.strokeStyle = relation;
                ctx.lineWidth = prey ? 2 : 3;
                if (!prey) ctx.setLineDash([8, 7]);
                ctx.beginPath(); ctx.arc(0, 0, en.radius * 1.13, time * .001 + index, time * .001 + index + Math.PI * 1.65); ctx.stroke();
                ctx.setLineDash([]);
                if (index % 3 === 0 && en.radius > 24) {
                    ctx.strokeStyle = `hsla(${hue}, 90%, 75%, .55)`;
                    ctx.lineWidth = Math.max(2, en.radius * .1);
                    ctx.beginPath(); ctx.ellipse(0, 0, en.radius * 1.45, en.radius * .35, -.25, 0, Math.PI * 2); ctx.stroke();
                }
                ctx.fillStyle = 'rgba(10,7,20,.3)';
                ctx.beginPath(); ctx.arc(en.radius * .2, en.radius * .1, en.radius * .18, 0, Math.PI * 2); ctx.fill();
                ctx.restore();

                ctx.textAlign = 'center';
                ctx.fillStyle = '#fff';
                ctx.font = `800 ${Math.max(10, Math.min(16, en.radius * .42))}px 'Space Grotesk'`;
                ctx.shadowColor = '#000'; ctx.shadowBlur = 6;
                ctx.fillText(en.name, en.x, en.y - en.radius - 16);
                ctx.fillStyle = relation;
                ctx.font = `800 ${Math.max(8, Math.min(11, en.radius * .3))}px 'Space Grotesk'`;
                ctx.fillText(`${Math.floor(en.radius * en.radius)} MASS`, en.x, en.y - en.radius - 5);
                ctx.shadowBlur = 0;
            });

            effects.forEach(p => {
                ctx.globalAlpha = Math.max(0, p.life);
                ctx.fillStyle = p.color;
                ctx.shadowColor = p.color;
                ctx.shadowBlur = 7;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2); ctx.fill();
            });
            ctx.globalAlpha = 1; ctx.shadowBlur = 0;

            // Player black hole: event horizon, animated accretion disc, and warped outer rings.
            const pX = player.x, pY = player.y, r = player.radius, disc = Math.max(28, r * 2.15);
            ctx.save();
            ctx.translate(pX, pY);
            ctx.rotate(-.18);
            ctx.globalCompositeOperation = 'screen';
            for (let i = 0; i < 6; i++) {
                ctx.strokeStyle = `hsla(${18 + i * 24}, 100%, ${68 + i * 3}%, ${.2 + i * .08})`;
                ctx.lineWidth = Math.max(2, r * (.09 + i * .014));
                ctx.shadowColor = i < 3 ? '#ff6b3e' : '#bd66ff';
                ctx.shadowBlur = 12;
                ctx.beginPath();
                ctx.ellipse(0, 0, disc * (1 - i * .055), Math.max(6, r * (.42 + i * .025)), time * .00035 * (i % 2 ? 1 : -1), 0, Math.PI * 2);
                ctx.stroke();
            }
            ctx.globalCompositeOperation = 'source-over';
            ctx.rotate(.18);
            const horizon = ctx.createRadialGradient(-r * .25, -r * .25, 1, 0, 0, r * 1.28);
            horizon.addColorStop(0, '#000'); horizon.addColorStop(.62, '#010105'); horizon.addColorStop(.76, '#43eaff'); horizon.addColorStop(.84, '#a54fff'); horizon.addColorStop(1, 'transparent');
            ctx.fillStyle = horizon; ctx.shadowColor = '#43eaff'; ctx.shadowBlur = 18;
            ctx.beginPath(); ctx.arc(0, 0, r * 1.3, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#000'; ctx.shadowBlur = 0; ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
            ctx.fillStyle = '#62efff';
            ctx.font = `900 ${Math.max(12, Math.min(18, r * .55))}px 'Space Grotesk'`;
            ctx.textAlign = 'center'; ctx.shadowColor = '#000'; ctx.shadowBlur = 8;
            ctx.fillText(player.name, pX, pY - disc * .72 - 12);
            ctx.fillStyle = '#c9ff4c'; ctx.font = `800 ${Math.max(9, Math.min(12, r * .34))}px 'Space Grotesk'`;
            ctx.fillText(`${Math.floor(r * r)} MASS`, pX, pY - disc * .72 + 2); ctx.shadowBlur = 0;
            ctx.restore();

            // Directional warnings for larger off-screen bodies prevent unfair deaths.
            enemies.filter(en => en.radius > player.radius * 1.02).forEach(en => {
                const sx = en.x - camera.x, sy = en.y - camera.y;
                if (sx > 70 && sx < cw - 70 && sy > 85 && sy < ch - 70) return;
                const a = Math.atan2(sy - ch / 2, sx - cw / 2);
                const x = clamp(cw / 2 + Math.cos(a) * Math.min(cw * .43, 480), 42, cw - 42);
                const y = clamp(ch / 2 + Math.sin(a) * Math.min(ch * .39, 280), 88, ch - 42);
                ctx.save(); ctx.translate(x, y); ctx.rotate(a); ctx.fillStyle = '#ff526d'; ctx.shadowColor = '#ff526d'; ctx.shadowBlur = 12;
                ctx.beginPath(); ctx.moveTo(13, 0); ctx.lineTo(-9, -8); ctx.lineTo(-9, 8); ctx.closePath(); ctx.fill(); ctx.restore();
                ctx.fillStyle = '#ff8d9f'; ctx.font = '800 8px ui-monospace, monospace'; ctx.textAlign = 'center';
                ctx.fillText(`${Math.floor(en.radius * en.radius)}`, x, y + 20);
            });

            const vignette = ctx.createRadialGradient(cw / 2, ch / 2, Math.min(cw, ch) * .24, cw / 2, ch / 2, Math.max(cw, ch) * .66);
            vignette.addColorStop(0, 'transparent'); vignette.addColorStop(1, 'rgba(0,0,7,.52)'); ctx.fillStyle = vignette; ctx.fillRect(0, 0, cw, ch);
        }

        // Controls
        // Removed mouse/touch follow controls in favor of WASD/Arrows/Joystick

        window.addEventListener('keydown', e => {
            keys[e.key] = true;
            if (!gameActive && document.querySelector('.screen.active')) {
                startGame();
            }
        });
        window.addEventListener('keyup', e => {
            keys[e.key] = false;
        });

        // Virtual Joystick Logic
        joystickContainer.addEventListener('touchstart', e => {
            joystick.active = true;
            updateJoystick(e.touches[0]);
        });
        window.addEventListener('touchmove', e => {
            if (joystick.active) {
                updateJoystick(e.touches[0]);
            }
        });
        window.addEventListener('touchend', () => {
            joystick.active = false;
            joystickKnob.style.transform = 'translate(-50%, -50%)';
            joystick.x = 0;
            joystick.y = 0;
        });

        function updateJoystick(touch) {
            const rect = joystickContainer.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            let dx = touch.clientX - centerX;
            let dy = touch.clientY - centerY;
            const dist = Math.hypot(dx, dy);
            const maxDist = rect.width / 2;

            if (dist > maxDist) {
                dx = (dx / dist) * maxDist;
                dy = (dy / dist) * maxDist;
            }

            joystick.x = dx / maxDist;
            joystick.y = dy / maxDist;

            joystickKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
        }

        updateBestScoreDisplay();
        requestAnimationFrame(update);
    </script>
</body>
