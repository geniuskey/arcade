<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cosmic 2048 - Arcade</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&family=Space+Grotesk:wght@700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --neon-pink: #ff00ff;
            --bg-dark: #020010;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .back-btn {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 1000;
            text-decoration: none;
            color: white;
            background: rgba(0, 0, 0, 0.5);
            padding: 6px 12px;
            border-radius: 15px;
            font-family: sans-serif;
            font-size: 12px;
            transition: background 0.3s;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .back-btn:hover {
            background: rgba(0, 0, 0, 0.8);
        }

        body {
            background-color: var(--bg-dark);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            touch-action: none;
        }

        #top-bar {
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: space-between;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            z-index: 15;
            position: fixed;
            top: 0;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--neon-blue);
        }

        .stat-value {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 18px;
            font-weight: 700;
        }

        #game-container {
            position: relative;
            width: min(90vw, 400px);
            aspect-ratio: 1/1;
            background: rgba(255, 255, 255, 0.05);
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.1);
        }

        #grid-bg {
            display: grid;
            width: 100%;
            height: 100%;
            gap: 10px;
        }

        .grid-4 {
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
        }

        .grid-5 {
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(5, 1fr);
        }

        .grid-6 {
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(6, 1fr);
        }

        .grid-cell {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 6px;
        }

        #tile-container {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            pointer-events: none;
        }

        .tile {
            position: absolute;
            width: calc((100% - (var(--grid-gap) * (var(--grid-size) - 1))) / var(--grid-size));
            height: calc((100% - (var(--grid-gap) * (var(--grid-size) - 1))) / var(--grid-size));
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 24px;
            transition: transform 0.1s ease-in-out;
            z-index: 2;
        }

        .tile-inner {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 6px;
            animation: appear 0.2s ease-out;
        }

        @keyframes appear {
            0% {
                transform: scale(0);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes pop {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.15);
            }

            100% {
                transform: scale(1);
            }
        }

        .tile-merged {
            animation: pop 0.2s ease-out;
        }

        /* Cosmic Tile Colors */
        .v-2 {
            background: rgba(0, 243, 255, 0.1);
            color: #fff;
            box-shadow: inset 0 0 10px rgba(0, 243, 255, 0.3);
        }

        .v-4 {
            background: rgba(0, 243, 255, 0.2);
            color: #fff;
            box-shadow: inset 0 0 15px rgba(0, 243, 255, 0.5);
        }

        .v-8 {
            background: rgba(188, 19, 254, 0.3);
            color: #fff;
            box-shadow: inset 0 0 15px rgba(188, 19, 254, 0.5);
        }

        .v-16 {
            background: rgba(188, 19, 254, 0.5);
            color: #fff;
            box-shadow: inset 0 0 20px rgba(188, 19, 254, 0.7);
        }

        .v-32 {
            background: rgba(255, 0, 255, 0.4);
            color: #fff;
            box-shadow: inset 0 0 20px rgba(255, 0, 255, 0.7);
        }

        .v-64 {
            background: rgba(255, 0, 255, 0.6);
            color: #fff;
            box-shadow: inset 0 0 25px rgba(255, 0, 255, 0.9);
        }

        .v-128 {
            background: rgba(255, 157, 0, 0.5);
            color: #fff;
            font-size: 20px;
            text-shadow: 0 0 10px #ff9d00;
        }

        .v-256 {
            background: rgba(255, 157, 0, 0.7);
            color: #fff;
            font-size: 20px;
            text-shadow: 0 0 15px #ff9d00;
        }

        .v-512 {
            background: rgba(0, 255, 0, 0.6);
            color: #fff;
            font-size: 20px;
            text-shadow: 0 0 15px #00ff00;
        }

        .v-1024 {
            background: rgba(0, 255, 0, 0.8);
            color: #fff;
            font-size: 16px;
            text-shadow: 0 0 20px #00ff00;
        }

        .v-2048 {
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            color: #fff;
            font-size: 16px;
            box-shadow: 0 0 30px var(--neon-blue);
        }

        #screens {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.4);
        }

        .screen {
            background: rgba(2, 0, 16, 0.95);
            padding: clamp(20px, 5vw, 36px);
            border-radius: 24px;
            text-align: center;
            border: 1px solid var(--neon-blue);
            box-shadow: 0 0 50px rgba(0, 243, 255, 0.2);
            display: none;
            flex-direction: column;
            gap: 20px;
            max-width: 90%;
            max-height: calc(100vh - 32px);
            overflow-y: auto;
            pointer-events: auto;
        }

        .screen.active {
            display: flex;
        }

        h2 {
            font-size: 32px;
            background: linear-gradient(to right, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .difficulty-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 10px 0;
        }

        .diff-btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .diff-btn.active {
            background: var(--neon-blue);
            border-color: var(--neon-blue);
            color: var(--bg-dark);
            box-shadow: 0 0 15px var(--neon-blue);
        }

        .btn {
            padding: 15px 40px;
            background: var(--neon-purple);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 20px;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn.secondary {
            background: rgba(0, 243, 255, 0.12);
            border: 1px solid rgba(0, 243, 255, 0.7);
            color: white;
            font-size: 16px;
            padding: 12px 24px;
        }

        .btn:disabled {
            cursor: default;
            opacity: 0.4;
        }

        .resume-panel {
            width: min(100%, 340px);
            margin: 0 auto;
            padding: 12px 0 0;
            border-top: 1px solid rgba(255, 255, 255, 0.12);
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        .resume-panel.hidden {
            display: none;
        }

        #save-summary {
            color: rgba(255, 255, 255, 0.72);
            font-size: 13px;
            line-height: 1.5;
            overflow-wrap: anywhere;
        }

        .leaderboard {
            width: min(100%, 360px);
            margin: 0 auto;
            text-align: left;
        }

        .leaderboard-heading {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 6px;
        }

        .leaderboard-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .leaderboard-row {
            display: grid;
            grid-template-columns: 26px minmax(0, 1fr) auto;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 13px;
        }

        .leaderboard-rank {
            color: var(--neon-blue);
            font-family: 'Space Grotesk', sans-serif;
        }

        .leaderboard-score {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 16px;
        }

        .leaderboard-meta {
            color: rgba(255, 255, 255, 0.55);
            font-size: 11px;
            text-align: right;
            white-space: nowrap;
        }

        .empty-leaderboard {
            color: rgba(255, 255, 255, 0.45);
            font-size: 13px;
            padding: 10px 0;
            text-align: center;
        }

        #hint {
            margin-top: 30px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>

<body>
    <div id="top-bar">
        <div class="stat-item">
            <span class="stat-label">Score</span>
            <span id="score" class="stat-value">0</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Grid</span>
            <span id="current-diff-display" class="stat-value"
                style="font-size: 14px; color: var(--neon-blue);">4x4</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Best</span>
            <span id="best-score" class="stat-value">0</span>
        </div>
    </div>

    <div id="game-container" style="--grid-size: 4; --grid-gap: 10px;">
        <div id="grid-bg" class="grid-4"></div>
        <div id="tile-container"></div>
    </div>

    <div id="hint">Swipe or use WASD/Arrows to merge tiles</div>

    <div id="screens">
        <div id="start-screen" class="screen active">
            <h2>COSMIC 2048</h2>
            <div class="difficulty-selector">
                <button class="diff-btn active" onclick="setDifficulty(4)">4x4</button>
                <button class="diff-btn" onclick="setDifficulty(5)">5x5</button>
                <button class="diff-btn" onclick="setDifficulty(6)">6x6</button>
            </div>
            <p style="opacity: 0.7;">Merge identical celestial bodies to reach the ultimate singularity.</p>
            <div id="resume-panel" class="resume-panel hidden">
                <div class="stat-label">Saved Run</div>
                <div id="save-summary">Score 0</div>
                <button id="continue-btn" class="btn secondary" onclick="continueGame()">CONTINUE</button>
            </div>
            <button class="btn" onclick="startGame()">INITIALIZE</button>
            <div class="leaderboard">
                <div class="leaderboard-heading">
                    <span class="stat-label">Local Leaderboard</span>
                    <span id="leaderboard-grid-label" class="stat-label">4x4</span>
                </div>
                <ol id="leaderboard-list" class="leaderboard-list"></ol>
            </div>
        </div>

        <div id="game-over-screen" class="screen">
            <h2>CRITICAL MASS</h2>
            <p>The system has reached its limit.</p>
            <div style="margin: 10px 0;">
                <div class="stat-label">Final Score</div>
                <div id="final-score" class="stat-value">0</div>
            </div>
            <div class="leaderboard">
                <div class="leaderboard-heading">
                    <span class="stat-label">Local Leaderboard</span>
                    <span id="game-over-leaderboard-grid-label" class="stat-label">4x4</span>
                </div>
                <ol id="game-over-leaderboard-list" class="leaderboard-list"></ol>
            </div>
            <button class="btn" onclick="startGame()">REBOOT</button>
        </div>
    </div>

    <script>
        const container = document.getElementById('game-container');
        const tileContainer = document.getElementById('tile-container');
        const gridBg = document.getElementById('grid-bg');
        const scoreEl = document.getElementById('score');
        const bestScoreEl = document.getElementById('best-score');
        const finalScoreEl = document.getElementById('final-score');
        const resumePanel = document.getElementById('resume-panel');
        const saveSummaryEl = document.getElementById('save-summary');
        const continueBtn = document.getElementById('continue-btn');
        const leaderboardListEl = document.getElementById('leaderboard-list');
        const gameOverLeaderboardListEl = document.getElementById('game-over-leaderboard-list');
        const leaderboardGridLabelEl = document.getElementById('leaderboard-grid-label');
        const gameOverLeaderboardGridLabelEl = document.getElementById('game-over-leaderboard-grid-label');

        const GRID_SIZES = [4, 5, 6];
        const STORAGE_VERSION = 1;
        const SAVE_KEY_PREFIX = '2048_save_';
        const BEST_KEY_PREFIX = '2048_best_';
        const LEADERBOARD_KEY_PREFIX = '2048_leaderboard_';
        const LEADERBOARD_LIMIT = 5;

        let gridSize = 4;
        let board = []; // Stores { value, id }
        let score = 0;
        let gameActive = false;
        let tileIdCounter = 0;
        let movePending = false;
        let moveTimer = null;

        function setDifficulty(size) {
            configureGrid(size);
            updateBestScoreDisplay();
            renderLeaderboards();
            updateSavedGameUi();
            if (gameActive) startGame(); // Restart if size changed
        }

        function configureGrid(size) {
            gridSize = size;
            document.querySelectorAll('.diff-btn').forEach(btn => {
                btn.classList.toggle('active', parseInt(btn.innerText, 10) === size);
            });
            document.getElementById('current-diff-display').innerText = `${size}x${size}`;
            container.style.setProperty('--grid-size', size);
            gridBg.className = `grid-${size}`;
        }

        function saveKey(size = gridSize) {
            return `${SAVE_KEY_PREFIX}${size}`;
        }

        function bestKey(size = gridSize) {
            return `${BEST_KEY_PREFIX}${size}`;
        }

        function leaderboardKey(size = gridSize) {
            return `${LEADERBOARD_KEY_PREFIX}${size}`;
        }

        function readJSON(key, fallback) {
            try {
                const raw = localStorage.getItem(key);
                return raw ? JSON.parse(raw) : fallback;
            } catch (error) {
                return fallback;
            }
        }

        function writeJSON(key, value) {
            try {
                localStorage.setItem(key, JSON.stringify(value));
                return true;
            } catch (error) {
                return false;
            }
        }

        function removeStorageItem(key) {
            try {
                localStorage.removeItem(key);
            } catch (error) {
                // Ignore storage failures so the game remains playable.
            }
        }

        function clearMoveTimer() {
            if (moveTimer) {
                clearTimeout(moveTimer);
                moveTimer = null;
            }
            movePending = false;
        }

        function formatScore(value) {
            return Number(value || 0).toLocaleString();
        }

        function formatSavedAt(timestamp) {
            const date = new Date(timestamp);
            if (Number.isNaN(date.getTime())) return 'just now';
            return date.toLocaleString([], {
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function renderBackgroundGrid() {
            gridBg.innerHTML = '';
            for (let i = 0; i < gridSize * gridSize; i++) {
                const cell = document.createElement('div');
                cell.className = 'grid-cell';
                gridBg.appendChild(cell);
            }
        }

        function normalizeBoard(boardData, size) {
            if (!Array.isArray(boardData) || boardData.length !== size) return null;

            const seenIds = new Set();
            const normalized = [];
            for (const row of boardData) {
                if (!Array.isArray(row) || row.length !== size) return null;

                const normalizedRow = [];
                for (const tile of row) {
                    if (!tile) {
                        normalizedRow.push(null);
                        continue;
                    }

                    const value = Number(tile.value);
                    const id = Number(tile.id);
                    const invalidValue = !Number.isFinite(value) || value < 2 || !Number.isInteger(value);
                    const invalidId = !Number.isFinite(id) || id < 0 || !Number.isInteger(id) || seenIds.has(id);
                    if (invalidValue || invalidId) return null;

                    seenIds.add(id);
                    normalizedRow.push({ value, id });
                }
                normalized.push(normalizedRow);
            }
            return normalized;
        }

        function normalizeSavedGame(data) {
            if (!data || data.version !== STORAGE_VERSION || !GRID_SIZES.includes(data.gridSize)) return null;
            const savedBoard = normalizeBoard(data.board, data.gridSize);
            if (!savedBoard) return null;

            const maxId = savedBoard.flat().reduce((currentMax, tile) => {
                return tile ? Math.max(currentMax, tile.id) : currentMax;
            }, -1);
            const savedCounter = Number(data.tileIdCounter);

            return {
                gridSize: data.gridSize,
                board: savedBoard,
                score: Math.max(0, Math.floor(Number(data.score) || 0)),
                tileIdCounter: Number.isFinite(savedCounter) ? Math.max(Math.floor(savedCounter), maxId + 1) : maxId + 1,
                savedAt: Number.isFinite(Number(data.savedAt)) ? Number(data.savedAt) : Date.now()
            };
        }

        function getSavedGame(size = gridSize) {
            const raw = readJSON(saveKey(size), null);
            if (!raw) return null;

            const saved = normalizeSavedGame(raw);
            if (!saved || saved.gridSize !== size) {
                removeStorageItem(saveKey(size));
                return null;
            }
            return saved;
        }

        function getLatestSavedGame() {
            return GRID_SIZES
                .map(size => getSavedGame(size))
                .filter(Boolean)
                .sort((a, b) => b.savedAt - a.savedAt)[0] || null;
        }

        function serializeBoard() {
            return board.map(row => row.map(tile => tile ? {
                value: tile.value,
                id: tile.id
            } : null));
        }

        function getMaxTile(boardData = board) {
            return boardData.reduce((maxValue, row) => {
                return row.reduce((rowMax, tile) => tile ? Math.max(rowMax, tile.value) : rowMax, maxValue);
            }, 0);
        }

        function saveGameState() {
            if (!gameActive) return;

            writeJSON(saveKey(), {
                version: STORAGE_VERSION,
                gridSize,
                score,
                tileIdCounter,
                board: serializeBoard(),
                savedAt: Date.now()
            });
            updateSavedGameUi();
        }

        function clearSavedGame(size = gridSize) {
            removeStorageItem(saveKey(size));
            updateSavedGameUi();
        }

        function updateSavedGameUi() {
            if (!resumePanel || !saveSummaryEl || !continueBtn) return;

            const saved = getSavedGame(gridSize);
            if (saved && !gameActive) {
                resumePanel.classList.remove('hidden');
                continueBtn.disabled = false;
                saveSummaryEl.innerText = `Score ${formatScore(saved.score)} | Max ${formatScore(getMaxTile(saved.board))} | ${formatSavedAt(saved.savedAt)}`;
            } else {
                resumePanel.classList.add('hidden');
                continueBtn.disabled = true;
            }
        }

        function readLeaderboard(size = gridSize) {
            const raw = readJSON(leaderboardKey(size), []);
            if (!Array.isArray(raw)) return [];

            return raw
                .map(entry => ({
                    score: Math.max(0, Math.floor(Number(entry.score) || 0)),
                    maxTile: Math.max(0, Math.floor(Number(entry.maxTile) || 0)),
                    completedAt: Number.isFinite(Number(entry.completedAt)) ? Number(entry.completedAt) : Date.now()
                }))
                .filter(entry => entry.score > 0)
                .sort((a, b) => b.score - a.score || b.maxTile - a.maxTile || a.completedAt - b.completedAt)
                .slice(0, LEADERBOARD_LIMIT);
        }

        function writeLeaderboard(entries, size = gridSize) {
            writeJSON(leaderboardKey(size), entries.slice(0, LEADERBOARD_LIMIT));
        }

        function addLeaderboardEntry() {
            if (score <= 0) return;

            const entries = readLeaderboard(gridSize);
            entries.push({
                score,
                maxTile: getMaxTile(),
                completedAt: Date.now()
            });
            entries.sort((a, b) => b.score - a.score || b.maxTile - a.maxTile || a.completedAt - b.completedAt);
            writeLeaderboard(entries, gridSize);
        }

        function getBestScore(size = gridSize) {
            const storedBest = parseInt(localStorage.getItem(bestKey(size)) || 0, 10) || 0;
            const leaderboardBest = readLeaderboard(size)[0]?.score || 0;
            return Math.max(storedBest, leaderboardBest);
        }

        function updateBestScoreDisplay() {
            bestScoreEl.innerText = formatScore(getBestScore());
        }

        function renderLeaderboardList(listEl, entries) {
            if (!listEl) return;
            listEl.innerHTML = '';

            if (!entries.length) {
                const empty = document.createElement('li');
                empty.className = 'empty-leaderboard';
                empty.innerText = 'No completed runs yet';
                listEl.appendChild(empty);
                return;
            }

            entries.forEach((entry, index) => {
                const row = document.createElement('li');
                row.className = 'leaderboard-row';

                const rank = document.createElement('span');
                rank.className = 'leaderboard-rank';
                rank.innerText = `#${index + 1}`;

                const scoreNode = document.createElement('span');
                scoreNode.className = 'leaderboard-score';
                scoreNode.innerText = formatScore(entry.score);

                const meta = document.createElement('span');
                meta.className = 'leaderboard-meta';
                meta.innerText = `Max ${formatScore(entry.maxTile)} | ${formatSavedAt(entry.completedAt)}`;

                row.append(rank, scoreNode, meta);
                listEl.appendChild(row);
            });
        }

        function renderLeaderboards() {
            const entries = readLeaderboard(gridSize);
            const label = `${gridSize}x${gridSize}`;

            if (leaderboardGridLabelEl) leaderboardGridLabelEl.innerText = label;
            if (gameOverLeaderboardGridLabelEl) gameOverLeaderboardGridLabelEl.innerText = label;
            renderLeaderboardList(leaderboardListEl, entries);
            renderLeaderboardList(gameOverLeaderboardListEl, entries);
        }

        function initBoard() {
            board = Array(gridSize).fill().map(() => Array(gridSize).fill(null));
            score = 0;
            scoreEl.innerText = '0';
            movePending = false;

            renderBackgroundGrid();
            tileContainer.innerHTML = '';
            tileIdCounter = 0;

            addRandomTile();
            addRandomTile();
            draw();
            saveGameState();
        }

        function addRandomTile() {
            const empty = [];
            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    if (!board[r][c]) empty.push({ r, c });
                }
            }
            if (empty.length > 0) {
                const { r, c } = empty[Math.floor(Math.random() * empty.length)];
                board[r][c] = {
                    value: Math.random() < 0.9 ? 2 : 4,
                    id: tileIdCounter++
                };
            }
        }

        function getTileElement(id) {
            return tileContainer.querySelector(`[data-id="${id}"]`);
        }

        function draw() {
            const usedIds = new Set();

            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    const tile = board[r][c];
                    if (tile) {
                        usedIds.add(tile.id);
                        let el = getTileElement(tile.id);
                        if (!el) {
                            el = document.createElement('div');
                            el.className = 'tile';
                            el.dataset.id = tile.id;
                            el.innerHTML = `<div class="tile-inner v-${tile.value}">${tile.value}</div>`;
                            tileContainer.appendChild(el);
                        } else {
                            const inner = el.querySelector('.tile-inner');
                            if (parseInt(inner.innerText, 10) !== tile.value) {
                                inner.innerText = tile.value;
                                inner.className = `tile-inner v-${tile.value} tile-merged`;
                            }
                        }

                        const percent = 100 / gridSize;
                        el.style.transform = `translate(${c * 100}%, ${r * 100}%)`;
                        el.style.width = `${percent}%`;
                        el.style.height = `${percent}%`;

                        const gap = 10;
                        const offsetC = c * gap;
                        const offsetR = r * gap;
                        el.style.left = `${offsetC}px`;
                        el.style.top = `${offsetR}px`;
                        el.style.width = `calc(${percent}% - ${(gap * (gridSize - 1)) / gridSize}px)`;
                        el.style.height = `calc(${percent}% - ${(gap * (gridSize - 1)) / gridSize}px)`;
                    }
                }
            }

            Array.from(tileContainer.children).forEach(el => {
                if (!usedIds.has(parseInt(el.dataset.id, 10))) {
                    el.remove();
                }
            });
        }

        function move(dir) {
            if (!gameActive || movePending) return;
            let moved = false;

            const getAt = (r, c, d) => {
                if (d === 'left') return board[r][c];
                if (d === 'right') return board[r][gridSize - 1 - c];
                if (d === 'up') return board[c][r];
                if (d === 'down') return board[gridSize - 1 - c][r];
            };

            const setAt = (r, c, d, val) => {
                if (d === 'left') board[r][c] = val;
                else if (d === 'right') board[r][gridSize - 1 - c] = val;
                else if (d === 'up') board[c][r] = val;
                else if (d === 'down') board[gridSize - 1 - c][r] = val;
            };

            for (let r = 0; r < gridSize; r++) {
                let row = [];
                for (let c = 0; c < gridSize; c++) {
                    const tile = getAt(r, c, dir);
                    if (tile) row.push(tile);
                }

                let newRow = [];
                for (let i = 0; i < row.length; i++) {
                    if (i < row.length - 1 && row[i].value === row[i + 1].value) {
                        newRow.push({
                            value: row[i].value * 2,
                            id: row[i].id
                        });
                        score += row[i].value * 2;
                        i++;
                        moved = true;
                    } else {
                        newRow.push(row[i]);
                    }
                }

                while (newRow.length < gridSize) newRow.push(null);

                for (let c = 0; c < gridSize; c++) {
                    if (getAt(r, c, dir) !== newRow[c]) {
                        if (getAt(r, c, dir) || newRow[c]) moved = true;
                    }
                    setAt(r, c, dir, newRow[c]);
                }
            }

            if (moved) {
                movePending = true;
                scoreEl.innerText = formatScore(score);
                if (score > getBestScore()) bestScoreEl.innerText = formatScore(score);
                draw();
                saveGameState();

                moveTimer = setTimeout(() => {
                    addRandomTile();
                    draw();
                    moveTimer = null;
                    movePending = false;
                    if (checkGameOver()) {
                        gameOver();
                    } else {
                        saveGameState();
                    }
                }, 100);
            }
        }

        function checkGameOver() {
            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    if (!board[r][c]) return false;
                    if (c < gridSize - 1 && board[r][c].value === board[r][c + 1].value) return false;
                    if (r < gridSize - 1 && board[r][c].value === board[r + 1][c].value) return false;
                }
            }
            return true;
        }

        function startGame() {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            clearMoveTimer();
            gameActive = true;
            initBoard();
            updateBestScoreDisplay();
            renderLeaderboards();
            updateSavedGameUi();
        }

        function continueGame() {
            const saved = getSavedGame(gridSize);
            if (!saved) {
                updateSavedGameUi();
                return;
            }

            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            clearMoveTimer();
            configureGrid(saved.gridSize);
            board = saved.board;
            score = saved.score;
            tileIdCounter = saved.tileIdCounter;
            scoreEl.innerText = formatScore(score);
            gameActive = true;
            movePending = false;

            renderBackgroundGrid();
            tileContainer.innerHTML = '';
            draw();
            updateBestScoreDisplay();
            renderLeaderboards();
            saveGameState();
            updateSavedGameUi();
        }

        function gameOver() {
            gameActive = false;
            clearMoveTimer();
            finalScoreEl.innerText = formatScore(score);
            addLeaderboardEntry();

            const currentBest = getBestScore();
            if (score >= currentBest) {
                localStorage.setItem(bestKey(), score);
            }
            updateBestScoreDisplay();
            clearSavedGame();
            renderLeaderboards();
            document.getElementById('game-over-screen').classList.add('active');
        }

        window.addEventListener('keydown', e => {
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) e.preventDefault();
            if (!gameActive) return;

            if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') move('left');
            if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') move('right');
            if (e.key === 'ArrowUp' || e.key.toLowerCase() === 'w') move('up');
            if (e.key === 'ArrowDown' || e.key.toLowerCase() === 's') move('down');
        });

        let touchStart = null;
        window.addEventListener('touchstart', e => touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY });
        window.addEventListener('touchend', e => {
            if (!touchStart || !gameActive) return;
            const dx = e.changedTouches[0].clientX - touchStart.x;
            const dy = e.changedTouches[0].clientY - touchStart.y;
            if (Math.abs(dx) > Math.abs(dy)) {
                if (Math.abs(dx) > 30) move(dx > 0 ? 'right' : 'left');
            } else {
                if (Math.abs(dy) > 30) move(dy > 0 ? 'down' : 'up');
            }
            touchStart = null;
        });

        window.addEventListener('beforeunload', saveGameState);
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'hidden') saveGameState();
        });

        const latestSavedGame = getLatestSavedGame();
        if (latestSavedGame) {
            setDifficulty(latestSavedGame.gridSize);
        } else {
            updateBestScoreDisplay();
            renderLeaderboards();
            updateSavedGameUi();
        }
    </script>
    <script src="../mobile-arcade.js"></script>
    <script>MobileArcade.fit('#game-container');</script>
</body>
