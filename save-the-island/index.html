<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>우리 섬을 지켜라! - DEFEND THE ISLAND</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Oxanium:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --sky-top: #1e3c72;
        --sky-bottom: #2a5298;
        --sea: #1c4b7a;
        --sea-light: #2f7bc3;
        --accent: #ffcf4b;
        --danger: #ff5f5f;
        --island-enemy: #5d4037;
        --island-player: #2e7d32;
        --glass: rgba(15, 23, 42, 0.8);
      }

      * {
        box-sizing: border-box;
        user-select: none;
      }

      body {
        margin: 0;
        font-family: "Oxanium", "Segoe UI", sans-serif;
        background: #0f172a;
        overflow: hidden;
        color: white;
      }

      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        cursor: crosshair;
      }

      .hud {
        position: fixed;
        top: 20px;
        left: 20px;
        display: flex;
        flex-direction: column;
        gap: 15px;
        pointer-events: none;
        z-index: 10;
      }

      .panel {
        background: var(--glass);
        backdrop-filter: blur(8px);
        padding: 18px;
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        pointer-events: auto;
        width: 240px;
      }

      h1 {
        margin: 0 0 15px;
        font-family: "Black Han Sans", sans-serif;
        font-size: 22px;
        line-height: 1.12;
        color: var(--accent);
        text-shadow: 0 2px 4px rgba(0,0,0,0.5);
      }

      .stat-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
        font-weight: 600;
      }

      .stat-label {
        color: #94a3b8;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .stat-value {
        font-size: 18px;
      }

      .hp-bar-container {
        width: 100%;
        height: 8px;
        background: rgba(255,255,255,0.1);
        border-radius: 4px;
        margin: 10px 0 20px;
        overflow: hidden;
      }

      #hp-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--danger), #ff8a8a);
        width: 100%;
        transition: width 0.3s ease-out;
      }

      .money-text {
        color: var(--accent);
        font-size: 24px;
        font-weight: 700;
      }

      .btn {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 12px;
        background: linear-gradient(135deg, #fbbf24, #f59e0b);
        color: #451a03;
        font-weight: 800;
        font-family: inherit;
        cursor: pointer;
        transition: transform 0.1s, filter 0.2s;
        margin-top: 10px;
      }

      .btn:hover:not(:disabled) {
        filter: brightness(1.1);
        transform: translateY(-2px);
      }

      .btn:active:not(:disabled) {
        transform: translateY(0);
      }

      .btn:disabled {
        background: #475569;
        color: #94a3b8;
        cursor: not-allowed;
      }

      .controls-tip {
        font-size: 11px;
        color: #94a3b8;
        margin-top: 15px;
        line-height: 1.5;
        text-align: center;
      }

      .item-badge {
        display: inline-block;
        padding: 4px 8px;
        background: #334155;
        border-radius: 6px;
        font-size: 12px;
        color: #e2e8f0;
        margin-top: 10px;
      }

      .item-ready {
        background: #059669;
        color: white;
        animation: pulse 1s infinite;
      }

      @keyframes pulse {
        0% { opacity: 1; }
        50% { opacity: 0.7; }
        100% { opacity: 1; }
      }

      .game-over {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.9);
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 100;
        backdrop-filter: blur(10px);
      }

      .game-over.show {
        display: flex;
      }

      .game-over h2 {
        font-family: "Black Han Sans", sans-serif;
        font-size: 64px;
        margin: 0;
        color: var(--danger);
      }

      .game-over p {
        font-size: 20px;
        margin: 20px 0;
        color: #94a3b8;
      }

      #restart-btn {
        max-width: 200px;
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>

    <div class="hud">
      <div class="panel">
        <h1>우리 섬을 지켜라!</h1>
        <div class="stat-row">
          <span class="stat-label">Main Gun</span>
          <span class="stat-value">Lv.<span id="gun-level">1</span></span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Currency</span>
          <span class="money-text" id="money">$0</span>
        </div>
        <button class="btn" id="upgrade-btn">Upgrade Gun ($20)</button>
        <div id="item-status" class="item-badge">No Special Item</div>
        <div class="controls-tip">
          L-Click: Gun • R-Click: Cannon<br />
          [X]: Special Weapon
        </div>
      </div>
    </div>

    <div class="game-over" id="game-over">
      <h2>MISSION FAILED</h2>
      <p>The island has fallen.</p>
      <button class="btn" id="restart-btn">Try Again (R)</button>
    </div>

    <script>
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");

      // Audio System (Procedural)
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const Sfx = {
        init() {
          if (audioCtx.state === "suspended") audioCtx.resume();
        },
        play(type) {
          this.init();
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.connect(gain);
          gain.connect(audioCtx.destination);

          const now = audioCtx.currentTime;

          switch(type) {
            case "shoot":
              osc.type = "square";
              osc.frequency.setValueAtTime(800, now);
              osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
              gain.gain.setValueAtTime(0.1, now);
              gain.gain.linearRampToValueAtTime(0, now + 0.1);
              osc.start();
              osc.stop(now + 0.1);
              break;
            case "explosion":
              osc.type = "sawtooth";
              osc.frequency.setValueAtTime(150, now);
              osc.frequency.exponentialRampToValueAtTime(40, now + 0.3);
              gain.gain.setValueAtTime(0.3, now);
              gain.gain.linearRampToValueAtTime(0, now + 0.3);
              osc.start();
              osc.stop(now + 0.3);
              break;
            case "heavy":
              osc.type = "triangle";
              osc.frequency.setValueAtTime(200, now);
              osc.frequency.exponentialRampToValueAtTime(50, now + 0.5);
              gain.gain.setValueAtTime(0.5, now);
              gain.gain.linearRampToValueAtTime(0, now + 0.5);
              osc.start();
              osc.stop(now + 0.5);
              break;
            case "coin":
              osc.type = "sine";
              osc.frequency.setValueAtTime(900, now);
              osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
              gain.gain.setValueAtTime(0.1, now);
              gain.gain.linearRampToValueAtTime(0, now + 0.2);
              osc.start();
              osc.stop(now + 0.2);
              break;
            case "damage":
              osc.type = "sawtooth";
              osc.frequency.setValueAtTime(60, now);
              gain.gain.setValueAtTime(0.4, now);
              gain.gain.linearRampToValueAtTime(0, now + 0.4);
              osc.start();
              osc.stop(now + 0.4);
              break;
            case "powerup":
              osc.type = "sine";
              osc.frequency.setValueAtTime(400, now);
              osc.frequency.exponentialRampToValueAtTime(1500, now + 0.5);
              gain.gain.setValueAtTime(0.2, now);
              gain.gain.linearRampToValueAtTime(0, now + 0.5);
              osc.start();
              osc.stop(now + 0.5);
              break;
          }
        }
      };

      // UI elements
      const ui = {
        money: document.getElementById("money"),
        gunLevel: document.getElementById("gun-level"),
        upgradeBtn: document.getElementById("upgrade-btn"),
        itemStatus: document.getElementById("item-status"),
        gameOver: document.getElementById("game-over"),
        restartBtn: document.getElementById("restart-btn")
      };

      let width, height;
      const seaRatio = 0.18;
      const islandWidthRatio = 0.22;

      const state = {
        money: 0,
        baseHp: 100,
        maxHp: 100,
        gunLevel: 1,
        gunCooldown: 0,
        cannonCooldown: 0,
        itemReady: false,
        launcherAlive: true,
        launcherHp: 6,
        launcherMaxHp: 6,
        launcherCooldown: 0,
        aim: { x: 0, y: 0 },
        lastTime: 0,
        gameOver: false,
        shake: 0,
        frame: 0
      };

      const projectiles = [];
      const enemies = [];
      const gifts = [];
      const enemyMissiles = [];
      const popups = [];
      const particles = [];
      const clouds = [];
      const stars = [];

      // Initialize clouds
      for(let i=0; i<9; i++) {
        clouds.push({
          x: Math.random() * 2000,
          y: 35 + Math.random() * 260,
          speed: 0.14 + Math.random() * 0.35,
          scale: 0.75 + Math.random() * 1.35
        });
      }

      for(let i=0; i<80; i++) {
        stars.push({
          x: Math.random(),
          y: Math.random() * 0.58,
          size: 0.6 + Math.random() * 1.8,
          twinkle: Math.random() * Math.PI * 2
        });
      }

      function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width * window.devicePixelRatio;
        canvas.height = height * window.devicePixelRatio;
        ctx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
        if (state.aim.x === 0 && state.aim.y === 0) {
          state.aim.x = width * 0.55;
          state.aim.y = height * 0.42;
        }
      }

      window.addEventListener("resize", resize);
      resize();

      const getSeaY = () => height * (1 - seaRatio);
      const getIslandWidth = () => width * islandWidthRatio;
      const getTurretPos = () => ({ x: width - getIslandWidth() * 0.5, y: getSeaY() - 65 });
      const getLauncherPos = () => ({ x: getIslandWidth() * 0.5, y: getSeaY() - 75 });

      function createExplosion(x, y, color, count = 12) {
        for (let i = 0; i < count; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = Math.random() * 4 + 2;
          particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 1.0,
            decay: 0.02 + Math.random() * 0.03,
            size: Math.random() * 4 + 2,
            color
          });
        }
      }

      function addMoney(amount, x, y) {
        state.money += amount;
        Sfx.play("coin");
        popups.push({
          x, y, text: `+$${amount}`, life: 1, color: "#fbbf24", size: 18
        });
        updateHud();
      }

      function updateHud() {
        ui.money.textContent = `$${state.money}`;
        ui.gunLevel.textContent = state.gunLevel;
        
        const cost = state.gunLevel * 25;
        ui.upgradeBtn.textContent = state.gunLevel >= 8 ? "MAX LEVEL" : `Upgrade Gun ($${cost})`;
        ui.upgradeBtn.disabled = state.money < cost || state.gunLevel >= 8;

        if (state.itemReady) {
          ui.itemStatus.textContent = "MEGA BLAST READY [X]";
          ui.itemStatus.className = "item-badge item-ready";
        } else {
          ui.itemStatus.textContent = "No Special Item";
          ui.itemStatus.className = "item-badge";
        }
      }

      ui.upgradeBtn.addEventListener("click", () => {
        const cost = state.gunLevel * 25;
        if (state.money >= cost && state.gunLevel < 8) {
          state.money -= cost;
          state.gunLevel++;
          updateHud();
          createExplosion(width - 100, 100, "#fbbf24", 20);
        }
      });

      canvas.addEventListener("mousemove", (e) => {
        state.aim.x = e.clientX;
        state.aim.y = e.clientY;
      });

      canvas.addEventListener("mousedown", (e) => {
        if (state.gameOver) return;
        if (e.button === 2) {
          // Cannon is now more of a secondary/item-like heavy shot
          fireCannon();
        } else {
          fireGun();
        }
      });

      canvas.addEventListener("contextmenu", (e) => e.preventDefault());

      window.addEventListener("keydown", (e) => {
        if (e.key.toLowerCase() === "x" && state.itemReady && !state.gameOver) fireSuperShot();
        if (e.key.toLowerCase() === "r" && state.gameOver) restart();
      });
      ui.restartBtn.addEventListener("click", restart);

      function fireGun() {
        if (state.gunCooldown > 0) return;
        Sfx.play("shoot");
        
        const tx = state.aim.x;
        const ty = state.aim.y;
        
        // Instant "Pop" at target
        createExplosion(tx, ty, "#fff", 5);
        createExplosion(tx, ty, "#fbbf24", 3);
        
        // Flash at muzzle
        const origin = getTurretPos();
        createExplosion(origin.x, origin.y, "#fff", 2);

        // Check hits at target location
        let hitSomething = false;
        const hitRadius = 15;

        // Hit Enemy
        for (let j = enemies.length - 1; j >= 0; j--) {
          const e = enemies[j];
          if (Math.hypot(tx - e.x, ty - e.y) < e.size + hitRadius) {
            e.hp -= (2 + state.gunLevel);
            hitSomething = true;
            if (e.hp <= 0) {
              Sfx.play("explosion");
              createExplosion(e.x, e.y, "#f87171", 20);
              addMoney(e.reward, e.x, e.y);
              enemies.splice(j, 1);
            }
          }
        }

        // Hit Missile
        if (!hitSomething) {
          for (let j = enemyMissiles.length - 1; j >= 0; j--) {
            const m = enemyMissiles[j];
            if (Math.hypot(tx - m.x, ty - m.y) < m.radius + hitRadius) {
              createExplosion(m.x, m.y, "#ffaa00", 10);
              addMoney(1, m.x, m.y);
              enemyMissiles.splice(j, 1);
              hitSomething = true;
            }
          }
        }

        // Hit Launcher
        if (!hitSomething && state.launcherAlive) {
          const l = getLauncherPos();
          if (Math.hypot(tx - l.x, ty - l.y) < 30 + hitRadius) {
            state.launcherHp -= (2 + state.gunLevel);
            if (state.launcherHp <= 0) {
              state.launcherAlive = false;
              state.launcherCooldown = 10000;
              createExplosion(l.x, l.y, "#ef4444", 40);
              addMoney(5, l.x, l.y);
              updateHud();
            }
          }
        }

        // Hit Gift
        if (!hitSomething) {
          for (let j = gifts.length - 1; j >= 0; j--) {
            const g = gifts[j];
            if (Math.hypot(tx - g.x, ty - g.y) < g.size + hitRadius) {
              createExplosion(g.x, g.y, "#fbbf24", 15);
              if (Math.random() > 0.6) {
                state.itemReady = true;
                Sfx.play("powerup");
                popups.push({ x: g.x, y: g.y, text: "SPECIAL WEAPON!", life: 1.5, color: "#4ade80", size: 20 });
              } else {
                addMoney(10, g.x, g.y);
              }
              gifts.splice(j, 1);
              updateHud();
            }
          }
        }

        state.gunCooldown = Math.max(120 - state.gunLevel * 12, 40);
        state.shake = 1.5;
      }

      function fireCannon() {
        if (state.cannonCooldown > 0) return;
        Sfx.play("heavy");
        const origin = getTurretPos();
        const angle = Math.atan2(state.aim.y - origin.y, state.aim.x - origin.x);
        projectiles.push({
          x: origin.x, y: origin.y,
          vx: Math.cos(angle) * 9,
          vy: Math.sin(angle) * 9,
          radius: 8, damage: 15,
          color: "#fbbf24", type: "cannon", splash: 60
        });
        state.cannonCooldown = 400;
        state.shake = 8;
      }

      function fireSuperShot() {
        state.itemReady = false;
        Sfx.play("heavy");
        const origin = getTurretPos();
        const angle = Math.atan2(state.aim.y - origin.y, state.aim.x - origin.x);
        projectiles.push({
          x: origin.x, y: origin.y,
          vx: Math.cos(angle) * 7,
          vy: Math.sin(angle) * 7,
          radius: 15, damage: 40,
          color: "#ef4444", type: "super", splash: 120
        });
        state.shake = 20;
        updateHud();
      }


      function spawnEnemy() {
        const roll = Math.random();
        const seaY = getSeaY();
        const iw = getIslandWidth();
        
        let type = "ship", x = -60, y = seaY - 25, hp = 12, speed = 1.0, targetY = y, takingOff = false;
        
        if (roll > 0.6 && roll <= 0.85) { 
          type = "heli"; 
          y = 100 + Math.random() * 200; 
          hp = 8; 
          speed = 1.6; 
          targetY = y;
        } else if (roll > 0.85) { 
          type = "jet"; 
          x = iw * 0.3; // Start on enemy island
          y = seaY - 85; // On the ground
          hp = 6; 
          speed = 3.5; 
          targetY = 50 + Math.random() * 120; // Flight altitude
          takingOff = true;
        }
        
        enemies.push({ 
          x, y, type, hp, speed, size: 25, reward: 5, targetY, takingOff,
          fireCooldown: 1000 + Math.random() * 2000 
        });
      }

      function spawnGift() {
        gifts.push({
          x: getIslandWidth() + Math.random() * (width - getIslandWidth() * 2),
          y: -30, speed: 1.5 + Math.random(), size: 20
        });
      }

      function spawnEnemyMissile() {
        if (!state.launcherAlive) return;
        const start = getLauncherPos();
        const target = getTurretPos();
        const angle = Math.atan2(target.y - start.y, target.x - start.x);
        enemyMissiles.push({
          x: start.x, y: start.y,
          vx: Math.cos(angle) * 3, vy: Math.sin(angle) * 3,
          radius: 5
        });
      }

      const timers = { enemy: 0, gift: 0, missile: 0 };

      function update(delta) {
        if (state.gameOver) return;
        state.frame++;
        state.gunCooldown = Math.max(0, state.gunCooldown - delta);
        state.cannonCooldown = Math.max(0, state.cannonCooldown - delta);
        state.shake *= 0.9;

        if (!state.launcherAlive) {
          state.launcherCooldown -= delta;
          if (state.launcherCooldown <= 0) {
            state.launcherAlive = true;
            state.launcherHp = state.launcherMaxHp;
            updateHud();
          }
        }

        timers.enemy += delta;
        timers.gift += delta;
        timers.missile += delta;

        if (timers.enemy > 2000) { spawnEnemy(); timers.enemy = 0; }
        if (timers.gift > 10000) { spawnGift(); timers.gift = 0; }
        if (timers.missile > 4000) { spawnEnemyMissile(); timers.missile = 0; }

        // Clouds
        clouds.forEach(c => {
          c.x -= c.speed;
          if (c.x < -200) c.x = width + 200;
        });

        // Projectiles
        for (let i = projectiles.length - 1; i >= 0; i--) {
          const p = projectiles[i];
          p.x += p.vx; p.y += p.vy;
          if (p.x < 0 || p.x > width || p.y < 0 || p.y > height) projectiles.splice(i, 1);
        }

        // Enemies
        for (let i = enemies.length - 1; i >= 0; i--) {
          const e = enemies[i];
          e.x += e.speed;
          
          if (e.takingOff) {
            e.y -= 2;
            if (e.y <= e.targetY) { e.y = e.targetY; e.takingOff = false; }
          }

          // Drop bombs (Heli and Jet)
          if (e.type !== "ship" && !e.takingOff) {
            e.fireCooldown -= delta;
            
            const target = getTurretPos();
            const gravity = 0.05;
            const dy = target.y - e.y;
            
            // Calculate how far a bomb will travel horizontally if dropped now with vy=0
            // t = sqrt(2dy/g)
            const fallTime = Math.sqrt((2 * dy) / gravity);
            const horizontalDist = (e.speed + 1.5) * fallTime;
            const currentDistToTarget = target.x - e.x;

            // Drop if we are at the right distance for a natural forward drop
            if (e.fireCooldown <= 0 && currentDistToTarget <= horizontalDist + 50 && currentDistToTarget >= horizontalDist - 50) {
              enemyMissiles.push({
                x: e.x, y: e.y,
                vx: e.speed + 1.5, // Forward momentum
                vy: 0, // Natural drop (no upward toss)
                radius: 8,
                gravity: gravity,
                type: "bomb"
              });
              // Reset cooldown for next pass or another bomb
              e.fireCooldown = (e.type === "jet" ? 3000 : 4000) + Math.random() * 2000;
            }
          }

          if (e.x > width + 100) {
            enemies.splice(i, 1);
          } else if (e.x > width - getIslandWidth() * 0.5 && e.type === "ship") {
            // Only ships deal collision damage now, or planes if they are very low
            enemies.splice(i, 1);
            takeDamage(10);
          }
        }

        // Missiles & Bombs
        for (let i = enemyMissiles.length - 1; i >= 0; i--) {
          const m = enemyMissiles[i];
          m.x += m.vx; m.y += m.vy;
          if (m.gravity) {
            m.vy += m.gravity;
            // Add smoke trail for bombs
            if (state.frame % 3 === 0) {
              particles.push({
                x: m.x, y: m.y,
                vx: (Math.random() - 0.5) * 1,
                vy: (Math.random() - 0.5) * 1,
                life: 0.6,
                decay: 0.02,
                size: 3,
                color: "rgba(200, 200, 200, 0.5)"
              });
            }
          }

          const islandStartX = width - getIslandWidth();
          const groundY = getSeaY() - 20; // Island surface level

          if (m.x > islandStartX && m.y > groundY) {
            // Hit the island
            enemyMissiles.splice(i, 1);
            takeDamage(m.type === "bomb" ? 8 : 5);
          } else if (m.y > getSeaY()) {
            // Splash in water (only if not hitting island)
            createExplosion(m.x, m.y, "#2f7bc3", 5);
            enemyMissiles.splice(i, 1);
          }
        }

        // Gifts
        for (let i = gifts.length - 1; i >= 0; i--) {
          const g = gifts[i];
          g.y += g.speed;
          if (g.y > getSeaY()) gifts.splice(i, 1);
        }

        // Particles
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.x += p.vx; p.y += p.vy;
          p.life -= p.decay;
          if (p.life <= 0) particles.splice(i, 1);
        }

        // Popups
        for (let i = popups.length - 1; i >= 0; i--) {
          const p = popups[i];
          p.life -= 0.016;
          p.y -= 0.5;
          if (p.life <= 0) popups.splice(i, 1);
        }

        handleCollisions();
      }

      function takeDamage(amt) {
        state.baseHp -= amt;
        state.shake = 10;
        Sfx.play("damage");
        updateHud();
        if (state.baseHp <= 0) {
          state.gameOver = true;
          ui.gameOver.classList.add("show");
        }
      }

      function handleCollisions() {
        for (let i = projectiles.length - 1; i >= 0; i--) {
          const p = projectiles[i];
          let hit = false;

          // Hit Enemy
          for (let j = enemies.length - 1; j >= 0; j--) {
            const e = enemies[j];
            if (distance(p, e) < p.radius + e.size) {
              e.hp -= p.damage;
              hit = true;
              if (p.splash) splashDamage(p, p.splash);
              if (e.hp <= 0) {
                createExplosion(e.x, e.y, "#f87171", 20);
                addMoney(e.reward, e.x, e.y);
                enemies.splice(j, 1);
              }
              break;
            }
          }

          // Hit Missile
          if (!hit) {
            for (let j = enemyMissiles.length - 1; j >= 0; j--) {
              const m = enemyMissiles[j];
              if (distance(p, m) < p.radius + m.radius) {
                createExplosion(m.x, m.y, "#ffaa00", 10);
                addMoney(1, m.x, m.y);
                enemyMissiles.splice(j, 1);
                hit = true;
                break;
              }
            }
          }

          // Hit Launcher
          if (!hit && state.launcherAlive) {
            const l = getLauncherPos();
            if (distance(p, l) < p.radius + 30) {
              state.launcherHp -= p.damage;
              hit = true;
              if (state.launcherHp <= 0) {
                state.launcherAlive = false;
                state.launcherCooldown = 10000;
                createExplosion(l.x, l.y, "#ef4444", 40);
                addMoney(5, l.x, l.y);
                updateHud();
              }
            }
          }

          // Hit Gift
          if (!hit) {
            for (let j = gifts.length - 1; j >= 0; j--) {
              const g = gifts[j];
              if (distance(p, g) < p.radius + g.size) {
                createExplosion(g.x, g.y, "#fbbf24", 15);
                if (Math.random() > 0.6) {
                  state.itemReady = true;
                  popups.push({ x: g.x, y: g.y, text: "SPECIAL WEAPON!", life: 1.5, color: "#4ade80", size: 20 });
                } else {
                  addMoney(10, g.x, g.y);
                }
                gifts.splice(j, 1);
                hit = true;
                updateHud();
                break;
              }
            }
          }

          if (hit) projectiles.splice(i, 1);
        }
      }

      function splashDamage(p, radius) {
        enemies.forEach((e, idx) => {
          if (distance(p, e) < radius) {
            e.hp -= 8;
            if (e.hp <= 0) {
              createExplosion(e.x, e.y, "#f87171", 15);
              addMoney(e.reward, e.x, e.y);
              enemies.splice(idx, 1);
            }
          }
        });
      }

      function distance(a, b) {
        return Math.hypot(a.x - b.x, a.y - b.y);
      }

      function roundedRectPath(x, y, w, h, r) {
        const radius = Math.min(r, w / 2, h / 2);
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.lineTo(x + w - radius, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
        ctx.lineTo(x + w, y + h - radius);
        ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
        ctx.lineTo(x + radius, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
        ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y);
        ctx.closePath();
      }

      function drawPalmTree(x, y, scale = 1, flip = 1) {
        ctx.save();
        ctx.translate(x, y);
        ctx.scale(flip * scale, scale);
        ctx.lineCap = "round";

        ctx.strokeStyle = "#8b5a2b";
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.bezierCurveTo(8, -18, -5, -42, 5, -64);
        ctx.stroke();

        ctx.strokeStyle = "rgba(255, 228, 181, 0.35)";
        ctx.lineWidth = 1.5;
        for (let i = 0; i < 5; i++) {
          ctx.beginPath();
          ctx.moveTo(-3, -10 - i * 10);
          ctx.lineTo(7, -15 - i * 10);
          ctx.stroke();
        }

        ctx.translate(5, -64);
        for (let i = 0; i < 7; i++) {
          const angle = -Math.PI * 0.9 + i * (Math.PI * 1.8 / 6);
          ctx.save();
          ctx.rotate(angle);
          const leafGrad = ctx.createLinearGradient(0, 0, 46, 0);
          leafGrad.addColorStop(0, "#1f9d55");
          leafGrad.addColorStop(1, "#7ddc62");
          ctx.fillStyle = leafGrad;
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.bezierCurveTo(16, -8, 35, -8, 50, 0);
          ctx.bezierCurveTo(31, 8, 13, 7, 0, 0);
          ctx.fill();
          ctx.restore();
        }

        ctx.fillStyle = "#7c3f12";
        ctx.beginPath();
        ctx.arc(-4, 4, 4, 0, Math.PI * 2);
        ctx.arc(4, 5, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawRock(x, y, w, h, color = "#6b7280") {
        ctx.save();
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.ellipse(x, y, w, h, -0.15, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "rgba(255,255,255,0.18)";
        ctx.beginPath();
        ctx.ellipse(x - w * 0.25, y - h * 0.25, w * 0.25, h * 0.18, -0.15, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function draw() {
        ctx.save();
        if (state.shake > 0.1) ctx.translate(Math.random() * state.shake, Math.random() * state.shake);
        
        ctx.clearRect(0, 0, width, height);
        drawBackground();
        
        clouds.forEach(drawCloud);
        drawIslands();
        drawLauncher();
        drawTurret();

        enemies.forEach(drawEnemy);
        gifts.forEach(drawGift);
        enemyMissiles.forEach(drawMissile);
        projectiles.forEach(drawProjectile);
        particles.forEach(drawParticle);
        drawPopups();
        drawBaseHpBar();
        drawTarget();

        ctx.restore();
      }

      function drawBaseHpBar() {
        const iw = getIslandWidth();
        const seaY = getSeaY();
        const x = width - iw * 0.5;
        const y = seaY - 140;
        const barW = 120;
        const barH = 10;
        
        const hpRatio = Math.max(0, state.baseHp / state.maxHp);
        
        ctx.save();
        ctx.translate(x - barW / 2, y);
        
        // Background/Border
        ctx.fillStyle = "rgba(0,0,0,0.5)";
        ctx.fillRect(-2, -2, barW + 4, barH + 4);
        
        // HP Fill (Color changes based on health)
        let color = "#4ade80"; // Green
        if (hpRatio < 0.3) color = "#ef4444"; // Red
        else if (hpRatio < 0.6) color = "#fbbf24"; // Yellow
        
        ctx.fillStyle = color;
        ctx.fillRect(0, 0, barW * hpRatio, barH);
        
        // Label
        ctx.fillStyle = "white";
        ctx.font = "bold 12px Oxanium";
        ctx.textAlign = "center";
        ctx.fillText("BASE INTEGRITY", barW / 2, -8);
        
        ctx.restore();
      }

      function drawTarget() {
        const { x, y } = state.aim;
        const size = 15;
        
        ctx.save();
        ctx.translate(x, y);
        
        ctx.strokeStyle = "#ff4444";
        ctx.lineWidth = 2;
        
        // Target circle
        ctx.beginPath();
        ctx.arc(0, 0, size, 0, Math.PI * 2);
        ctx.stroke();
        
        // Crosshair lines
        ctx.beginPath();
        ctx.moveTo(-size - 5, 0); ctx.lineTo(-size + 5, 0);
        ctx.moveTo(size + 5, 0); ctx.lineTo(size - 5, 0);
        ctx.moveTo(0, -size - 5); ctx.lineTo(0, -size + 5);
        ctx.moveTo(0, size + 5); ctx.lineTo(0, size - 5);
        ctx.stroke();
        
        // Center dot
        ctx.fillStyle = "#ff4444";
        ctx.beginPath();
        ctx.arc(0, 0, 2, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.restore();
      }

      function drawBackground() {
        const seaY = getSeaY();
        const grad = ctx.createLinearGradient(0, 0, 0, seaY);
        grad.addColorStop(0, "#06152c");
        grad.addColorStop(0.42, "#164061");
        grad.addColorStop(0.72, "#d77762");
        grad.addColorStop(1, "#276f8b");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, width, seaY);

        const sunX = width * 0.68;
        const sunY = seaY * 0.68;
        const sunGlow = ctx.createRadialGradient(sunX, sunY, 8, sunX, sunY, seaY * 0.55);
        sunGlow.addColorStop(0, "rgba(255, 224, 148, 0.45)");
        sunGlow.addColorStop(0.38, "rgba(255, 160, 100, 0.18)");
        sunGlow.addColorStop(1, "rgba(255, 160, 100, 0)");
        ctx.fillStyle = sunGlow;
        ctx.fillRect(0, 0, width, seaY);

        stars.forEach((s) => {
          const starY = s.y * seaY;
          const fade = Math.max(0, 0.9 - s.y * 1.55);
          if (fade <= 0) return;
          ctx.globalAlpha = fade * (0.65 + Math.sin(state.frame * 0.035 + s.twinkle) * 0.2);
          ctx.fillStyle = "#f8fafc";
          ctx.beginPath();
          ctx.arc(s.x * width, starY, s.size, 0, Math.PI * 2);
          ctx.fill();
        });
        ctx.globalAlpha = 1;

        ctx.fillStyle = "rgba(9, 28, 49, 0.45)";
        ctx.beginPath();
        ctx.moveTo(0, seaY);
        ctx.lineTo(0, seaY - 58);
        ctx.bezierCurveTo(width * 0.12, seaY - 96, width * 0.22, seaY - 34, width * 0.34, seaY - 72);
        ctx.bezierCurveTo(width * 0.48, seaY - 116, width * 0.58, seaY - 46, width * 0.72, seaY - 82);
        ctx.bezierCurveTo(width * 0.84, seaY - 112, width * 0.92, seaY - 62, width, seaY - 86);
        ctx.lineTo(width, seaY);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = "rgba(14, 58, 75, 0.42)";
        ctx.beginPath();
        ctx.moveTo(0, seaY);
        ctx.lineTo(0, seaY - 24);
        ctx.bezierCurveTo(width * 0.16, seaY - 54, width * 0.25, seaY - 18, width * 0.4, seaY - 42);
        ctx.bezierCurveTo(width * 0.57, seaY - 68, width * 0.68, seaY - 16, width * 0.82, seaY - 38);
        ctx.bezierCurveTo(width * 0.9, seaY - 52, width * 0.96, seaY - 30, width, seaY - 44);
        ctx.lineTo(width, seaY);
        ctx.closePath();
        ctx.fill();

        const seaGrad = ctx.createLinearGradient(0, seaY, 0, height);
        seaGrad.addColorStop(0, "#1aa0b0");
        seaGrad.addColorStop(0.5, "#0d617c");
        seaGrad.addColorStop(1, "#06263d");
        ctx.fillStyle = seaGrad;
        ctx.fillRect(0, seaY, width, height - seaY);

        ctx.strokeStyle = "rgba(255, 238, 196, 0.45)";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(0, seaY + 0.5);
        ctx.lineTo(width, seaY + 0.5);
        ctx.stroke();

        const waterDepth = height - seaY;
        for(let i=0; i<10; i++) {
          const y = seaY + 10 + i * (waterDepth / 10);
          const off = (state.frame * (0.25 + i * 0.03) + i * 47) % 180;
          ctx.strokeStyle = `rgba(226, 250, 255, ${0.22 - i * 0.012})`;
          ctx.lineWidth = i % 3 === 0 ? 2 : 1;
          ctx.beginPath();
          for(let x=-off; x<width + 120; x+=90) {
            ctx.moveTo(x, y);
            ctx.quadraticCurveTo(x + 22, y - 5 - i * 0.2, x + 45, y);
            ctx.quadraticCurveTo(x + 68, y + 4 + i * 0.15, x + 90, y);
          }
          ctx.stroke();
        }
      }

      function drawCloud(c) {
        ctx.save();
        ctx.globalAlpha = 0.48;
        ctx.shadowColor = "rgba(255, 218, 185, 0.35)";
        ctx.shadowBlur = 16;
        const cloudGrad = ctx.createLinearGradient(c.x, c.y - 35 * c.scale, c.x, c.y + 35 * c.scale);
        cloudGrad.addColorStop(0, "rgba(255,255,255,0.7)");
        cloudGrad.addColorStop(1, "rgba(176,196,222,0.18)");
        ctx.fillStyle = cloudGrad;
        ctx.beginPath();
        ctx.ellipse(c.x - 42 * c.scale, c.y + 12 * c.scale, 28 * c.scale, 15 * c.scale, 0, 0, Math.PI * 2);
        ctx.ellipse(c.x - 14 * c.scale, c.y, 34 * c.scale, 22 * c.scale, 0, 0, Math.PI * 2);
        ctx.ellipse(c.x + 24 * c.scale, c.y + 8 * c.scale, 38 * c.scale, 18 * c.scale, 0, 0, Math.PI * 2);
        ctx.ellipse(c.x + 58 * c.scale, c.y + 15 * c.scale, 24 * c.scale, 12 * c.scale, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawIslands() {
        const seaY = getSeaY();
        const iw = getIslandWidth();

        ctx.save();
        ctx.fillStyle = "rgba(0, 18, 24, 0.28)";
        ctx.beginPath();
        ctx.ellipse(iw * 0.5, seaY + 22, iw * 0.7, 26, 0, 0, Math.PI * 2);
        ctx.ellipse(width - iw * 0.52, seaY + 24, iw * 0.68, 28, 0, 0, Math.PI * 2);
        ctx.fill();

        const enemyCliff = ctx.createLinearGradient(0, seaY - 130, 0, height);
        enemyCliff.addColorStop(0, "#7c4a35");
        enemyCliff.addColorStop(0.48, "#513127");
        enemyCliff.addColorStop(1, "#261714");
        ctx.fillStyle = enemyCliff;
        ctx.shadowColor = "rgba(0,0,0,0.38)";
        ctx.shadowBlur = 20;
        ctx.beginPath();
        ctx.moveTo(0, height + 40);
        ctx.lineTo(iw * 1.06, height + 40);
        ctx.bezierCurveTo(iw * 1.02, seaY + 14, iw * 0.95, seaY - 24, iw * 0.82, seaY - 58);
        ctx.bezierCurveTo(iw * 0.64, seaY - 108, iw * 0.36, seaY - 132, iw * 0.18, seaY - 94);
        ctx.bezierCurveTo(iw * 0.08, seaY - 72, 0, seaY - 58, 0, height + 40);
        ctx.closePath();
        ctx.fill();
        ctx.shadowBlur = 0;

        const enemyTop = ctx.createLinearGradient(0, seaY - 125, iw, seaY - 20);
        enemyTop.addColorStop(0, "#8a4f30");
        enemyTop.addColorStop(0.55, "#6f3b28");
        enemyTop.addColorStop(1, "#4b2a20");
        ctx.fillStyle = enemyTop;
        ctx.beginPath();
        ctx.moveTo(0, seaY - 48);
        ctx.bezierCurveTo(iw * 0.18, seaY - 88, iw * 0.34, seaY - 118, iw * 0.55, seaY - 98);
        ctx.bezierCurveTo(iw * 0.74, seaY - 82, iw * 0.88, seaY - 52, iw * 0.99, seaY - 18);
        ctx.lineTo(iw * 0.94, seaY + 4);
        ctx.bezierCurveTo(iw * 0.56, seaY - 8, iw * 0.26, seaY - 6, 0, seaY + 8);
        ctx.closePath();
        ctx.fill();

        ctx.strokeStyle = "#e3b260";
        ctx.lineWidth = 7;
        ctx.beginPath();
        ctx.moveTo(0, seaY - 45);
        ctx.bezierCurveTo(iw * 0.22, seaY - 82, iw * 0.38, seaY - 114, iw * 0.56, seaY - 98);
        ctx.bezierCurveTo(iw * 0.72, seaY - 84, iw * 0.86, seaY - 54, iw * 0.98, seaY - 20);
        ctx.stroke();

        ctx.strokeStyle = "rgba(255,255,255,0.2)";
        ctx.lineWidth = 2;
        for (let i = 0; i < 4; i++) {
          ctx.beginPath();
          ctx.moveTo(iw * (0.2 + i * 0.16), seaY - 68 + i * 5);
          ctx.lineTo(iw * (0.12 + i * 0.18), seaY + 26);
          ctx.stroke();
        }

        ctx.save();
        ctx.translate(iw * 0.33, seaY - 82);
        ctx.rotate(0.08);
        ctx.fillStyle = "rgba(25, 19, 18, 0.72)";
        roundedRectPath(-50, -6, 100, 12, 4);
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.18)";
        ctx.lineWidth = 1;
        for (let x = -35; x <= 35; x += 18) {
          ctx.beginPath();
          ctx.moveTo(x, -3);
          ctx.lineTo(x + 7, 3);
          ctx.stroke();
        }
        ctx.restore();

        drawRock(iw * 0.13, seaY - 26, 14, 7, "#7a5544");
        drawRock(iw * 0.76, seaY - 34, 17, 8, "#5c4036");

        const playerCliff = ctx.createLinearGradient(width - iw, seaY - 130, width, height);
        playerCliff.addColorStop(0, "#7f8a45");
        playerCliff.addColorStop(0.42, "#4f6b3b");
        playerCliff.addColorStop(1, "#22351f");
        ctx.fillStyle = playerCliff;
        ctx.shadowColor = "rgba(0,0,0,0.38)";
        ctx.shadowBlur = 20;
        ctx.beginPath();
        ctx.moveTo(width, height + 40);
        ctx.lineTo(width - iw * 1.08, height + 40);
        ctx.bezierCurveTo(width - iw * 1.02, seaY + 18, width - iw * 0.95, seaY - 22, width - iw * 0.82, seaY - 57);
        ctx.bezierCurveTo(width - iw * 0.62, seaY - 110, width - iw * 0.42, seaY - 127, width - iw * 0.2, seaY - 93);
        ctx.bezierCurveTo(width - iw * 0.08, seaY - 74, width, seaY - 78, width, height + 40);
        ctx.closePath();
        ctx.fill();
        ctx.shadowBlur = 0;

        const playerTop = ctx.createLinearGradient(width - iw, seaY - 126, width, seaY - 24);
        playerTop.addColorStop(0, "#94d84a");
        playerTop.addColorStop(0.52, "#4caf50");
        playerTop.addColorStop(1, "#26764b");
        ctx.fillStyle = playerTop;
        ctx.beginPath();
        ctx.moveTo(width - iw * 0.96, seaY - 25);
        ctx.bezierCurveTo(width - iw * 0.82, seaY - 62, width - iw * 0.66, seaY - 103, width - iw * 0.44, seaY - 111);
        ctx.bezierCurveTo(width - iw * 0.25, seaY - 118, width - iw * 0.08, seaY - 88, width, seaY - 75);
        ctx.lineTo(width, seaY + 8);
        ctx.bezierCurveTo(width - iw * 0.34, seaY - 8, width - iw * 0.64, seaY - 2, width - iw * 0.98, seaY + 5);
        ctx.closePath();
        ctx.fill();

        ctx.strokeStyle = "#f5d48a";
        ctx.lineWidth = 8;
        ctx.beginPath();
        ctx.moveTo(width - iw * 0.96, seaY - 25);
        ctx.bezierCurveTo(width - iw * 0.82, seaY - 62, width - iw * 0.66, seaY - 103, width - iw * 0.44, seaY - 111);
        ctx.bezierCurveTo(width - iw * 0.25, seaY - 118, width - iw * 0.08, seaY - 88, width, seaY - 75);
        ctx.stroke();

        ctx.strokeStyle = "rgba(255,255,255,0.32)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(width - iw * 0.98, seaY + 10);
        ctx.bezierCurveTo(width - iw * 0.72, seaY - 2, width - iw * 0.38, seaY - 6, width, seaY + 10);
        ctx.stroke();

        ctx.strokeStyle = "rgba(255,255,255,0.16)";
        ctx.lineWidth = 2;
        for (let i = 0; i < 4; i++) {
          ctx.beginPath();
          ctx.moveTo(width - iw * (0.22 + i * 0.16), seaY - 70 + i * 5);
          ctx.lineTo(width - iw * (0.12 + i * 0.19), seaY + 28);
          ctx.stroke();
        }

        ctx.fillStyle = "rgba(18, 48, 32, 0.5)";
        roundedRectPath(width - iw * 0.63, seaY - 77, 78, 10, 5);
        ctx.fill();
        drawPalmTree(width - iw * 0.27, seaY - 92, 0.72, -1);
        drawPalmTree(width - iw * 0.73, seaY - 44, 0.52, 1);
        drawRock(width - iw * 0.9, seaY - 16, 13, 6, "#68735d");
        drawRock(width - iw * 0.15, seaY - 37, 16, 7, "#596f4e");
        ctx.restore();
      }

      function drawTurret() {
        const p = getTurretPos();
        const angle = Math.atan2(state.aim.y - p.y, state.aim.x - p.x);
        
        ctx.save();
        ctx.translate(p.x, p.y);

        ctx.fillStyle = "rgba(0, 0, 0, 0.32)";
        ctx.beginPath();
        ctx.ellipse(0, 27, 56, 12, 0, 0, Math.PI * 2);
        ctx.fill();

        const platform = ctx.createLinearGradient(0, 8, 0, 36);
        platform.addColorStop(0, "#6b7280");
        platform.addColorStop(1, "#263241");
        ctx.fillStyle = platform;
        roundedRectPath(-47, 10, 94, 22, 6);
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.26)";
        ctx.lineWidth = 1.5;
        ctx.stroke();

        ctx.save();
        ctx.rotate(angle);
        const barrel = ctx.createLinearGradient(0, -8, 58, 8);
        barrel.addColorStop(0, "#cbd5e1");
        barrel.addColorStop(0.46, "#64748b");
        barrel.addColorStop(1, "#111827");
        ctx.fillStyle = barrel;
        roundedRectPath(-5, -7, 62, 14, 5);
        ctx.fill();
        ctx.strokeStyle = "#dbeafe";
        ctx.globalAlpha = 0.45;
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.globalAlpha = 1;
        ctx.fillStyle = "#0f172a";
        roundedRectPath(48, -9, 12, 18, 4);
        ctx.fill();

        const maxCooldown = Math.max(120 - state.gunLevel * 12, 40);
        if (state.gunCooldown > maxCooldown - 35 || state.cannonCooldown > 360) {
          const flash = ctx.createRadialGradient(64, 0, 2, 64, 0, 24);
          flash.addColorStop(0, "rgba(255,255,255,0.95)");
          flash.addColorStop(0.45, "rgba(255,207,75,0.75)");
          flash.addColorStop(1, "rgba(255,95,95,0)");
          ctx.fillStyle = flash;
          ctx.beginPath();
          ctx.arc(64, 0, 24, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();

        const dome = ctx.createRadialGradient(-10, -9, 4, 0, 4, 40);
        dome.addColorStop(0, "#e2e8f0");
        dome.addColorStop(0.45, "#64748b");
        dome.addColorStop(1, "#1e293b");
        ctx.fillStyle = dome;
        ctx.beginPath();
        ctx.arc(0, 8, 31, Math.PI, 0);
        ctx.lineTo(34, 18);
        ctx.lineTo(-34, 18);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = "#cbd5e1";
        ctx.lineWidth = 1.5;
        ctx.stroke();

        ctx.fillStyle = "rgba(15, 23, 42, 0.8)";
        for (let x = -22; x <= 22; x += 22) {
          ctx.beginPath();
          ctx.arc(x, 17, 3, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      function drawLauncher() {
        const p = getLauncherPos();
        const target = getTurretPos();
        const angle = Math.atan2(target.y - p.y, target.x - p.x);
        ctx.save();
        ctx.translate(p.x, p.y);

        ctx.fillStyle = "rgba(0,0,0,0.35)";
        ctx.beginPath();
        ctx.ellipse(0, 25, 48, 11, 0, 0, Math.PI * 2);
        ctx.fill();

        if (!state.launcherAlive) {
          ctx.fillStyle = "#3f241c";
          roundedRectPath(-28, 5, 56, 18, 5);
          ctx.fill();
          ctx.fillStyle = "#1f1614";
          ctx.beginPath();
          ctx.moveTo(-22, 4);
          ctx.lineTo(-5, -16);
          ctx.lineTo(10, 7);
          ctx.lineTo(28, -6);
          ctx.lineTo(20, 16);
          ctx.lineTo(-26, 18);
          ctx.closePath();
          ctx.fill();
          ctx.globalAlpha = 0.28 + Math.sin(state.frame * 0.04) * 0.08;
          ctx.fillStyle = "#9ca3af";
          ctx.beginPath();
          ctx.ellipse(-4, -30, 18, 11, -0.2, 0, Math.PI * 2);
          ctx.ellipse(12, -42, 25, 13, 0.15, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
          ctx.restore();
          return;
        }

        const base = ctx.createLinearGradient(0, -8, 0, 26);
        base.addColorStop(0, "#b91c1c");
        base.addColorStop(1, "#4b1111");
        ctx.fillStyle = base;
        roundedRectPath(-32, -8, 64, 31, 6);
        ctx.fill();
        ctx.strokeStyle = "#fecaca";
        ctx.globalAlpha = 0.35;
        ctx.stroke();
        ctx.globalAlpha = 1;

        ctx.fillStyle = "#111827";
        roundedRectPath(-17, -34, 34, 27, 5);
        ctx.fill();
        ctx.fillStyle = "#ef4444";
        ctx.beginPath();
        ctx.arc(10, -22, 3, 0, Math.PI * 2);
        ctx.fill();

        ctx.save();
        ctx.rotate(angle);
        for (let y = -17; y <= 3; y += 10) {
          const tube = ctx.createLinearGradient(-15, y, 55, y + 8);
          tube.addColorStop(0, "#d1d5db");
          tube.addColorStop(0.42, "#6b7280");
          tube.addColorStop(1, "#1f2937");
          ctx.fillStyle = tube;
          roundedRectPath(-18, y, 70, 8, 4);
          ctx.fill();
          ctx.strokeStyle = "rgba(255,255,255,0.32)";
          ctx.stroke();
        }
        ctx.fillStyle = "#f8fafc";
        ctx.beginPath();
        ctx.moveTo(54, -15);
        ctx.lineTo(66, -10);
        ctx.lineTo(54, -5);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
        ctx.restore();
      }

      function drawEnemy(e) {
        ctx.save();
        ctx.translate(e.x, e.y);
        if (e.type === "ship") {
          ctx.fillStyle = "rgba(255,255,255,0.22)";
          ctx.beginPath();
          ctx.ellipse(-42, 18, 28, 5, 0.05, 0, Math.PI * 2);
          ctx.ellipse(-68, 20, 18, 3, 0.05, 0, Math.PI * 2);
          ctx.fill();

          const hull = ctx.createLinearGradient(-36, -16, 38, 15);
          hull.addColorStop(0, "#94a3b8");
          hull.addColorStop(0.48, "#475569");
          hull.addColorStop(1, "#1e293b");
          ctx.fillStyle = hull;
          ctx.beginPath();
          ctx.moveTo(-40, 7);
          ctx.lineTo(32, 7);
          ctx.lineTo(42, -8);
          ctx.lineTo(21, -17);
          ctx.lineTo(-34, -16);
          ctx.lineTo(-46, -2);
          ctx.closePath();
          ctx.fill();
          ctx.strokeStyle = "#cbd5e1";
          ctx.globalAlpha = 0.28;
          ctx.lineWidth = 2;
          ctx.stroke();
          ctx.globalAlpha = 1;

          ctx.fillStyle = "#0f172a";
          roundedRectPath(-9, -35, 25, 19, 4);
          ctx.fill();
          ctx.fillStyle = "#9be7ff";
          roundedRectPath(-4, -31, 14, 6, 2);
          ctx.fill();
          ctx.fillStyle = "#111827";
          ctx.fillRect(14, -28, 18, 4);
          ctx.fillStyle = "#f8fafc";
          for (let x = -26; x <= 16; x += 14) {
            ctx.beginPath();
            ctx.arc(x, -5, 2.4, 0, Math.PI * 2);
            ctx.fill();
          }
        } else if (e.type === "heli") {
          ctx.shadowColor = "rgba(251, 191, 36, 0.35)";
          ctx.shadowBlur = 8;
          ctx.strokeStyle = "#1e293b";
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.moveTo(-18, -2);
          ctx.lineTo(-48, -12);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(-48, -12);
          ctx.lineTo(-58, -5);
          ctx.moveTo(-48, -12);
          ctx.lineTo(-58, -19);
          ctx.stroke();

          const body = ctx.createLinearGradient(-22, -12, 26, 14);
          body.addColorStop(0, "#fde68a");
          body.addColorStop(0.48, "#f59e0b");
          body.addColorStop(1, "#92400e");
          ctx.fillStyle = body;
          ctx.beginPath();
          ctx.ellipse(0, 0, 25, 14, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#7dd3fc";
          ctx.beginPath();
          ctx.ellipse(9, -3, 9, 7, -0.15, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = "#1f2937";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(-15, 13);
          ctx.lineTo(-8, 21);
          ctx.lineTo(18, 21);
          ctx.moveTo(12, 13);
          ctx.lineTo(20, 21);
          ctx.stroke();

          ctx.shadowBlur = 0;
          ctx.globalAlpha = 0.45;
          ctx.fillStyle = "#f8fafc";
          ctx.beginPath();
          ctx.ellipse(0, -19, 58 + Math.sin(state.frame * 0.7) * 10, 4, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
          ctx.strokeStyle = "#e5e7eb";
          ctx.lineWidth = 2;
          const rotX = Math.cos(state.frame * 0.65) * 42;
          ctx.beginPath();
          ctx.moveTo(-rotX, -19);
          ctx.lineTo(rotX, -19);
          ctx.stroke();
        } else {
          ctx.rotate(e.takingOff ? -0.32 : Math.sin(state.frame * 0.04 + e.x * 0.01) * 0.04);
          const flame = ctx.createRadialGradient(-29, 0, 0, -29, 0, 22);
          flame.addColorStop(0, "rgba(255,255,255,0.9)");
          flame.addColorStop(0.42, "rgba(251,191,36,0.8)");
          flame.addColorStop(1, "rgba(239,68,68,0)");
          ctx.fillStyle = flame;
          ctx.beginPath();
          ctx.ellipse(-30, 0, 22 + Math.sin(state.frame * 0.6) * 4, 8, 0, 0, Math.PI * 2);
          ctx.fill();

          const jet = ctx.createLinearGradient(-26, -13, 31, 10);
          jet.addColorStop(0, "#e5e7eb");
          jet.addColorStop(0.55, "#94a3b8");
          jet.addColorStop(1, "#334155");
          ctx.fillStyle = jet;
          ctx.beginPath();
          ctx.moveTo(-28, -5);
          ctx.lineTo(5, -11);
          ctx.lineTo(31, 0);
          ctx.lineTo(5, 11);
          ctx.lineTo(-28, 5);
          ctx.closePath();
          ctx.fill();
          ctx.fillStyle = "#475569";
          ctx.beginPath();
          ctx.moveTo(-5, -8);
          ctx.lineTo(-19, -26);
          ctx.lineTo(10, -11);
          ctx.closePath();
          ctx.moveTo(-5, 8);
          ctx.lineTo(-19, 26);
          ctx.lineTo(10, 11);
          ctx.closePath();
          ctx.fill();
          ctx.fillStyle = "#7dd3fc";
          ctx.beginPath();
          ctx.ellipse(12, -2, 8, 4, 0.1, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#ef4444";
          ctx.fillRect(-17, -2, 7, 4);
        }
        ctx.restore();

        const maxHp = e.type === "ship" ? 12 : e.type === "heli" ? 8 : 6;
        const hpRatio = Math.max(0, e.hp / maxHp);
        ctx.save();
        ctx.translate(e.x, e.y + (e.type === "heli" ? 28 : 25));
        ctx.fillStyle = "rgba(2, 6, 23, 0.58)";
        roundedRectPath(-24, 0, 48, 6, 3);
        ctx.fill();
        ctx.fillStyle = hpRatio > 0.45 ? "#4ade80" : "#fb7185";
        roundedRectPath(-22, 1.4, 44 * hpRatio, 3.2, 1.6);
        ctx.fill();
        ctx.restore();
      }

      function drawMissile(m) {
        ctx.save();
        ctx.translate(m.x, m.y);
        if (m.type === "bomb") {
          const bomb = ctx.createRadialGradient(-3, -4, 1, 0, 0, m.radius + 4);
          bomb.addColorStop(0, "#e5e7eb");
          bomb.addColorStop(0.35, "#475569");
          bomb.addColorStop(1, "#111827");
          ctx.fillStyle = bomb;
          ctx.beginPath();
          ctx.ellipse(0, 0, m.radius * 0.9, m.radius * 1.15, 0.18, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#ef4444";
          ctx.beginPath();
          ctx.arc(0, -m.radius - 2, 3, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = "rgba(255,255,255,0.35)";
          ctx.beginPath();
          ctx.moveTo(-m.radius * 0.4, m.radius * 0.7);
          ctx.lineTo(m.radius * 0.4, m.radius * 0.7);
          ctx.stroke();
        } else {
          ctx.rotate(Math.atan2(m.vy, m.vx));
          const trail = ctx.createLinearGradient(-42, 0, -8, 0);
          trail.addColorStop(0, "rgba(239,68,68,0)");
          trail.addColorStop(0.5, "rgba(251,191,36,0.45)");
          trail.addColorStop(1, "rgba(255,255,255,0.82)");
          ctx.fillStyle = trail;
          ctx.beginPath();
          ctx.moveTo(-38, -8);
          ctx.lineTo(-8, 0);
          ctx.lineTo(-38, 8);
          ctx.closePath();
          ctx.fill();

          const missile = ctx.createLinearGradient(-11, -6, 12, 6);
          missile.addColorStop(0, "#fecaca");
          missile.addColorStop(0.45, "#ef4444");
          missile.addColorStop(1, "#7f1d1d");
          ctx.fillStyle = missile;
          ctx.beginPath();
          ctx.moveTo(10, 0); ctx.lineTo(-10, -5); ctx.lineTo(-10, 5);
          ctx.fill();
          ctx.fillStyle = "#111827";
          ctx.fillRect(-12, -6, 4, 12);
        }
        ctx.restore();
      }

      function drawGift(g) {
        ctx.save();
        const sway = Math.sin(state.frame * 0.035 + g.x * 0.02) * 5;
        ctx.translate(g.x + sway, g.y);

        const canopy = ctx.createLinearGradient(0, -58, 0, -24);
        canopy.addColorStop(0, "#fef3c7");
        canopy.addColorStop(0.55, "#f97316");
        canopy.addColorStop(1, "#b91c1c");
        ctx.fillStyle = canopy;
        ctx.beginPath();
        ctx.moveTo(-28, -27);
        ctx.bezierCurveTo(-18, -58, 18, -58, 28, -27);
        ctx.lineTo(18, -31);
        ctx.bezierCurveTo(9, -22, -9, -22, -18, -31);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.45)";
        ctx.lineWidth = 1;
        for (let x = -14; x <= 14; x += 14) {
          ctx.beginPath();
          ctx.moveTo(x, -30);
          ctx.lineTo(x * 0.45, -52);
          ctx.stroke();
        }

        ctx.strokeStyle = "rgba(226,232,240,0.75)";
        ctx.beginPath();
        ctx.moveTo(-22, -27);
        ctx.lineTo(-14, -7);
        ctx.moveTo(22, -27);
        ctx.lineTo(14, -7);
        ctx.stroke();

        const box = ctx.createLinearGradient(0, -10, 0, 20);
        box.addColorStop(0, "#fbbf24");
        box.addColorStop(1, "#b45309");
        ctx.fillStyle = box;
        roundedRectPath(-16, -8, 32, 28, 4);
        ctx.fill();
        ctx.strokeStyle = "#7c2d12";
        ctx.stroke();
        ctx.fillStyle = "rgba(120, 53, 15, 0.5)";
        ctx.fillRect(-2, -8, 4, 28);
        ctx.fillRect(-16, 3, 32, 4);
        ctx.restore();
      }

      function drawProjectile(p) {
        ctx.save();
        ctx.translate(p.x, p.y);
        const angle = Math.atan2(p.vy, p.vx);
        ctx.rotate(angle);
        const trail = ctx.createLinearGradient(-p.radius * 5, 0, 0, 0);
        trail.addColorStop(0, "rgba(255,255,255,0)");
        trail.addColorStop(1, p.type === "super" ? "rgba(239,68,68,0.55)" : "rgba(251,191,36,0.45)");
        ctx.fillStyle = trail;
        ctx.beginPath();
        ctx.ellipse(-p.radius * 2.2, 0, p.radius * 2.8, p.radius * 0.55, 0, 0, Math.PI * 2);
        ctx.fill();

        if (p.type === "super") {
          const glow = ctx.createRadialGradient(0,0,0,0,0,p.radius*2);
          glow.addColorStop(0, p.color);
          glow.addColorStop(1, "transparent");
          ctx.fillStyle = glow;
          ctx.beginPath(); ctx.arc(0,0,p.radius*2,0,Math.PI*2); ctx.fill();
        }

        const shell = ctx.createRadialGradient(-p.radius * 0.35, -p.radius * 0.35, 1, 0, 0, p.radius);
        shell.addColorStop(0, "#ffffff");
        shell.addColorStop(0.28, p.color);
        shell.addColorStop(1, p.type === "super" ? "#7f1d1d" : "#92400e");
        ctx.fillStyle = shell;
        ctx.beginPath();
        ctx.ellipse(0, 0, p.radius * 1.18, p.radius * 0.82, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawParticle(p) {
        ctx.save();
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = p.size * 1.8;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawPopups() {
        popups.forEach(p => {
          ctx.save();
          ctx.globalAlpha = p.life;
          ctx.fillStyle = p.color;
          ctx.font = `bold ${p.size}px Oxanium`;
          ctx.textAlign = "center";
          ctx.fillText(p.text, p.x, p.y);
          ctx.restore();
        });
      }

      function restart() {
        Object.assign(state, {
          money: 0, baseHp: 100, gunLevel: 1, gunCooldown: 0, cannonCooldown: 0,
          itemReady: false, launcherAlive: true, launcherHp: 6, launcherCooldown: 0,
          gameOver: false, shake: 0
        });
        projectiles.length = 0; enemies.length = 0; gifts.length = 0;
        enemyMissiles.length = 0; popups.length = 0; particles.length = 0;
        ui.gameOver.classList.remove("show");
        updateHud();
      }

      function loop(t) {
        const delta = Math.min(32, t - state.lastTime || 16);
        state.lastTime = t;
        update(delta);
        draw();
        requestAnimationFrame(loop);
      }

      updateHud();
      requestAnimationFrame(loop);
    </script>
    <script src="../mobile-arcade.js"></script>
    <script>
        // Full-window canvas: no scaling needed. Bridge touch -> mouse for aim/shoot,
        // and add a touch button for the super shot (X key).
        MobileArcade.mouseBridge(document.getElementById('game'));
        MobileArcade.actions([{ label: '💥특수', key: 'x' }], { side: 'right' });
    </script>
  </body>
